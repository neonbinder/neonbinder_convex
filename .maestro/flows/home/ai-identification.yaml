url: ${APP_URL || "https://localhost:3000"}
name: AI Card Identification Feature Page
tags:
  - marketing
  - home
---
- launchApp
- assertVisible: "Neon Binder"

# Scroll to and tap the AI card to navigate
- scrollUntilVisible:
    element:
      text: ".*AI-Based.*"
- tapOn:
    text: ".*AI-Based.*"

# Four feature sections
- assertVisible: "Instant Recognition"
- scrollUntilVisible:
    element:
      text: "Complete Card Data"
- assertVisible: "Complete Card Data"
- scrollUntilVisible:
    element:
      text: "Accuracy & Verification"
- assertVisible: "Accuracy & Verification"
- scrollUntilVisible:
    element:
      text: "Machine Learning"
- assertVisible: "Machine Learning"

# CTA: verify Get Started button opens Clerk dialog.
# NOTE: Clerk's <SignUpButton> does not render its children when the user is
# already signed in. When this flow runs after an auth flow (e.g. in a
# serial PARALLELISM=1 suite), the user may be signed in and "Get Started"
# will not be in the DOM. Guard with optional scrollUntilVisible.
- scrollUntilVisible:
    element:
      text: "Get Started"
    optional: true

# Only test the CTA if the button is rendered (user is signed out)
- runFlow:
    when:
      visible: "Get Started"
    commands:
      - assertVisible: "Get Started"
      - tapOn: "Get Started"
      - assertVisible: "Create your account"

      # Dismiss dialog and navigate back to home
      - tapOn:
          point: "5%, 50%"
      - assertNotVisible: "Create your account"

# Always verify the Back button works (signed-in OR signed-out users see it)
- tapOn: "Back"
- assertVisible:
    text: ".*Sign In.*|.*Dashboard.*"
