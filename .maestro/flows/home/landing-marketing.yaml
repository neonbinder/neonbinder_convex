    element:
      text: ".*Collection Tracking.*"
- assertVisible:
    text: ".*Collection Tracking.*"
- assertVisible:
    text: ".*AI.*"
- assertVisible:
    text: ".*Inventory.*"

# How It Works section
- scrollUntilVisible:
    element:
      text: "How It Works"
- assertVisible: "How It Works"
