url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector
name: Sync a set with variants reconciled across BSC+SL
tags:
  - set-selector
  - wip
---
# Milestone test: drill Baseball → 2023 → Topps → (a Topps set) → sync Variant
# Types → sync Variants. Verifies set+variants reconciled across BSC+SL.
#
# Assumes the test user has BSC+SL creds saved in dev. Each level's sync form
# auto-fires on mount (no "Sync from Marketplaces" button to tap).

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# === LEVEL 1 — Sport (already synced) ===
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"
- extendedWaitUntil:
    visible: "Years"
    timeout: 15000

# === LEVEL 2 — Year ===
- scrollUntilVisible:
    element:
      text: "Sync Years"
    timeout: 10000
- tapOn: "Sync Years"
- extendedWaitUntil:
    visible: "Syncing Year Options"
    timeout: 10000
- extendedWaitUntil:
    visible: "Sync Years"
    timeout: 60000

# Pick 2023
- scrollUntilVisible:
    element:
      text: "2023"
    timeout: 10000
- tapOn: "2023"
- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 15000

# === LEVEL 3 — Manufacturer ===
- scrollUntilVisible:
    element:
      text: "Sync Manufacturers"
    timeout: 10000
- tapOn: "Sync Manufacturers"
- extendedWaitUntil:
    visible: "Syncing Manufacturer Options"
    timeout: 10000
- extendedWaitUntil:
    visible: "Sync Manufacturers"
    timeout: 60000

# Pick Topps
- scrollUntilVisible:
    element:
      text: "Topps"
    timeout: 10000
- tapOn: "Topps"
- extendedWaitUntil:
    visible: "Sets"
    timeout: 15000

# === LEVEL 4 — Set ===
- scrollUntilVisible:
    element:
      text: "Sync Sets"
    timeout: 10000
- tapOn: "Sync Sets"
- extendedWaitUntil:
    visible: "Syncing Sets"
    timeout: 10000
- extendedWaitUntil:
    visible: "Sync Sets"
    timeout: 90000

# Pick the first available set (whatever Topps had in 2023)
- tapOn:
    text: ".*"
    index: 0
- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 15000

# === LEVEL 5 — Variant Types ===
- scrollUntilVisible:
    element:
      text: "Sync Variant Types"
    timeout: 10000
- tapOn: "Sync Variant Types"
- extendedWaitUntil:
    visible: "Syncing Variant Types"
    timeout: 10000
- extendedWaitUntil:
    visible: "Sync Variant Types"
    timeout: 60000

# Pick the first variant type
- tapOn:
    text: ".*"
    index: 0
- extendedWaitUntil:
    visible: "Variants"
    timeout: 15000

# === LEVEL 6 — Variants (where ReconciliationModal can appear) ===
- scrollUntilVisible:
    element:
      text: "Sync Variants"
    timeout: 10000
- tapOn: "Sync Variants"
- extendedWaitUntil:
    visible: ".*Syncing Variants|Select Base Set|Reconcile Variants.*"
    timeout: 15000

# Wait for either: form closes (success), modal appears for review,
# or error state shows Cancel/Retry
- extendedWaitUntil:
    visible: ".*Sync Variants|Confirm|Cancel|Retry.*"
    timeout: 90000
