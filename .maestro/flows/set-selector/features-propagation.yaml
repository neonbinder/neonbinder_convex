appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Features propagate from set to cards via SetAttributesPanel, per-card override survives re-propagation (per-worker custom set)"
tags:
  - set-selector
  - regression
---
# Full propagation lifecycle test for NEO-24.
#
# ISOLATION: uses a per-worker CUSTOM set (fp-{WORKER_INDEX}) under
# Baseball → 2024 → Topps. Each of the 3 CI workers owns a separate custom
# set so concurrent workers cannot interfere. The real 2024 Topps Chrome set
# is never touched — that path is owned exclusively by topps-chrome-*.yaml
# and topps-chrome-add-feature.yaml.
#
# DRILL DELEGATION: Step 0 and Step D both call util-drill-to-custom.yaml
# with Baseball/2024/Topps/fp-{N}. The util is idempotent (handles fp-{N}
# already existing on Step D revisit) and returns at the Variant Types column.
# Baseball/2024/Topps are pre-seeded by cascade setup.yaml.
#
# CARD CHECKLIST PATH:
#   Custom sets reach CardChecklist via: Set → Insert (VT) →
#   custom insert entry. fp-{N} → Insert → fp-insert-{N} → CardChecklist
#   This mirrors card-detail-panel.yaml's proven "cd-{N} → Insert → Base" path.
#   The SetAttributesPanel sets features on the SET level (fp-{N}) and they
#   propagate to all descendant cards in the checklist of fp-insert-{N}.
#
# WHAT THIS TESTS:
#   1. SetAttributesPanel: setting a feature at the set (setName) level saves
#      and shows a toast with "Updated N cards" (propagation engine ran).
#   2. A card inherits the set-level value: opening CardFeaturesEditor on a
#      child card shows "Inherited: PropTest-MLB" under the League row.
#   3. Per-card override: typing a different value saves the override on just
#      that card. The row changes from "Inherited" to the new value.
#   4. Re-propagation at the set level to a new value updates non-overridden
#      cards but the overridden card retains its own value.
#   5. Revert: after reverting the override the card inherits the new set value.
#
# FLOW:
#   Step 0: Drill to Baseball → 2024 → Topps → custom set fp-{WORKER_INDEX}
#           via util-drill-to-custom.yaml.
#   Step A: Set League = "PropTest-MLB" at the set level → assert toast.
#   Step B: Drill to Insert → fp-insert-{WORKER_INDEX} → add card #992-{ATTEMPT_ID}
#           → open CardFeaturesEditor → verify "Inherited: PropTest-MLB".
#   Step C: Override League to "PropTest-NL" on that card.
#   Step D: Back at set level → update League to "PropTest-AL" → verify toast.
#           Re-drill via util-drill-to-custom.yaml (idempotent revisit).
#   Step E: Re-open override card → verify it still shows "PropTest-NL".
#   Step F: Revert override → card now inherits "PropTest-AL".
#   Cleanup: delete the test card.
#
# PREREQUISITE: cascade setup.yaml must have run (requires:setup-done) so
# Baseball, 2024, and Topps all exist in the shared Convex DB.

- launchApp
# Wait for the Clerk testing-token sign-in + redirect to /set-selector to
# fully complete before calling the util. The util issues its own openLink
# /set-selector which only works within an already-authenticated session.
# Without this wait the openLink fires before Clerk finishes the token
# exchange and the browser is redirected back to the sign-in page.
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# STEP 0 — DRILL TO PER-WORKER CUSTOM SET under Baseball/2024/Topps
#
# util-drill-to-custom.yaml handles: openLink /set-selector + wait + all 4
# levels. Returns at Variant Types column with Add-custom-Variant-Types
# in viewport. Idempotent: fp-{N} already exists → select path only.
# ============================================================

- runFlow:
    file: util-drill-to-custom.yaml
    env:
      SPORT: "Baseball"
      YEAR: "2024"
      MANUFACTURER: "Topps"
      SET_NAME: "fp-${WORKER_INDEX || 0}"

- assertVisible: "Variant Types"

# ============================================================
# STEP A — Set League = "PropTest-MLB" at the set (setName) level
#
# The SetAttributesPanel renders at the setName level (no card checklist).
# Panel defaults EXPANDED for custom sets with no card checklist.
#
# Two-step write: PropTest-X → PropTest-MLB.
#   - PropTest-X forces a real DB write even if a prior run left PropTest-MLB.
#   - PropTest-MLB is then always a genuine change from PropTest-X.
#   - For a fresh set with no cards yet, "Updated 0 cards" is fine.
#     Cards added in Step B will inherit PropTest-MLB via the stored set value.
# ============================================================

- scrollUntilVisible:
    element:
      id: "Edit attributes"
    centerElement: true
    visibilityPercentage: 10
    waitToSettleTimeoutMs: 1000
    timeout: 15000

# IDEMPOTENT EXPAND: custom sets default expanded; guard for prior-run collapse.
- runFlow:
    when:
      visible:
        id: "Edit attributes"
    commands:
      - tapOn:
          id: "Edit attributes"
      - assertVisible:
          id: "Hide attributes"

- assertVisible:
    id: "Hide attributes"

- scrollUntilVisible:
    element:
      id: "Value for League"
    centerElement: true
    visibilityPercentage: 10
    waitToSettleTimeoutMs: 1000
    timeout: 10000

# First write: clearing sentinel — guarantees DB value changes.
- tapOn:
    id: "Value for League"
- eraseText: 20
- inputText: "PropTest-X"
- pressKey: Enter
# 7s timeout: 0–1 card propagation write; must land in 7s (Convex write SLA).
- extendedWaitUntil:
    visible:
      text: ".*Updated [0-9]+ cards.*"
    timeout: 7000

# Second write: the canonical test value.
- tapOn:
    id: "Value for League"
- eraseText: 20
- inputText: "PropTest-MLB"
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: ".*Updated [0-9]+ cards.*"
    timeout: 7000

# ============================================================
# STEP B — Drill to Insert → fp-insert-{WORKER_INDEX}, add a card, verify
#          inherited value.
#
# Card checklist path for custom sets: Set → Insert (variant type) →
# custom insert entry → CardChecklist. This is the proven path used by
# card-detail-panel.yaml (cd-{N} → Insert → "Base").
#
# The Variant Types column is above the fold after Step A wrote to the panel.
# Scroll UP (swipe-down gesture) to bring the column back into view.
# ============================================================

- scrollUntilVisible:
    element:
      id: "Add custom Variant Types"
    direction: UP
    visibilityPercentage: 100
    timeout: 30000

# Add "Insert" as a custom variant type if it's not already there.
- runFlow:
    when:
      notVisible: "Insert"
    commands:
      - tapOn:
          id: "Add custom Variant Types"
          waitToSettleTimeoutMs: 2000
      - assertVisible: "Add Custom Entry"
      - inputText: "Insert"
      - pressKey: Enter
      - assertVisible:
          text: "Insert"

- scrollUntilVisible:
    element:
      text: "Insert"
    centerElement: true
    timeout: 10000
- tapOn: "Insert"

# Wait for the Inserts column header to confirm selection.
- assertVisible: "Inserts"

# Add a custom insert entry "fp-insert-{WORKER_INDEX}" if absent.
# This is the variant that will hold the card checklist.
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    visibilityPercentage: 50
    timeout: 30000

- runFlow:
    when:
      notVisible: "fp-insert-${WORKER_INDEX || 0}"
    commands:
      - tapOn:
          id: "Add custom Inserts"
          waitToSettleTimeoutMs: 2000
      - assertVisible: "Add Custom Entry"
      - inputText: "fp-insert-${WORKER_INDEX || 0}"
      - pressKey: Enter
      - assertVisible:
          text: ".*fp-insert-${WORKER_INDEX || 0}.*"

- scrollUntilVisible:
    element:
      text: "fp-insert-${WORKER_INDEX || 0}"
    timeout: 10000
- tapOn: "fp-insert-${WORKER_INDEX || 0}"

# Wait for CardChecklist to render (custom subtree — no BSC/SL calls,
# short-circuits quickly). Use "Open add card form" as the signal — this is
# the reliable indicator on custom sets. "Fetch from Marketplaces" and
# "No cards in this checklist yet." are NOT reliable here: the custom subtree
# gate short-circuits adapter calls, and the checklist renders the add-form
# button directly. Mirror card-detail-panel.yaml's proven pattern.
- scrollUntilVisible:
    element:
      id: "Open add card form"
    centerElement: true
    visibilityPercentage: 50
    timeout: 30000

- tapOn:
    id: "Open add card form"
- assertVisible:
    id: "Card name"
- inputText: "992-${ATTEMPT_ID}"
- tapOn: "Player name"
- inputText: "Propagation Test Player ${ATTEMPT_ID}"
- tapOn:
    id: "Submit new card"

# Virtuoso renders rows near the viewport; scroll to materialize the new card.
- scrollUntilVisible:
    element:
      text: "Propagation Test Player ${ATTEMPT_ID}"
    centerElement: true
    timeout: 15000

# Open the edit form for our card.
- scrollUntilVisible:
    element:
      id: "Edit card 992-${ATTEMPT_ID}"
    centerElement: true
    visibilityPercentage: 50
    timeout: 10000
- tapOn:
    id: "Edit card 992-${ATTEMPT_ID}"
    waitToSettleTimeoutMs: 2000
- assertVisible:
    id: "Card name"

# Expand CardFeaturesEditor.
- tapOn:
    id: "Show features editor"
- assertVisible:
    id: "Card features editor"

# The card inherits the set-level League value. The "Inherited: PropTest-MLB"
# label appears below the input when the card has no override.
# (Step A wrote PropTest-MLB to the set before this card existed; the
# propagation engine stores the value on the set entity. Cards created
# afterward look up the set value and display it as "Inherited: PropTest-MLB".)
- assertVisible:
    text: ".*PropTest-MLB.*"

# ============================================================
# STEP C — Override League to "PropTest-NL" on this card
# ============================================================

- scrollUntilVisible:
    element:
      id: "Value for League"
    centerElement: true
    timeout: 10000
- tapOn:
    id: "Value for League"
- eraseText: 20
- inputText: "PropTest-NL"
- pressKey: Enter

# After save-on-Enter the "Inherited:" label disappears (card has its own value).
- extendedWaitUntil:
    notVisible: ".*Inherited: PropTest-MLB.*"
    timeout: 10000

# The League input now shows "PropTest-NL".
- assertVisible:
    id: "Value for League"

# Save the card edit (closes the form). Scroll Save button into view first —
# with features expanded it may be below the 1024×629 headless viewport.
# waitToSettleTimeoutMs: 3000 — the pressKey: Enter above triggered a Convex
# write; the DOM re-renders while writing. Scrolling too soon causes CDP
# MismatchedInputException crashes (page mid-re-render). 3s settle gives
# React time to finish before the scroll runs.
- scrollUntilVisible:
    element:
      id: "Save card edit"
    centerElement: true
    visibilityPercentage: 50
    waitToSettleTimeoutMs: 3000
    timeout: 20000
- tapOn:
    id: "Save card edit"

# After the edit form closes, Virtuoso may reset scroll to top of visible range.
- scrollUntilVisible:
    element:
      text: "Propagation Test Player ${ATTEMPT_ID}"
    centerElement: true
    timeout: 15000

# ============================================================
# STEP D — Re-propagate at set level: League → "PropTest-AL"
#
# Navigate back to the custom set level via util-drill-to-custom.yaml.
# The util performs its own openLink /set-selector; items pre-exist from
# Step 0 so it follows the idempotent select path. Returns at Variant Types.
# This tests that re-propagation skips our overridden card.
# ============================================================

- runFlow:
    file: util-drill-to-custom.yaml
    env:
      SPORT: "Baseball"
      YEAR: "2024"
      MANUFACTURER: "Topps"
      SET_NAME: "fp-${WORKER_INDEX || 0}"

- assertVisible: "Variant Types"

# SetAttributesPanel renders at setName level. Panel defaults EXPANDED for
# custom sets. Scroll to the toggle to locate the panel area.
- scrollUntilVisible:
    element:
      id: "Edit attributes"
    centerElement: true
    visibilityPercentage: 10
    waitToSettleTimeoutMs: 1000
    timeout: 15000

# IDEMPOTENT EXPAND for Step D re-navigation.
- runFlow:
    when:
      visible:
        id: "Edit attributes"
    commands:
      - tapOn:
          id: "Edit attributes"
      - assertVisible:
          id: "Hide attributes"

- scrollUntilVisible:
    element:
      id: "Value for League"
    centerElement: true
    visibilityPercentage: 10
    waitToSettleTimeoutMs: 1000
    timeout: 10000
- tapOn:
    id: "Value for League"
- eraseText: 20
- inputText: "PropTest-AL"
- pressKey: Enter

# Toast: at least 1 card updated (the non-overridden cards get "PropTest-AL").
# Our override card (#992) has "PropTest-NL" — it is in skippedAsOverridden.
# 7s timeout: propagation over 0–1 non-overridden cards (Convex write SLA).
- extendedWaitUntil:
    visible:
      text: ".*Updated [0-9]+ cards.*"
    timeout: 7000

# ============================================================
# STEP E — Verify override card still shows "PropTest-NL", not "PropTest-AL"
# ============================================================

# Variant Types column is above the fold after writing to the panel.
# Scroll UP (swipe-down gesture) to bring it back into view.
- scrollUntilVisible:
    element:
      text: "Insert"
    direction: UP
    centerElement: true
    timeout: 15000
- tapOn: "Insert"

# Wait for the Inserts column header to confirm selection.
- assertVisible: "Inserts"

- scrollUntilVisible:
    element:
      text: "fp-insert-${WORKER_INDEX || 0}"
    timeout: 10000
- tapOn: "fp-insert-${WORKER_INDEX || 0}"

# Wait for CardChecklist to render — same "Open add card form" signal as Step B.
- scrollUntilVisible:
    element:
      id: "Open add card form"
    centerElement: true
    visibilityPercentage: 50
    timeout: 30000

- scrollUntilVisible:
    element:
      id: "Edit card 992-${ATTEMPT_ID}"
    centerElement: true
    visibilityPercentage: 50
    timeout: 30000

- tapOn:
    id: "Edit card 992-${ATTEMPT_ID}"
    waitToSettleTimeoutMs: 2000
- assertVisible:
    id: "Card name"

- tapOn:
    id: "Show features editor"
- assertVisible:
    id: "Card features editor"

# The override card should show "PropTest-NL" in the League input, NOT "PropTest-AL".
# The card has an override so no "Inherited:" label shows — just "PropTest-NL".
- assertVisible:
    id: "Value for League"

# The "Revert League to inherited" button is visible (card has an override).
- assertVisible:
    id: "Revert League to inherited"

# No "Inherited: PropTest-AL" should be visible (override is active).
- assertNotVisible: ".*Inherited: PropTest-AL.*"

# ============================================================
# STEP F — Revert the override; card should now inherit "PropTest-AL"
# ============================================================

- tapOn:
    id: "Revert League to inherited"

# After revert, "Inherited: PropTest-AL" label appears (card falls back to set value).
- extendedWaitUntil:
    visible: ".*Inherited: PropTest-AL.*"
    timeout: 10000

# The "Revert" button disappears (no more override on League).
- assertNotVisible:
    id: "Revert League to inherited"

# Save and close.
# waitToSettleTimeoutMs: 3000 — tapOn: "Revert League to inherited" above
# fires a Convex write; scroll during re-render causes CDP crashes.
- scrollUntilVisible:
    element:
      id: "Save card edit"
    centerElement: true
    visibilityPercentage: 50
    waitToSettleTimeoutMs: 3000
    timeout: 20000
- tapOn:
    id: "Save card edit"

# Confirm the form closed and the row is still visible.
- scrollUntilVisible:
    element:
      text: "Propagation Test Player ${ATTEMPT_ID}"
    centerElement: true
    timeout: 15000

# ============================================================
# CLEANUP — delete this attempt's test card
# ============================================================

- tapOn:
    id: "Delete card 992-${ATTEMPT_ID}"
- assertVisible: "Confirm?"
- tapOn:
    id: "Confirm delete card 992-${ATTEMPT_ID}"
- assertNotVisible: "Propagation Test Player ${ATTEMPT_ID}"
