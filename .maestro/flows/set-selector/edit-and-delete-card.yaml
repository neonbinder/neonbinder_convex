url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/set-selector
name: Edit and Delete a Card from the Checklist
tags:
  - set-selector
  - regression
---
# A user edits an existing card's player name and team, saves the change,
# then deletes the card from the checklist.
#
# The test verifies:
# - Hovering a card row reveals "Edit" and "Del" actions
# - Tapping "Edit" opens an inline edit form with the current values
# - Saving updates the card name shown in the list
# - Tapping "Del" shows a "Confirm?" prompt
# - Confirming the delete removes the card from the list
#
# This test adds its own custom card first so it has full control over
# what it edits and deletes without relying on marketplace-synced data.
#
# All sync forms auto-fire on open — there is no "Sync from Marketplaces" button.

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# --- Credentials ---
# Navigate to /profile before credential setup — runFlow does NOT re-navigate,
# so the sub-flows (which expect "Select Platform" on /profile) would fail if
# the browser is still on /set-selector after sign-in redirect.
- openLink: ${APP_URL || "https://localhost:3000"}/profile
- scrollUntilVisible:
    element:
      text: ".*Select Platform.*"
    timeout: 15000

- runFlow:
    file: ../profile/setup-bsc-credentials.yaml
    env:
      BSC_USERNAME: ${BSC_USERNAME}
      BSC_PASSWORD: ${BSC_PASSWORD}

- runFlow:
    file: ../profile/setup-sportlots-credentials.yaml
    env:
      SPORTLOTS_USERNAME: ${SPORTLOTS_USERNAME}
      SPORTLOTS_PASSWORD: ${SPORTLOTS_PASSWORD}

- openLink: ${APP_URL || "https://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 15000

# --- Drill down to the Cards column ---

# Only sync if the button is present; prior flows in this run may have already
# populated sports, replacing the button with the list.
- runFlow:
    when:
      visible: "Sync Sports"
    commands:
      - tapOn: "Sync Sports"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Sport Options|Sync Sports.*"
          timeout: 15000
      # "Sync Sports" reappears below the list once ALL platforms have responded.
      - scrollUntilVisible:
          element:
            text: "Sync Sports"
          timeout: 60000
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

- extendedWaitUntil:
    visible: "Years"
    timeout: 10000
- runFlow:
    when:
      visible: "Sync Years"
    commands:
      - tapOn: "Sync Years"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Year Options|Sync Years.*"
          timeout: 15000
      # "Sync Years" reappears below the list once ALL platforms have responded.
      - scrollUntilVisible:
          element:
            text: "Sync Years"
          timeout: 60000
- tapOn:
    text: ".*20[0-9][0-9].*"
    index: 0

- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 10000
- runFlow:
    when:
      visible: "Sync Manufacturers"
    commands:
      - tapOn: "Sync Manufacturers"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Manufacturer Options|Sync Manufacturers.*"
          timeout: 15000
      # "Sync Manufacturers" reappears below the list once ALL platforms have responded.
      - scrollUntilVisible:
          element:
            text: "Sync Manufacturers"
          timeout: 60000
# Pick the first available manufacturer — do not hardcode "Topps".
- tapOn:
    text: ".*"
    index: 0

- extendedWaitUntil:
    visible: "Sets"
    timeout: 10000
- runFlow:
    when:
      visible: "Sync Sets"
    commands:
      - tapOn: "Sync Sets"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Sets|Sync Sets.*"
          timeout: 15000
      # "Sync Sets" does not reappear once data is populated. Wait for
      # "Syncing Sets" to disappear, which signals the form closed.
      - extendedWaitUntil:
          notVisible: "Syncing Sets"
          timeout: 90000
- tapOn:
    text: ".*"
    index: 0

# Level 5 — Variant Types (formerly "Set Variants")
- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 10000
- runFlow:
    when:
      visible: "Sync Variant Types"
    commands:
      - tapOn: "Sync Variant Types"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Variant Types|Sync Variant Types.*"
          timeout: 15000
      # "Sync Variant Types" reappears below the list once ALL platforms have responded.
      - scrollUntilVisible:
          element:
            text: "Sync Variant Types"
          timeout: 60000
- tapOn:
    text: ".*"
    index: 0

# Level 6 — Variants
- extendedWaitUntil:
    visible: "Variants"
    timeout: 10000
- runFlow:
    when:
      visible: "Sync Variants"
    commands:
      - tapOn: "Sync Variants"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Variants|Select Base Set.*"
          timeout: 15000
      # "Sync Variants" reappears once all platforms have responded, OR the
      # BaseSetPicker modal appears (for Base variant type).
      - scrollUntilVisible:
          element:
            text: ".*Sync Variants|Select Base Set.*"
          timeout: 60000
# If the BaseSetPicker modal appeared (Base variant type), confirm it to
# proceed past the modal into the variants list.
- runFlow:
    when:
      visible: "Confirm Base Set"
    commands:
      - tapOn: "Confirm Base Set"
      - extendedWaitUntil:
          notVisible: "Confirm Base Set"
          timeout: 15000
- tapOn:
    text: ".*"
    index: 0

- extendedWaitUntil:
    visible: "Cards"
    timeout: 10000

# --- Add a custom card to edit/delete ---
- scrollUntilVisible:
    element:
      text: "Add Card"
    timeout: 10000
- tapOn: "Add Card"
- extendedWaitUntil:
    visible: "Player name"
    timeout: 5000
# The card number input has autoFocus — type directly into it
- inputText: "777"
- tapOn: "Player name"
- inputText: "Edit Test Player"
- tapOn: "Add"
- extendedWaitUntil:
    visible: "Edit Test Player"
    timeout: 10000

# ============================================================
# EDIT the card
# ============================================================

# Hover the card row to reveal the "Edit" action
# On web, we tap the "Edit" button that becomes visible on hover/focus
- tapOn: "Edit"

# The inline edit form opens with current values populated.
# The card name input shows the existing name — wait for the edit form heading.
- extendedWaitUntil:
    visible: "Card name"
    timeout: 5000

# Tap the card name input (it shows "Card name" as placeholder) to focus it,
# then clear the existing value and type the new name
- tapOn: "Card name"
- eraseText
- inputText: "Renamed Player"

# Tap the team input and enter a team name
- tapOn: "Team"
- inputText: "Red Sox"

# Save the edit
- tapOn: "Save"

# ============================================================
# Verify the edit was saved
# ============================================================

# The inline form should close and the updated name should appear
- extendedWaitUntil:
    visible: "Renamed Player"
    timeout: 10000
- assertVisible: "Red Sox"

# ============================================================
# DELETE the card
# ============================================================

# Tap the "Del" button on the card row
- tapOn: "Del"

# A "Confirm?" prompt replaces the "Del" button
- extendedWaitUntil:
    visible: "Confirm?"
    timeout: 5000

# Confirm the deletion
- tapOn: "Confirm?"

# ============================================================
# Verify the card was removed from the list
# ============================================================

# The card should no longer appear in the checklist
- extendedWaitUntil:
    notVisible: "Renamed Player"
    timeout: 10000
