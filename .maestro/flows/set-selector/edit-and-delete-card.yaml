appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Edit and delete a card — rename, add team via TeamPicker, then delete"
tags:
  - set-selector
  - regression
  - requires:setup-done
---
# A user edits an existing card's name and team (using the new TeamPicker chip
# UI from NEO-26), saves, verifies changes persist, then deletes the card.
#
# PER-WORKER DATA ISOLATION:
#   Drills to Baseball → 2024 → Topps → ed-<WORKER_INDEX> (custom set) →
#   custom Insert VT → "Base" (custom insert variant). Each worker has its own
#   checklist — no concurrent checklist contention with the cascade's
#   Topps Chrome path.
#
#   WHY Baseball/2024/Topps (not Football/2026):
#     cascade/setup.yaml seeds New York Yankees + New York Mets teams for
#     Baseball. The TeamPicker query is sport-scoped, so it only returns
#     Baseball teams when the checklist is in a Baseball context. Keeping the
#     sport/year/manufacturer the same as the cascade (but using a custom Set
#     name) ensures Yankees/Mets typeahead results are available while still
#     avoiding any collision with the cascade's Topps Chrome checklist
#     (the custom Set name is unique per worker and not a real marketplace set,
#     so the BSC/SL adapter gate short-circuits immediately via NEO-22).
#
# WHAT THIS TESTS:
#   - Hovering a card row reveals the "Edit" action button
#   - Clicking Edit opens the inline edit form with a card name input and TeamPicker
#   - TeamPicker shows "+ Add team" trigger (no old free-text team field)
#   - Clicking "+ Add team" opens a popover with a "Search teams" input
#   - Typing a team name filters results
#   - Clicking a result adds a chip to the picker
#   - Saving persists the new team name in the card's sub-line display
#   - Renaming the card name persists across save
#   - "Del" → "Confirm?" two-step delete removes the card
#
# NEO-26: The old `team` text input is gone. Team is now the TeamPicker chip-list.
# The `+ Add team` button (aria-label "Add team") opens a popover with a typeahead.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# DRILL TO PER-WORKER CUSTOM SET
# Baseball → 2024 → Topps → ed-<WORKER_INDEX> (custom set)
# Then add a custom Insert variant type and a "Base" insert under it.
# This path uses Baseball so the TeamPicker typeahead finds Yankees/Mets.
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000
- extendedWaitUntil:
    visible: "Baseball"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

- extendedWaitUntil:
    visible: ".*Search years.*"
    timeout: 60000
- scrollUntilVisible:
    element:
      text: ".*Search years.*"
    timeout: 10000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"
- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search manufacturers.*"
    timeout: 10000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"
- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

# Sets column — wait for idle (scrollUntilVisible waits for + Custom to appear).
# centerElement: true required to avoid footer click-steal at y≥489 on 1024×629.
- extendedWaitUntil:
    visible: "Sets"
    timeout: 20000
- scrollUntilVisible:
    element:
      id: "Add custom Sets"
    centerElement: true
    timeout: 120000

# Add per-worker custom Set if absent, then tap it.
- runFlow:
    when:
      notVisible: "ed-${WORKER_INDEX || 0}"
    commands:
      - tapOn:
          id: "Add custom Sets"
      - extendedWaitUntil:
          visible: "Add Custom Entry"
          timeout: 5000
      - inputText: "ed-${WORKER_INDEX || 0}"
      - pressKey: Enter
      - extendedWaitUntil:
          notVisible: "Add Custom Entry"
          timeout: 10000

# Tap the custom Set. Use search box if list is large (>8 items).
- runFlow:
    when:
      visible: ".*Search sets.*"
    commands:
      - scrollUntilVisible:
          element:
            text: "^Sets$"
          direction: UP
          centerElement: true
          timeout: 10000
      - tapOn:
          text: ".*Search sets.*"
      - inputText: "ed-${WORKER_INDEX || 0}"
      - extendedWaitUntil:
          visible:
            text: ".*ed-${WORKER_INDEX || 0}.*"
            index: 1
          timeout: 10000
      - tapOn:
          text: ".*ed-${WORKER_INDEX || 0}.*"
          index: 1
          waitToSettleTimeoutMs: 2000
      - extendedWaitUntil:
          visible: "Variant Types"
          timeout: 30000
- runFlow:
    when:
      notVisible: "Variant Types"
    commands:
      - scrollUntilVisible:
          element:
            text: ".*ed-${WORKER_INDEX || 0}.*"
          centerElement: true
          timeout: 10000
      - tapOn:
          text: ".*ed-${WORKER_INDEX || 0}.*"
          waitToSettleTimeoutMs: 2000
      - extendedWaitUntil:
          visible: "Variant Types"
          timeout: 30000

# Variant Types column — wait for idle (+ Custom button).
- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "Add custom Variant Types"
    visibilityPercentage: 100
    timeout: 30000

# Add custom Insert VT if absent, then tap it.
- runFlow:
    when:
      notVisible: "Insert"
    commands:
      - tapOn:
          id: "Add custom Variant Types"
          waitToSettleTimeoutMs: 2000
      - extendedWaitUntil:
          visible: "Add Custom Entry"
          timeout: 10000
      - inputText: "Insert"
      - pressKey: Enter
      - extendedWaitUntil:
          visible:
            text: ".*Insert.*"
          timeout: 5000

- scrollUntilVisible:
    element:
      text: "Insert"
    timeout: 10000
- tapOn: "Insert"

# Inserts column — wait for idle.
- extendedWaitUntil:
    visible:
      text: ".*Inserts.*"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    centerElement: true
    timeout: 30000

# Add a "Base" insert variant if absent, then tap it to open CardChecklist.
- runFlow:
    when:
      notVisible: "Base"
    commands:
      - tapOn:
          id: "Add custom Inserts"
      - extendedWaitUntil:
          visible: "Add Custom Entry"
          timeout: 5000
      - inputText: "Base"
      - pressKey: Enter
      - extendedWaitUntil:
          notVisible: "Add Custom Entry"
          timeout: 10000

- extendedWaitUntil:
    visible: "Base"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Base"
    centerElement: true
    timeout: 10000
- tapOn: "Base"

# Wait for the CardChecklist panel's add-card form button to appear.
- scrollUntilVisible:
    element:
      id: "Open add card form"
    centerElement: true
    visibilityPercentage: 50
    timeout: 15000

# Per-attempt-unique card number + player name. The runner injects
# ATTEMPT_ID="w<worker>-a<attempt>-<RANDOM>" so attempt-2 doesn't
# collide with attempt-1's row left in the per-worker cardChecklist.

# ============================================================
# ADD A CUSTOM CARD TO EDIT AND DELETE
# ============================================================

- tapOn:
    id: "Open add card form"
- extendedWaitUntil:
    visible:
      id: "Card name"
    timeout: 5000

# Card number input has autoFocus — type directly.
- inputText: "777-${ATTEMPT_ID}"
- tapOn: "Player name"
- inputText: "Edit Test Player ${ATTEMPT_ID}"
- tapOn:
    id: "Submit new card"

# Drive the scroll to materialize the new card in the Virtuoso list.
- scrollUntilVisible:
    element:
      text: "Edit Test Player ${ATTEMPT_ID}"
    centerElement: true
    timeout: 15000
- extendedWaitUntil:
    visible: "Edit Test Player ${ATTEMPT_ID}"
    timeout: 5000

- scrollUntilVisible:
    element:
      id: "Edit card 777-${ATTEMPT_ID}"
    centerElement: true
    visibilityPercentage: 50
    timeout: 10000

# ============================================================
# EDIT THE CARD — rename + add a team via TeamPicker
# ============================================================

- tapOn:
    id: "Edit card 777-${ATTEMPT_ID}"
    waitToSettleTimeoutMs: 2000

- extendedWaitUntil:
    visible:
      id: "Card name"
    timeout: 5000

# Rename the card.
- tapOn:
    id: "Card name"
- eraseText: 40
- inputText: "Renamed Player ${ATTEMPT_ID}"

# Open the TeamPicker popover.
- tapOn:
    id: "Add team"
- extendedWaitUntil:
    visible:
      id: "Search teams"
    timeout: 5000

# cascade/setup.yaml seeds New York Yankees + New York Mets for Baseball.
- tapOn:
    id: "Search teams"
- inputText: "Yankees"

- extendedWaitUntil:
    visible:
      id: "Add New York Yankees"
    timeout: 10000

- tapOn:
    id: "Add New York Yankees"

# Close popover by tapping card name.
- tapOn:
    id: "Card name"

# Verify the Yankees chip appeared.
- assertVisible:
    id: "Remove team New York Yankees"

# Save the edit.
- tapOn:
    id: "Save card edit"

# ============================================================
# VERIFY EDIT WAS SAVED
# ============================================================

- scrollUntilVisible:
    element:
      text: "Renamed Player ${ATTEMPT_ID}"
    centerElement: true
    timeout: 15000
- extendedWaitUntil:
    visible: "Renamed Player ${ATTEMPT_ID}"
    timeout: 5000

- assertVisible:
    text: ".*Yankees.*"

# ============================================================
# DELETE THE CARD
# ============================================================

- tapOn:
    id: "Delete card 777-${ATTEMPT_ID}"
- extendedWaitUntil:
    visible: "Confirm?"
    timeout: 5000
- tapOn:
    id: "Confirm delete card 777-${ATTEMPT_ID}"

# Delete dispatched. Row-disappearance assertion not used (parallel-run duplication risk).
