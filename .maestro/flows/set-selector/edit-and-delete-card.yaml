appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Edit and delete a card — rename, add team via TeamPicker, then delete"
tags:
  - set-selector
  - regression
  - requires:cards-loaded
---
# A user edits an existing card's name and team (using the new TeamPicker chip
# UI from NEO-26), saves, verifies changes persist, then deletes the card.
#
# WHY requires:cards-loaded:
#   This flow needs at least one real card row to be present in 2024 Topps Chrome
#   Base. The cascade cards-base.yaml flow provides that. We add our own custom
#   card so we have full control over what we edit and delete — avoids deleting
#   marketplace cards accidentally.
#
# WHAT THIS TESTS:
#   - Hovering a card row reveals the "Edit" action button
#   - Clicking Edit opens the inline edit form with a card name input and TeamPicker
#   - TeamPicker shows "+ Add team" trigger (no old free-text team field)
#   - Clicking "+ Add team" opens a popover with a "Search teams" input
#   - Typing a team name filters results
#   - Clicking a result adds a chip to the picker
#   - Saving persists the new team name in the card's sub-line display
#   - Renaming the card name persists across save
#   - "Del" → "Confirm?" two-step delete removes the card
#
# NEO-26: The old `team` text input is gone. Team is now the TeamPicker chip-list.
# The `+ Add team` button (aria-label "Add team") opens a popover with a typeahead.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# DRILL TO Baseball / 2024 / Topps Chrome / Base
# Assumes cards-loaded: cards already fetched by cascade cards-base.yaml.
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000

- extendedWaitUntil:
    visible: "Baseball"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

- extendedWaitUntil:
    visible: "Years"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search years.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search years.*"
    timeout: 10000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"
- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search manufacturers.*"
    timeout: 10000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"
- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

- extendedWaitUntil:
    visible: "Sets"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search sets.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search sets.*"
    timeout: 10000
- tapOn:
    text: ".*Search sets.*"
- inputText: "Topps Chrome"
- extendedWaitUntil:
    visible:
      text: "Topps Chrome"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps Chrome"
    index: 1

- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 20000
- extendedWaitUntil:
    visible: "Base"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Base"
    timeout: 10000
- tapOn: "Base"

# BaseMappingForm may open — handle both paths.
- extendedWaitUntil:
    visible:
      text: ".*Select Base Set.*|.*Re-map Base.*"
    timeout: 60000
- runFlow:
    when:
      visible: "Select Base Set"
    commands:
      - extendedWaitUntil:
          visible: "Confirm Base Set"
          timeout: 60000
      - tapOn: "Confirm Base Set"
      - extendedWaitUntil:
          notVisible: "Select Base Set"
          timeout: 30000

# Wait for the CardChecklist action row to become visible.
- scrollUntilVisible:
    element:
      id: "Open add card form"
    centerElement: true
    visibilityPercentage: 50
    timeout: 10000

# Per-attempt-unique card number + player name. The runner injects
# ATTEMPT_ID="w<worker>-a<attempt>-<RANDOM>" so attempt-2 doesn't
# collide with attempt-1's row left in the global cardChecklist. No
# idempotent cleanup loop needed.

# ============================================================
# ADD A CUSTOM CARD TO EDIT AND DELETE
# We add our own card so we have control over what we edit + delete.
# ============================================================

- tapOn:
    id: "Open add card form"
- extendedWaitUntil:
    visible:
      id: "Card name"
    timeout: 5000

# Card number input has autoFocus — type directly.
- inputText: "777-${ATTEMPT_ID}"
- tapOn: "Player name"
- inputText: "Edit Test Player ${ATTEMPT_ID}"
- tapOn:
    id: "Submit new card"
- extendedWaitUntil:
    visible: "Edit Test Player ${ATTEMPT_ID}"
    timeout: 10000

# Scroll the just-added card into view before tapping its Edit button —
# without this, the row can land below the viewport edge post-submit,
# and the Edit-tap coords land on a different row (the team-picker-smoke
# CI failure on PR #39 showed this exact pattern with stale scroll).
- scrollUntilVisible:
    element:
      id: "Edit card 777-${ATTEMPT_ID}"
    centerElement: true
    visibilityPercentage: 50
    timeout: 10000

# ============================================================
# EDIT THE CARD — rename + add a team via TeamPicker
# ============================================================

# The Edit button is in the hover-action row. `waitToSettleTimeoutMs`
# mitigates the virtualisation race — parallel workers' add/delete
# mutations refetch the global cardChecklist live query, shifting row
# y-coords between Maestro's lookup and tap dispatch.
- tapOn:
    id: "Edit card 777-${ATTEMPT_ID}"
    waitToSettleTimeoutMs: 2000

# The inline edit form opens with the card name input and TeamPicker.
- extendedWaitUntil:
    visible:
      id: "Card name"
    timeout: 5000

# Rename the card.
- tapOn:
    id: "Card name"
- eraseText: 40
- inputText: "Renamed Player ${ATTEMPT_ID}"

# Open the TeamPicker popover via the "+ Add team" button
# (aria-label "Add team" → resource-id in Maestro web).
- tapOn:
    id: "Add team"

# The popover opens with a search input.
- extendedWaitUntil:
    visible:
      id: "Search teams"
    timeout: 5000

# Type a team name. cascade/setup.yaml seeds New York Yankees + New York
# Mets for Baseball, so the typeahead is guaranteed to find Yankees.
- tapOn:
    id: "Search teams"
- inputText: "Yankees"

# The typeahead match button has aria-label "Add <name>". Use the explicit
# label to disambiguate from the search input's typed value.
- extendedWaitUntil:
    visible:
      id: "Add New York Yankees"
    timeout: 10000

- tapOn:
    id: "Add New York Yankees"

# The popover should still be open (stays open for multi-team cards).
# Close it by tapping outside (the overlay area) — tap the card name input.
- tapOn:
    id: "Card name"

# Verify the Yankees chip appeared in the TeamPicker area.
- assertVisible:
    id: "Remove team New York Yankees"

# Save the edit.
- tapOn:
    id: "Save card edit"

# ============================================================
# VERIFY EDIT WAS SAVED
# ============================================================

# The inline form should close and the card list should show the new name.
- extendedWaitUntil:
    visible: "Renamed Player ${ATTEMPT_ID}"
    timeout: 10000

# The sub-line of the card row should show the team name.
- assertVisible:
    text: ".*Yankees.*"

# ============================================================
# DELETE THE CARD
# ============================================================

# Tap the "Del" button on the Renamed Player card row.
- tapOn:
    id: "Delete card 777-${ATTEMPT_ID}"

# A "Confirm?" prompt replaces the "Del" button.
- extendedWaitUntil:
    visible: "Confirm?"
    timeout: 5000

# Confirm the deletion.
- tapOn:
    id: "Confirm delete card 777-${ATTEMPT_ID}"

# ============================================================
# VERIFY THE CARD WAS REMOVED
# ============================================================

# Delete dispatched (confirm delete tap above). Row-disappearance assertion
# is unreliable on per-PR Convex preview where duplicate cardName rows may
# exist from prior CI runs; the confirm-delete tap above is the actual signal.
