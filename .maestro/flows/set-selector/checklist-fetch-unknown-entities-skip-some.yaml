appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Checklist — fetch dialog; user unchecks one player; remaining entities still save"
tags:
  - set-selector
---
# Feature test: a user can uncheck individual unknown players or teams
# before confirming. Skipped names are NOT created as entities but cards
# are still saved with the name as free text.
#
# WHAT THIS TESTS:
#   - Tapping a player name in the dialog toggles its checkbox off
#   - The footer "N of M will be created" count decreases after unchecking
#   - Confirming with a partial selection still saves all cards
#   - The "Saved N cards." message appears after confirm
#
#
# RE-RUN SAFETY:
#   Player names and card name use ${ATTEMPT_ID} (unique per harness attempt,
#   e.g. "w0-a3-4291"). They are therefore always unknown on every run —
#   no fresh-DB precondition required. The flow is safe to re-run on the
#   persistent dev Convex without a manual reset.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"

# Per-attempt unique suffix — injected by the queue harness (w<worker>-a<attempt>-<rand>).
# Fallback for local runs not using the harness.
- evalScript: ${output.ATTEMPT_ID = output.ATTEMPT_ID || String(Date.now()).slice(-4)}

# ============================================================
# DRILL TO A BASE VARIANT WITH EMPTY CHECKLIST
# ============================================================

- runFlow:
    file: util-drill-to-base-variant.yaml

# ============================================================
# ADD A CUSTOM CARD WITH TWO UNIQUE PLAYER NAMES
# Guarantees the dialog opens with multiple unknown players so the
# "uncheck one player, others still save" semantic can be exercised
# regardless of what other tests have already committed to the global
# `players` table. The custom card's players go through
# fetchCardChecklist reconciliation via cardChecklist.pendingPlayerNames.
# ============================================================

- scrollUntilVisible:
    element:
      text: "Add Card"
    centerElement: true
- tapOn: "Add Card"
# Wait for the form to open. "Player name" is the card-name input's
# placeholder (still rendered visually).
- extendedWaitUntil:
    visible: "Player name"
- inputText: "9${ATTEMPT_ID}"
# Address inputs by aria-label (via Maestro's `id:` selector, which matches
# the accessibility-tree identifier). Placeholders overlap ("Player name",
# "Player(s) — comma separated, optional") and Maestro's text matcher cannot
# disambiguate them reliably — see NEO-13 root cause.
- tapOn:
    id: "Card name"
- inputText: "Skip Some Test ${ATTEMPT_ID}"
# Scroll anchor uses the visible placeholder text; tap target uses the
# aria-label via `id:`.
- scrollUntilVisible:
    element:
      text: "Player(s) — comma separated, optional"
    centerElement: true
- tapOn:
    id: "Players"
- inputText: "USPlayerA-${ATTEMPT_ID}, USPlayerB-${ATTEMPT_ID}"
# Defensive: confirm at least one of the typed player names landed on the
# form before submitting. Fails fast if input targeting regresses. Regex
# wildcards needed because Maestro's plain-text assertVisible is full
# match — the input value renders as the comma-joined string, not the
# single name.
- assertVisible:
    text: ".*USPlayerA-${ATTEMPT_ID}.*"
# Two comma-separated chips wrap the Player(s) input, growing the form's
# height. Combined with prior custom cards stacked above in the checklist,
# the form's "Add" submit button can land below the 629px viewport. Maestro
# `tapOn` does not auto-scroll, so anchor on the submit button first.
# Plain "Add" is unambiguous: Maestro text matchers are full-match, so it
# binds to the submit button (text exactly "Add") and ignores the form
# header "Add Card".
- scrollUntilVisible:
    element:
      text: "Add"
    centerElement: true
- tapOn:
    text: "Add"
# After submit the form closes and the new card row renders in the
# virtualized checklist (react-virtuoso). Where the row lands depends on
# the checklist's existing length, so scroll to anchor on the new card's
# title rather than assuming it lands inside the current viewport.
- scrollUntilVisible:
    element:
      text: "Skip Some Test ${ATTEMPT_ID}"

# ============================================================
# TRIGGER THE FETCH AND WAIT FOR THE DIALOG
# ============================================================

# Scroll anchor strategy: after the add-card preamble scrolled DOWN to
# find the new custom card row, the Sync button ("Refresh") can end up at
# the very top of the DOM. When centerElement is applied to the Sync button
# itself, the 1024x629 headless viewport places it at y~17-49, fully
# inside the 64px-tall sticky binder-header (z-20). The header overlay
# absorbs the tap and fetchCardChecklist never fires (CI failure on aff6ff8).
#
# Fix: scroll UP to "Add Card" (the CardChecklist header button). "Add Card"
# and "Sync card checklist" are in the same flex row — centering "Add Card"
# at mid-viewport (~y=315) puts the Sync button at the same y. This is the
# same pattern used in multi-source-panel-opens-dialog.yaml (line 167-172).
# visibilityPercentage: 50 matches the multi-source flow's exact params.
- scrollUntilVisible:
    element:
      text: "Add Card"
    direction: UP
    centerElement: true
    visibilityPercentage: 50
- extendedWaitUntil:
    visible:
      id: "Sync card checklist"
# Tap the CardChecklist's Fetch/Refresh button by aria-label. Plain
# `text: ".*Refresh"` regex matched a different Refresh element on the
# page (NEO-13 root cause).
- tapOn:
    id: "Sync card checklist"
- extendedWaitUntil:
    visible: "Confirm New Players & Teams"
    timeout: 60000

# Verify the dialog has at least one unknown player to uncheck.
- assertVisible:
    text: ".*New Players [(][1-9][0-9]*[)].*"

# ============================================================
# SKIP ONE PLAYER ROW — prove the decrement re-run-safely (capture & compare)
# Both player names were injected by this flow and are unique per attempt:
# USPlayerA-${ATTEMPT_ID} and USPlayerB-${ATTEMPT_ID}. Tap the USPlayerA row
# by its exact unique name — precise and readable.
#
# WHY NOT A HARDCODED COUNT (the old `.*1 will be created.*`):
#   The footer "N of M will be created" count is GLOBAL — it sums EVERY
#   unknown player the fetch surfaced, including stale players left in the
#   shared `players` table by earlier attempts. On a non-fresh DB the count
#   is NOT 2 (we observed "7 of 8" and "10 of 10"), so a fixed "1 will be
#   created" is false and contradicts this flow's own RE-RUN SAFETY header.
#
# WHY NOT ASSERT THE CHECKBOX STATE DIRECTLY:
#   The dialog's per-row checkbox is a bare native <input type=checkbox> with
#   NO aria-label / accessible name (UnknownEntitiesDialog.tsx). Its checked
#   state does NOT reach Maestro's accessibility tree — the row node is just
#   `text=USPlayerA-..., checked=null` and the "line-through" is CSS-only —
#   so there is no per-row checked signal to target.
#
# WHAT WE DO INSTEAD (re-run-safe, works whether N starts at 2 or 10):
#   Capture the footer's current "to be created" count, then after unchecking
#   exactly one player assert the count dropped by exactly one. This proves
#   the row toggled off regardless of how many stale players are present.
# ============================================================

# Footer reads "<included> of <total> will be created." (all players are
# included by default, so included == total here). Capture that footer line.
- copyTextFrom:
    text: ".*of [0-9]+ will be created.*"
# Compute the EXPECTED count after one uncheck = the first integer minus one.
# Same evalScript/output.* precedent as the ATTEMPT_ID line above (~line 34).
- evalScript: ${output.EXPECTED_INCLUDED = parseInt(maestro.copiedText.match(/[0-9]+/)[0], 10) - 1}

- scrollUntilVisible:
    element:
      text: ".*USPlayerA-${ATTEMPT_ID}.*"
    centerElement: true
# Tap USPlayerA to uncheck (skip) it.
- tapOn:
    text: ".*USPlayerA-${ATTEMPT_ID}.*"

# R2 — Prove the "skip some" semantic: the footer's "to be created" count
# MUST now read exactly one less than before. Passes ONLY if unchecking
# USPlayerA dropped the count by one — re-run-safe for any starting count.
- assertVisible:
    text: ".*${output.EXPECTED_INCLUDED} of [0-9]+ will be created.*"

# ============================================================
# CONFIRM — save with the remaining (non-skipped) entities
# ============================================================

# Exactly one entity remains checked: the button must read "Confirm N & Save"
# (not "Skip All & Save" — we did NOT uncheck all of them).
# The |Skip All & Save fallthrough is REMOVED: its presence hid the R2 bug
# by letting the flow green when zero entities were left (wrong semantic).
# Anchor scroll first (R8): after tapping a player row the modal can shift;
# centering the confirm button guarantees it is in the tap zone.
- scrollUntilVisible:
    element:
      text: ".*Confirm [0-9]+ & Save.*"
    centerElement: true
- tapOn:
    text: ".*Confirm [0-9]+ & Save.*"

- extendedWaitUntil:
    notVisible: "Confirm New Players & Teams"

# ============================================================
# VERIFY CARDS SAVED SUCCESSFULLY
# Cards always save — only entity creation is selective.
# ============================================================

- extendedWaitUntil:
    visible:
      text: ".*Saved [0-9]+ cards.*"

- assertVisible:
    text: ".*#[0-9].*"
