url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: Set Selector Empty State — No Options Available
tags:
  - set-selector
  - regression
  - wip
  - isolated:true
  - serial-global
---
# CATEGORY-3 REGRESSION — NEEDS HUMAN APPROVAL BEFORE FIX CAN BE APPLIED
#
# Root cause: change 1 (auto-sync of empty columns).
# EntityColumn now flips mode to "sync" via useEffect the moment it renders
# with an empty items list. This means the "Sync Sports" button is never
# in the idle state when the column is empty — the form takes over immediately.
#
# What broke:
#   - Line 33: assertVisible: "Sync Sports" → fails on empty column (button replaced by form)
#   - Line 67: tapOn: "Sync Sports" → button is not in the DOM when column is empty
#   - Line 87: assertVisible: "Sync Sports" → same issue
#
# Semantic intent of this flow (verify Sports column shows idle buttons before
# any sync has run) can no longer be tested because the idle state with
# "Sync Sports" visible only exists after data is already present.
#
# Proposed new test (requires human review of expected UX):
#   Option A: Remove this flow — the "idle before sync" state no longer exists.
#   Option B: Restructure to "verify auto-sync fires and completes on empty column"
#             (new empty-state: column empty → auto-sync form appears → form closes
#             → list populates). This tests a different UX than the original.
#   Option C: Keep the flow but seed Sports data first (pre-populate), then assert
#             "Sync Sports" is visible below the list (non-empty idle state).
#
# DO NOT apply a fix here without human approval — the semantic intent changes.
#
# --- original description below ---
# This test verifies the empty state message that appears when the Sports
# column has no entries yet (nothing has been synced or added manually).
#
# Rather than clearing all data (which would affect other users in shared
# environments), this test looks for the empty-state text on a fresh
# account or accepts that the list might already be populated.
# The primary goal is to confirm the page loads correctly and that
# the empty state text matches what the code renders.
#
# Note: This test is most meaningful on a freshly-created test account.
# On an account with existing data it still validates the page layout.

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# Page loads and shows the Sports column header + action buttons
# ============================================================

# The Sports column is always visible even when empty
- assertVisible: "Sports"

# The "Sync Sports" and "+ Custom" buttons are always present
- assertVisible: "Sync Sports"
- assertVisible: "+ Custom"

# If the list is empty, the empty-state message should be visible
# Text from EntitySelector: "No sports available. Sync from marketplaces to populate."
- runFlow:
    when:
      notVisible: "BSC"
    commands:
      - assertVisible: ".*[Nn]o sports available.*"

# ============================================================
# Columns downstream of Sports must NOT be visible yet
# ============================================================

# Years, Manufacturers, Sets, Set Variants, and Cards columns only appear
# after their parent level has been selected. On an empty page none of
# these should be visible.
- assertNotVisible: "Years"
- assertNotVisible: "Manufacturers"
# "Sync Sets" is the button label for the Sets column — checking for it
# is more precise than "Sets" which could match "Set Selector" in the heading
- assertNotVisible: "Sync Sets"
- assertNotVisible: "Set Variants"
- assertNotVisible: "Cards"

# ============================================================
# Sync form auto-fires: "Close" or "Cancel"+"Retry" returns user to idle
# ============================================================

# Open the sync form — it auto-fires immediately.
# While syncing the heading "Syncing Sport Options" is shown.
# On success the form shows a "Close" button; on error it shows
# "Retry" and "Cancel". Tapping either dismiss returns "Sync Sports".
- tapOn: "Sync Sports"
- extendedWaitUntil:
    visible: "Syncing Sport Options"
    timeout: 5000

# Wait for the sync to settle — either "Close" (success) or "Cancel" (error)
# appears once the sync is no longer running.
- extendedWaitUntil:
    visible: ".*Close|Cancel.*"
    timeout: 45000

# Dismiss the form — tap "Close" on success or "Cancel" on error
- tapOn:
    text: ".*Close|Cancel.*"
    index: 0

# The idle state with "Sync Sports" button should return
- extendedWaitUntil:
    visible: "Sync Sports"
    timeout: 5000
- assertVisible: "Sync Sports"

# ============================================================
# Cancel button in custom entry form returns user to idle state
# ============================================================

- tapOn: "+ Custom"
- extendedWaitUntil:
    visible: "Add Custom Entry"
    timeout: 5000

- tapOn: "Cancel"
- extendedWaitUntil:
    visible: "+ Custom"
    timeout: 5000
- assertVisible: "+ Custom"
