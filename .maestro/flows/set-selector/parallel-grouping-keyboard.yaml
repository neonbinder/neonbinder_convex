appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Parallel Grouping — modal close via Cancel button and backdrop tap"
tags:
  - parallel-grouping
  - regression
  - requires:setup-done
---
# Feature test: modal close mechanisms.
#
# USER PREFERENCE: Every flow must be fully keyboard-operable.
#
# NOTE ON ESCAPE KEY:
#   Maestro's web driver does not dispatch keyboard events that reach
#   `window.addEventListener("keydown")` handlers. The Escape key handler
#   registered in ParallelGroupingModal cannot be tested via `pressKey: Escape`
#   in Maestro web. The Escape integration is therefore covered by unit tests
#   in the component. This flow covers the two close mechanisms that Maestro
#   web CAN test reliably:
#
#     1. Cancel button (keyboard users can Tab to it and press Enter)
#     2. Backdrop tap (mouse users click outside the modal panel)
#
# Both paths call the same onClose callback, so if either works, the modal
# teardown logic is confirmed.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# ENSURE BSC CREDENTIALS PRESENT
# checklist-fetch-bsc-no-seller-id (cascade dep-graph sibling) clears
# this worker's BSC creds and may fail before its own restore step
# runs, leaving the worker with no creds. The variantType auto-sync
# for our per-test SET (Topps Pro Debut, etc.) needs BSC to populate
# Base/Insert/Parallel; without creds it returns 0 options and "Base"
# never appears. setup-bsc-credentials is idempotent — sees "Clear
# Credentials" and skips when creds are already saved.
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 20000
- runFlow:
    file: ../profile/setup-bsc-credentials.yaml
    env:
      BSC_USERNAME: ${BSC_USERNAME}
      BSC_PASSWORD: ${BSC_PASSWORD}

# ============================================================
# DRILL TO INSERT VARIANT TYPE
# ============================================================

- runFlow:
    file: util-drill-to-insert-variants.yaml
    env:
      # Per-test sport isolation — selectorOptions is a global Convex
      # table; using a unique Sport per test keeps each test's custom
      # variants under a distinct (Sport, Year, Manuf, Set, VariantType)
      # parent so they don't pollute each other across CI runs.
      SPORT: "Baseball"
      YEAR: "2024"
      MANUFACTURER: "Topps"
      SET: "Topps Pro Debut"
      BSC_USERNAME: ${BSC_USERNAME}
      BSC_PASSWORD: ${BSC_PASSWORD}
      SPORTLOTS_USERNAME: ${SPORTLOTS_USERNAME}
      SPORTLOTS_PASSWORD: ${SPORTLOTS_PASSWORD}

# ============================================================
# CLOSE VIA CANCEL BUTTON
# ============================================================

- scrollUntilVisible:
    element:
      text: "Group Parallels"
- tapOn: "Group Parallels"

- extendedWaitUntil:
    visible:
      text: ".*Drag inserts under a parent.*"
    timeout: 10000

# Verify Cancel and No changes buttons are both present in the footer
- assertVisible: "Cancel"
- assertVisible: "No changes"

# Close via the Cancel button (keyboard users Tab to this and press Enter)
- tapOn: "Cancel"

- extendedWaitUntil:
    notVisible:
      text: ".*Drag inserts under a parent.*"
    timeout: 10000

# Back on the set selector
- assertVisible: "Variants"

# ============================================================
# CLOSE VIA BACKDROP TAP
# (Tests the onClick={onClose} on the outer fixed-inset overlay div)
# ============================================================

- scrollUntilVisible:
    element:
      text: "Group Parallels"
- tapOn: "Group Parallels"

- extendedWaitUntil:
    visible:
      text: ".*Drag inserts under a parent.*"
    timeout: 10000

# Tap the backdrop (far left edge of the overlay, outside the modal panel)
- tapOn:
    point: "2%, 50%"

- extendedWaitUntil:
    notVisible:
      text: ".*Drag inserts under a parent.*"
    timeout: 10000

- assertVisible: "Variants"
