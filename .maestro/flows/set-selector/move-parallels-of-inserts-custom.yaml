appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Move parallels-of-inserts — custom set; add Stars/Stars Gold/Stars Red, group, save"
tags:
  - set-selector
  - regression
---
# PRODUCT-FEATURE test: NEST parallels under an insert. Add three custom inserts
# to a per-flow playground, open the Group Parallels modal, accept the
# auto-suggestions, and save the groupings.
#
# Self-contained under E2E Test Sport ${WORKER_INDEX} → 2026 → pg-move-<worker>
# (a fully custom subtree — every column's sync short-circuits, no live BSC/SL).
# Every wait is the 7s default; the util owns the cold custom-subtree drill.
#
# WHAT THIS TESTS:
#   - Three custom inserts can be added and grouped via the modal.
#   - Accept All + Save works end-to-end and closes the modal.
#   - "Stars" remains the top-level insert; Stars Gold / Stars Red nest under it.

- launchApp
- assertVisible: "Set Selector"

# Drill to a per-flow custom set; returns on the Inserts column (idle).
- runFlow:
    file: util-drill-to-custom-set.yaml
    env:
      SET_NAME: "pg-move-${WORKER_INDEX || 0}"
      VARIANT_TYPE: "Insert"

# ── ADD THREE CUSTOM INSERTS (Stars / Stars Gold / Stars Red) ───────────────
# aria-label id targeting ("Add custom Inserts" maps to resource-id in web).
# --- Stars ---
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    centerElement: true
- tapOn:
    id: "Add custom Inserts"
- assertVisible: "Add Custom Entry"
- inputText: "Stars"
- pressKey: Enter
- assertNotVisible: "Add Custom Entry"

# --- Stars Gold ---
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    visibilityPercentage: 50
- tapOn:
    id: "Add custom Inserts"
- assertVisible: "Add Custom Entry"
- inputText: "Stars Gold"
- pressKey: Enter
- assertNotVisible: "Add Custom Entry"

# --- Stars Red (third entry keeps the Group Parallels button layout stable) ---
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    visibilityPercentage: 50
- tapOn:
    id: "Add custom Inserts"
- assertVisible: "Add Custom Entry"
- inputText: "Stars Red"
- pressKey: Enter
- assertNotVisible: "Add Custom Entry"

# ── OPEN GROUP PARALLELS MODAL ──────────────────────────────────────────────
- scrollUntilVisible:
    element:
      text: "Group Parallels"
- tapOn: "Group Parallels"
- assertVisible: ".*Drag inserts under a parent.*"
- assertVisible: "Top-level inserts"

# Auto-suggestions: Stars Gold + Stars Red suggested as parallels of Stars.
- assertVisible: "Suggested"
- assertVisible: ".*Accept all suggestions.*"

# ── ACCEPT ALL + SAVE ───────────────────────────────────────────────────────
- tapOn: ".*Accept all suggestions.*"
- assertVisible: ".*Save [0-9]+ change.*"
- tapOn: ".*Save [0-9]+ change.*"

# Modal closes on save ("Drag inserts under a parent" disappears).
- assertNotVisible: ".*Drag inserts under a parent.*"

# ── VERIFY POST-SAVE STATE: Stars remains the top-level insert ──────────────
- assertVisible: "Inserts"
- assertVisible: "Stars"
