url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/profile&worker=${WORKER_INDEX || "0"}
name: Set Selector Smoke Test
# Demoted to regression tier (see PR description on the e2e-ci branch).
# Writes real marketplace credentials via setup-bsc-credentials /
# setup-sportlots-credentials, which currently hit prod Secret Manager
# because Convex preview deployments inherit env vars from the prod
# deployment. Promote back to the PR-gate tier once preview credential
# writes are routed to the dev browser service.
tags:
  - regression
  - set-selector
  - serial-marketplace
---
- launchApp
- extendedWaitUntil:
    visible: "Neon Binder"
    timeout: 45000

# --- Set up marketplace credentials for the test user ---
# Credentials are seeded ONCE per worker by the Phase-0 bootstrap
# (worker-bootstrap.yaml). The setup-* runFlows below are no-ops when
# "Clear Credentials" is already visible (idempotent). They are kept here
# so the flow's credential-gate smoke path still exercises the profile page.
- runFlow:
    file: ../profile/setup-bsc-credentials.yaml

- runFlow:
    file: ../profile/setup-sportlots-credentials.yaml

# ============================================================
# CREDENTIAL WARMING
# seed-credentials already saved real BSC + SL credentials server-side.
# Warm the Puppeteer session tokens so the "Sync Sports" marketplace fetch
# uses a live session and doesn't trigger a fresh ~20s login mid-flow,
# which would cause the "Sync Sports" wait to time out.
# Both warm utils cost ~0.5s when the token is already cached.
# ============================================================

- runFlow:
    file: ../util/util-login-to-bsc.yaml

- runFlow:
    file: ../util/util-login-to-sportlots.yaml

# Navigate to the Set Selector page
- openLink: ${APP_URL || "https://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 15000

# Verify the Sport selector column is present
- assertVisible: "Sports"

# Scroll "Sync Sports" into view with a relaxed visibility threshold.
# The 1024×629 headless viewport places this button at x=-2 (2px off the
# left edge), giving it ~98% visibility. The default 100% threshold causes
# Maestro to attempt a centering scroll which triggers a CDP
# MismatchedInputException when the element is already at the viewport edge.
# visibilityPercentage: 50 accepts the 98%-visible element without triggering
# the problematic re-center scroll. centerElement is intentionally absent.
- scrollUntilVisible:
    element:
      text: "Sync Sports"
    visibilityPercentage: 50
    timeout: 10000
- extendedWaitUntil:
    visible: "Sync Sports"
    timeout: 5000
- assertVisible: "Sync Sports"
- assertVisible: "\\+ Custom"

# Trigger a marketplace sync for Sports.
# The form auto-fires immediately on open — no "Sync from Marketplaces" button.
# The heading "Syncing Sport Options" appears while the sync runs.
# On success the form closes automatically. "Sync Sports" reappears below
# the populated list once ALL platforms have responded — scroll to it as
# the completion signal so we don't proceed before BSC data merges in.
- tapOn: "Sync Sports"
- extendedWaitUntil:
    visible:
      text: ".*Syncing Sport Options|Sync Sports.*"
    timeout: 15000
# Re-finding "Sync Sports" is the completion signal — the button is hidden
# while the sync is in flight and reappears below the populated list once
# all platforms respond. visibilityPercentage: 50 matches the rest of this
# flow (1-2 px viewport-edge clipping fails the strict default 100).
- scrollUntilVisible:
    element:
      text: "Sync Sports"
    visibilityPercentage: 50
    timeout: 60000

# Verify sports were synced from both platforms.
# SL/BSC pills now appear only on terminal items (Base variantType rows, Variants,
# parallels) — non-terminal levels like Sports no longer show pills.
# "Baseball" appearing confirms marketplace data was written to the Sports column.
- assertVisible: "Baseball"
