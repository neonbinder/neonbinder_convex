appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Insert variant flow — 2024 Topps Chrome Insert sync opens ReconciliationModal"
tags:
  - set-selector
  - regression
  - requires:setup-done
---
# Canonical test for the "Insert" variant type code path.
# End-user goal: user drills to 2024 Topps Chrome, picks "Insert" as the
# variant type, syncs variants, and sees the ReconciliationModal with
# auto-matched + unmatched rows. User reviews the modal and cancels —
# we do NOT write thousands of variant rows on every CI run.
#
# This is one of three merge-blocking flows for the variant-level set-sync milestone.
#
# ReconciliationModal appears when BOTH BSC and SL have data for the selected
# variant type. 2024 Topps Chrome Insert has strong coverage on both platforms.
#
# IDEMPOTENCY: On re-runs, Insert variants may already be synced. In that case
# the test skips the sync step and the ReconciliationModal check, and instead just
# verifies the Variants column has populated data. This matches real user behavior:
# a user who has already synced does not need to sync again.
#
# ReconciliationModal heading: "Reconcile Variants" (level="insert" in code)
# The same modal as Parallel, but scoped to the Insert variant type.
# The modal shows matched rows, unmatched BSC-only rows, and unmatched SL-only rows.
# Users can drag to link, or click BSC then SL to pair them manually.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# PREREQUISITE: credentials + drill to 2024 Topps Chrome
# Returns with Variant Types column visible and list populated.
# ============================================================

- runFlow:
    file: util-drill-to-2024-topps-chrome.yaml
    env:
      BSC_USERNAME: ${BSC_USERNAME}
      BSC_PASSWORD: ${BSC_PASSWORD}
      SPORTLOTS_USERNAME: ${SPORTLOTS_USERNAME}
      SPORTLOTS_PASSWORD: ${SPORTLOTS_PASSWORD}

# ============================================================
# LEVEL 5 — Select "Insert" variant type
# ============================================================

- scrollUntilVisible:
    element:
      text: "Insert"
    timeout: 10000
- tapOn: "Insert"

# ============================================================
# LEVEL 6 — Sync Variants and verify ReconciliationModal (first run only)
# ============================================================

- extendedWaitUntil:
    visible: "Inserts"
    timeout: 10000

# Only enter the sync verification block if the Inserts column is empty.
# When the column renders empty, EntityColumn auto-fires the sync form
# (mode flips to "sync" via useEffect) — so "Sync Inserts" is never
# tappable in that state. We just wait for the ReconciliationModal that
# auto-sync produces instead.
# If inserts are already synced from a previous run, the block is skipped.
- runFlow:
    when:
      visible: "No variants available. Sync from marketplaces to populate."
    commands:
      # Auto-sync fires the VariantForm immediately when the column is empty.
      # The VariantForm fetches both BSC and SL data then opens the
      # ReconciliationModal. Wait up to 240 seconds — the browser service
      # makes network calls to both platforms and can be slow on cold sessions.
      # Local runs have recorded 213s total flow time; 240s provides margin.
      - extendedWaitUntil:
          visible: "Reconcile Inserts"
          timeout: 240000

      # ============================================================
      # VERIFY ReconciliationModal contents
      # ============================================================

      # The modal heading for Insert type is "Reconcile Inserts" (level="insert")
      - assertVisible: "Reconcile Inserts"

      # The subtitle shows matched/unmatched counts — e.g. "25 matched, 22 BSC-only, 2504 SL-only"
      # Numbers drift as marketplace data changes; assert the structural pattern only.
      - assertVisible:
          text: ".*[0-9]+ matched.*BSC-only.*SL-only.*"

      # The unmatched section header with drag-to-link instruction.
      # The full rendered text is "Unmatched — drag to link, or drag down to
      # 'keep as platform-only'" — use regex to match it regardless of the
      # trailing instruction text (which could change as copy is updated).
      - scrollUntilVisible:
          element:
            text: ".*Unmatched.*"
          timeout: 10000
      - assertVisible:
          text: ".*Unmatched.*"

      # BSC column header in the unmatched section — rendered as "BSC (N)" with a count suffix
      - assertVisible:
          text: ".*BSC.*"

      # SportLots column header in the unmatched section — rendered as "SportLots (N of M)" with count suffix
      - assertVisible:
          text: ".*SportLots.*"

      # The save button shows the matched count — "Save N matched"
      - scrollUntilVisible:
          element:
            text: ".*Save [0-9]+ matched.*"
          timeout: 10000
      - assertVisible:
          text: ".*Save [0-9]+ matched.*"

      # ============================================================
      # CANCEL — do not write thousands of variant rows on every CI run
      # ============================================================

      - scrollUntilVisible:
          element:
            text: "Cancel"
          timeout: 5000
      - tapOn: "Cancel"

      # Modal closes; we're back at the set selector
      - extendedWaitUntil:
          notVisible: "Reconcile Inserts"
          timeout: 10000

# ============================================================
# VERIFY the Inserts column is populated (both first-run and re-run)
# ============================================================

# After either confirming (first run) or skipping (re-run), the Inserts
# column should have at least one entry visible.
- assertVisible: "Set Selector"
- assertVisible: "Inserts"
