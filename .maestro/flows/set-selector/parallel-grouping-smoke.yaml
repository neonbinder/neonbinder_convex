appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector
name: "Parallel Grouping — smoke open modal and cancel"
tags:
  - smoke
  - parallel-grouping
---
# Smoke test for the Group Parallels feature.
#
# Critical happy path: user drills to a non-Base variant type, clicks
# "Group Parallels", sees the modal render, and closes it with Cancel.
#
# This test deliberately does NOT require inserts to be synced/saved first.
# The modal opens regardless — it simply shows an empty or loading state.
# The "Group Parallels" button is visible whenever a non-Base variantType
# is selected, which is the gate condition the smoke verifies.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# DRILL TO INSERT VARIANT TYPE (via util)
# Returns with the Variants column visible and "Group Parallels" button
# present in the Variants column action row.
# ============================================================

- runFlow:
    file: util-drill-to-insert-variants.yaml
    env:
      BSC_USERNAME: ${BSC_USERNAME}
      BSC_PASSWORD: ${BSC_PASSWORD}
      SPORTLOTS_USERNAME: ${SPORTLOTS_USERNAME}
      SPORTLOTS_PASSWORD: ${SPORTLOTS_PASSWORD}

# ============================================================
# OPEN THE MODAL
# The "Group Parallels" button sits in the action row of the Variants
# column, alongside "Sync Variants" and "+ Custom".
# ============================================================

# Scroll to make the button fully visible before tapping.
# The Variants column action row can be near the right edge of the viewport;
# scrollUntilVisible brings the button into view for a reliable tap.
- scrollUntilVisible:
    element:
      text: "Group Parallels"
- tapOn: "Group Parallels"

# ============================================================
# VERIFY MODAL RENDERED
# The modal backdrop and header are always present once the modal opens.
# The body may show a loading skeleton while the tree query resolves.
# ============================================================

# Wait for the modal description text — unique to the modal (unlike "Group Parallels"
# which also appears on the action-row button in the Variants column).
- extendedWaitUntil:
    visible:
      text: ".*Drag inserts under a parent.*"
    timeout: 10000

# Confirm the description text is present
- assertVisible:
    text: ".*Drag inserts under a parent.*"

# The footer always renders a Cancel button and a disabled Save button.
- assertVisible: "Cancel"
- assertVisible: "No changes"

# Footer status: "No changes yet" when no user action has been taken.
- assertVisible: "No changes yet"

# ============================================================
# CLOSE WITH CANCEL
# Verify the modal disappears after tapping Cancel.
# ============================================================

- tapOn: "Cancel"
- extendedWaitUntil:
    notVisible:
      text: ".*Drag inserts under a parent.*"
    timeout: 10000

# Back on the set selector — Variants column heading still visible.
- assertVisible: "Variants"
