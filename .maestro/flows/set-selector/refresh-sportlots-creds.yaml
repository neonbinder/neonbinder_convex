url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/profile&worker=${WORKER_INDEX || "0"}
name: Refresh SportLots credentials
tags:
  - set-selector
  - wip
  - serial-global
---
# Refreshes the SportLots session for the test user. Bypasses the native
# <select> dropdown by setting its value via JS, then dispatching a change
# event so React picks it up.
#
# Uses fake credentials for form-typing coverage only (no real secrets in
# Maestro env). Asserts the "saved but auth failed" state, not "saved successfully".

- launchApp
- extendedWaitUntil:
    visible: "Neon Binder"
    timeout: 45000

# Center the "Sportlots" tab rather than stopping at "Select Platform".
# The tab row sits at y≈612–650, which falls at or below the 1024×629 headless
# viewport fold. Scrolling to the heading leaves the tab at the very bottom edge,
# causing tapOn to invoke Maestro's scrollToPoint which trips the CDP
# empty-response flake. Centering the tab puts it near y≈315 so the subsequent
# tapOn needs no implicit scroll.
- scrollUntilVisible:
    element:
      text: "Sportlots"
    centerElement: true
    timeout: 20000

# Switch to Sportlots tab in the platform tablist. Was previously a
# native <select> with a keyboard-pick workaround; now role="tab"
# buttons render the platform options as visible labels that Maestro
# can tap directly.
- tapOn: "Sportlots"

- extendedWaitUntil:
    visible: ".*Sportlots Credentials.*"
    timeout: 10000

# If creds already exist, clear them first (force fresh login)
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    timeout: 5000
    optional: true
- runFlow:
    when:
      visible: "Clear Credentials"
    commands:
      - tapOn: "Clear Credentials"
      - extendedWaitUntil:
          visible: ".*Yes, Clear.*"
          timeout: 5000
      - tapOn: "Yes, Clear"
      - extendedWaitUntil:
          visible: ".*Credentials cleared.*"
          timeout: 15000

# Now enter fresh SL creds
- scrollUntilVisible:
    element:
      text: ".*Sportlots Username.*"
    timeout: 10000
- tapOn:
    id: "username"
- inputText: "e2e-fake-user"
- tapOn:
    id: "password"
- inputText: "e2e-fake-pass"
- scrollUntilVisible:
    element:
      text: "Save Credentials"
    timeout: 10000
- tapOn: "Save Credentials"
- extendedWaitUntil:
    visible: ".*Credentials were saved.*authentication failed.*"
    timeout: 30000
