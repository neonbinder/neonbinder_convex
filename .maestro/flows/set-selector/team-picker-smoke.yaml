appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Smoke — TeamPicker opens, typeahead filters, chip saved"
tags:
  - smoke
  - set-selector
  - requires:cards-loaded
---
# Smoke test for the NEO-26 TeamPicker chip-list component.
#
# The old free-text "team" input is gone. The TeamPicker renders as a
# chip row with a "+ Add team" trigger that opens a typeahead popover.
#
# This smoke test covers the single critical path:
#   Edit a card → open TeamPicker popover → search → pick a team → save →
#   verify the team name appears in the card's sub-line.
#
# Assumes cards-loaded: at least one card row is present in the checklist
# (provided by cascade cards-base.yaml). We add our own custom card so
# we don't accidentally delete a marketplace card.

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# Fast-drill to Baseball / 2024 / Topps Chrome / Base (cards already loaded).
- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000
- extendedWaitUntil:
    visible: "Baseball"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

- extendedWaitUntil:
    visible: ".*Search years.*"
    timeout: 60000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"
- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
    timeout: 30000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"
- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

- extendedWaitUntil:
    visible: ".*Search sets.*"
    timeout: 30000
- tapOn:
    text: ".*Search sets.*"
- inputText: "Topps Chrome"
- extendedWaitUntil:
    visible:
      text: "Topps Chrome"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps Chrome"
    index: 1

- extendedWaitUntil:
    visible: "Base"
    timeout: 30000
- tapOn: "Base"

- extendedWaitUntil:
    visible:
      text: ".*Select Base Set.*|.*Re-map Base.*"
    timeout: 60000
- runFlow:
    when:
      visible: "Select Base Set"
    commands:
      - tapOn: "Confirm Base Set"
      - extendedWaitUntil:
          notVisible: "Select Base Set"
          timeout: 30000

- scrollUntilVisible:
    element:
      id: "Open add card form"
    centerElement: true
    visibilityPercentage: 50
    timeout: 10000

# Per-attempt-unique card number + player name. The runner injects
# ATTEMPT_ID="w<worker>-a<attempt>-<RANDOM>" so attempt-2 doesn't
# collide with attempt-1's row left in the global cardChecklist. No
# idempotent cleanup loop needed when names are unique per attempt.

# Add a custom card to use as the edit target.
- tapOn:
    id: "Open add card form"
- extendedWaitUntil:
    visible:
      id: "Card name"
    timeout: 5000
- inputText: "888-${ATTEMPT_ID}"
- tapOn: "Player name"
- inputText: "Team Smoke Player ${ATTEMPT_ID}"
- tapOn:
    id: "Submit new card"
- extendedWaitUntil:
    visible: "Team Smoke Player ${ATTEMPT_ID}"
    timeout: 10000

# Scroll the just-added card into view before tapping its Edit button.
# Without this, the row may be below the viewport edge after submit,
# and the Edit-tap coords land on a different row (the team-picker-smoke
# CI failure on PR #39 showed this exact pattern with stale scroll).
- scrollUntilVisible:
    element:
      id: "Edit card 888-${ATTEMPT_ID}"
    centerElement: true
    visibilityPercentage: 50
    timeout: 10000

# Open the edit form.
- tapOn:
    id: "Edit card 888-${ATTEMPT_ID}"
- extendedWaitUntil:
    visible:
      id: "Card name"
    timeout: 5000

# The old "Team" text input does NOT exist. The TeamPicker renders instead.
# "+ Add team" button (aria-label "Add team") is the popover trigger.
- assertVisible:
    id: "Add team"

# Open the popover.
- tapOn:
    id: "Add team"
- extendedWaitUntil:
    visible:
      id: "Search teams"
    timeout: 5000

# Search for "Yankees".
- tapOn:
    id: "Search teams"
- inputText: "Yankees"
- extendedWaitUntil:
    visible:
      id: "Add New York Yankees"
    timeout: 10000

# Pick the team — use the typeahead match button's explicit aria-label
# ("Add New York Yankees" — see TeamPicker.tsx:223). Tapping by `text`
# was ambiguous: the search input's value also contains "Yankees", and
# index 0 landed on the input instead of the match button.
- tapOn:
    id: "Add New York Yankees"

# Close the popover by clicking elsewhere.
- tapOn:
    id: "Card name"

# The chip should be visible in the picker area.
- assertVisible:
    id: "Remove team New York Yankees"

# Save.
- tapOn:
    id: "Save card edit"

# Verify the team appears in the card sub-line.
- extendedWaitUntil:
    visible: "Team Smoke Player ${ATTEMPT_ID}"
    timeout: 10000
- assertVisible:
    text: ".*Yankees.*"

# Clean up: delete this attempt's custom card.
- tapOn:
    id: "Delete card 888-${ATTEMPT_ID}"
- extendedWaitUntil:
    visible: "Confirm?"
    timeout: 5000
- tapOn:
    id: "Confirm delete card 888-${ATTEMPT_ID}"
# Delete dispatched. Row-disappearance assertion is unique enough on
# ${ATTEMPT_ID}-suffixed names that a future re-add can't false-positive.
