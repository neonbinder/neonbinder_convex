appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/testing/seed-credentials?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "SetAttributesPanel — breadcrumb scope, metadata editing, collapse/expand, inherited values at child level (per-worker custom set)"
tags:
  - regression
  - set-selector
  - requires:setup-done
---
# NEO-38 / NEO-39 acceptance test for the SetAttributesPanel redesign.
#
# ISOLATION: uses a per-worker CUSTOM set (attr-edit-{WORKER_INDEX}) under
# Baseball → 2024 → Topps. Each of the 3 CI workers owns a separate custom
# set, so concurrent workers cannot interfere. The real 2024 Topps Chrome set
# is never touched — that path is owned exclusively by topps-chrome-*.yaml.
#
# WHAT THIS TESTS (three sub-scenarios):
#
#   1. BREADCRUMB SCOPE TEXT
#      Drill to the custom set (setName level). The panel header shows a
#      breadcrumb like "Attributes for attr-edit-0 (Set) — Baseball › 2024 › Topps"
#      confirming the panel identifies which node it is editing and its ancestry.
#
#   2. METADATA EDIT AT SETNAME LEVEL
#      The editable metadata fields (Release Date, Block) are visible because
#      the panel defaults EXPANDED at the setName level. Write a value in
#      "Value for Release Date" and confirm the "Saved Release Date" toast.
#
#   3. COLLAPSED STATE / EXPAND / INHERITED VALUES AT CHILD LEVEL
#      a. Tap "Hide attributes" to collapse the panel manually. Verify "Edit
#         attributes" appears (collapsed summary bar) and "Hide attributes" is gone.
#      b. Re-expand via "Edit attributes". Verify "Hide attributes" returns.
#      c. Drill into a custom variant type (Base-{worker}). The breadcrumb in
#         the panel header now shows the child scope. The panel remains open
#         at this level (no card checklist on a custom set). Assert the scope
#         text has changed to include the variant type name — this confirms
#         the panel context updates correctly when the user selects a child row.
#
# FLOW OVERVIEW:
#   A. Sign in → navigate to /set-selector
#   B. Drill Baseball → 2024 → Topps → custom set (add if absent)
#   C. Assert breadcrumb scope text at setName level
#   D. Edit "Value for Release Date" → assert "Saved Release Date" toast
#   E. Manually collapse panel → assert "Edit attributes" visible
#   F. Re-expand panel → assert "Hide attributes" visible
#   G. Drill into custom variant type → assert breadcrumb updates to child scope

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# PART A — NAVIGATE TO SET SELECTOR
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000
- extendedWaitUntil:
    visible: "Baseball"
    timeout: 30000

# ============================================================
# LEVEL 1 — Tap Baseball (pre-synced by cascade setup.yaml)
# ============================================================

- tapOn:
    id: "Search sports"
- inputText: "Baseball"
- extendedWaitUntil:
    visible:
      text: "Baseball"
      index: 1
    timeout: 10000
- tapOn:
    text: "Baseball"
    index: 1

# ============================================================
# LEVEL 2 — Year 2024
# ============================================================

- extendedWaitUntil:
    visible: "Years"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search years.*"
    timeout: 60000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"
- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

# ============================================================
# LEVEL 3 — Topps (manufacturer)
# ============================================================

- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
    timeout: 30000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"
- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

# ============================================================
# LEVEL 4 — Custom set "attr-edit-{WORKER_INDEX}"
# This per-worker set name guarantees 3 concurrent workers never touch the
# same entity. addCustomSelectorOption is idempotent — safe to add twice.
# ============================================================

- extendedWaitUntil:
    visible: "Sets"
    timeout: 20000

# Wait for Sets column to settle (the BSC/SL sync for Topps/2024 may be in
# flight briefly). scrollUntilVisible on "Add custom Sets" doubles as a
# settle-wait: it polls until the button appears in idle mode.
# centerElement: true keeps the button mid-viewport (clear of footer zone)
# for the following tap — same pattern as util-drill-to-custom-set.yaml.
- scrollUntilVisible:
    element:
      id: "Add custom Sets"
    centerElement: true
    timeout: 60000

- runFlow:
    when:
      notVisible: "attr-edit-${WORKER_INDEX || 0}"
    commands:
      - tapOn:
          id: "Add custom Sets"
      - extendedWaitUntil:
          visible: "Add Custom Entry"
          timeout: 5000
      - inputText: "attr-edit-${WORKER_INDEX || 0}"
      - pressKey: Enter
      - extendedWaitUntil:
          notVisible: "Add Custom Entry"
          timeout: 10000

# Tap the custom set row. When the list has grown past 8 items (multi-run CI),
# a search input appears; use it to surface the row at index 1 to avoid
# footer-zone clip failures (PR #31 pattern). Fallback for short lists below.
- runFlow:
    when:
      visible: ".*Search sets.*"
    commands:
      - scrollUntilVisible:
          element:
            text: "^Sets$"
          direction: UP
          centerElement: true
          timeout: 10000
      - tapOn:
          text: ".*Search sets.*"
      - inputText: "attr-edit-${WORKER_INDEX || 0}"
      - extendedWaitUntil:
          visible:
            text: ".*attr-edit-${WORKER_INDEX || 0}.*"
            index: 1
          timeout: 10000
      - tapOn:
          text: ".*attr-edit-${WORKER_INDEX || 0}.*"
          index: 1
          waitToSettleTimeoutMs: 2000
      - extendedWaitUntil:
          visible: "Variant Types"
          timeout: 30000

- runFlow:
    when:
      notVisible: "Variant Types"
    commands:
      - scrollUntilVisible:
          element:
            text: ".*attr-edit-${WORKER_INDEX || 0}.*"
          centerElement: true
          timeout: 10000
      - tapOn:
          text: ".*attr-edit-${WORKER_INDEX || 0}.*"
          waitToSettleTimeoutMs: 2000
      - extendedWaitUntil:
          visible: "Variant Types"
          timeout: 30000

# Confirm Variant Types column is visible — setName row is now selected and
# the SetAttributesPanel will render below.
- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 20000

# ============================================================
# PART B — ASSERT BREADCRUMB SCOPE TEXT
# The panel header shows "Attributes for attr-edit-{N} (Set) — ... › Topps"
# We match the "›" separator to confirm ancestry is rendered.
# ============================================================

# Scroll to the "Edit attributes" toggle to locate the panel area.
# Using the toggle (small, reliably centerable) avoids the fragile
# centerElement scroll on the full panel wrapper at 1024×629.
- scrollUntilVisible:
    element:
      id: "Edit attributes"
    centerElement: true
    visibilityPercentage: 10
    waitToSettleTimeoutMs: 1000
    timeout: 15000

# IDEMPOTENT EXPAND: at setName level the panel defaults EXPANDED (no card
# checklist on a custom set). A prior run may have left it collapsed — guard.
- runFlow:
    when:
      visible:
        id: "Edit attributes"
    commands:
      - tapOn:
          id: "Edit attributes"
      - extendedWaitUntil:
          visible:
            id: "Hide attributes"
          timeout: 5000

# Panel is expanded: "Hide attributes" button must be visible.
- assertVisible:
    id: "Hide attributes"

# The "Will propagate to N cards" counter is visible when the panel is open at
# the setName level — confirms the propagation preview is rendered.
# (Unique assertion folded from set-features-panel.yaml, which was deleted.)
- assertVisible:
    text: ".*Will propagate to.*"

# The breadcrumb header shows "... › attr-edit-{N}" as leaf.
# The ancestor chain uses "›" as separator; assert at least one "›" exists.
- assertVisible:
    text: ".*›.*attr-edit-${WORKER_INDEX || 0}.*"

# ============================================================
# PART C — EDIT "Value for Release Date" (setName-level metadata field)
# setSetMetadata works on custom sets. Two-step write avoids no-op when
# the DB already holds the intended value from a prior run.
#
# CI VIEWPORT FIX: "Value for Release Date" renders at y≈626 in the
# 1024×629 headless viewport — right at the fold. Scrolling to "Value for
# Block" (the editable field BELOW Release Date in the same grid) lifts
# Release Date fully into view. tapOn then needs no further scroll.
# See patterns_scroll_visibility.md for the centerElement 0.0 trap.
# ============================================================

- scrollUntilVisible:
    element:
      id: "Value for Block"
    visibilityPercentage: 10
    waitToSettleTimeoutMs: 1000
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: "Value for Release Date"
    timeout: 5000

# Step 1: clearing sentinel — guarantees the DB value changes.
- tapOn:
    id: "Value for Release Date"
- eraseText: 30
- inputText: "1900-01-01"
- pressKey: Enter
# Belt-and-suspenders blur: CDP pressKey: Enter does not reliably fire React's
# onKeyDown in headless CI (confirmed root cause — see PR #50 failure). Tapping
# the read-only "TCDB Set ID" div (aria-label="Set metadata TCDB Set ID") moves
# focus away from the input, which fires onBlur → runCommit → the optimistic
# "Saved Release Date" toast. The div has no click handler and is always
# rendered at setName level — zero side effects.
- tapOn:
    id: "Set metadata TCDB Set ID"
- extendedWaitUntil:
    visible:
      text: ".*Saved Release Date.*"
    timeout: 15000

# Step 2: the test sentinel value.
- tapOn:
    id: "Value for Release Date"
- eraseText: 30
- inputText: "2024-08-01"
- pressKey: Enter
# Same blur-to-commit pattern as Step 1.
- tapOn:
    id: "Set metadata TCDB Set ID"
- extendedWaitUntil:
    visible:
      text: ".*Saved Release Date.*"
    timeout: 15000

# ============================================================
# PART D — COLLAPSE THE PANEL VIA "Hide attributes"
# On a custom set (no card checklist) the panel stays expanded; we test the
# explicit collapse path so that "Edit attributes" / "Hide attributes"
# toggle behaviour is validated independently of card-checklist presence.
#
# After Part C the page is scrolled DOWN (we scrolled to "Value for Block"
# to lift Release Date into view). The "Hide attributes" toggle is at the
# TOP of the SetAttributesPanel which is now ABOVE the current viewport
# position. direction: UP (swipe-down gesture) pulls content from above
# back into view — same technique as features-propagation.yaml uses to
# scroll back up to "Base" after writing to the SetAttributesPanel.
# ============================================================

- scrollUntilVisible:
    element:
      id: "Hide attributes"
    direction: UP
    visibilityPercentage: 10
    waitToSettleTimeoutMs: 1000
    timeout: 15000

- tapOn:
    id: "Hide attributes"

# After collapsing: "Edit attributes" appears in the summary bar.
- extendedWaitUntil:
    visible:
      id: "Edit attributes"
    timeout: 5000
- assertVisible:
    id: "Edit attributes"

# "Hide attributes" is ONLY present when the panel is expanded — its absence
# confirms the collapsed state.
- assertNotVisible:
    id: "Hide attributes"

# ============================================================
# PART E — RE-EXPAND THE PANEL VIA "Edit attributes"
# ============================================================

- tapOn:
    id: "Edit attributes"

- extendedWaitUntil:
    visible:
      id: "Hide attributes"
    timeout: 5000
- assertVisible:
    id: "Hide attributes"

# ============================================================
# PART F — DRILL TO A CUSTOM VARIANT TYPE AND VERIFY CHILD SCOPE
# Add a custom variant type "BaseAttr-{WORKER_INDEX}" if absent, then tap
# it. The SetAttributesPanel breadcrumb should update to show the child
# level — confirming the panel context tracks the user's selection.
# ============================================================

# Scroll up to reach the Variant Types column. After Part E the panel body
# is visible; the column is above the fold. Use direction: UP (swipe-down
# gesture) to bring it back into view.
- scrollUntilVisible:
    element:
      id: "Add custom Variant Types"
    direction: UP
    visibilityPercentage: 100
    timeout: 30000

- runFlow:
    when:
      notVisible: "BaseAttr-${WORKER_INDEX || 0}"
    commands:
      - tapOn:
          id: "Add custom Variant Types"
          waitToSettleTimeoutMs: 2000
      - extendedWaitUntil:
          visible: "Add Custom Entry"
          timeout: 10000
      - inputText: "BaseAttr-${WORKER_INDEX || 0}"
      - pressKey: Enter
      - extendedWaitUntil:
          visible:
            text: ".*BaseAttr-${WORKER_INDEX || 0}.*"
          timeout: 5000

- scrollUntilVisible:
    element:
      text: "BaseAttr-${WORKER_INDEX || 0}"
    timeout: 10000
- tapOn: "BaseAttr-${WORKER_INDEX || 0}"

# Wait for the next column (pluralized variant type name) to appear,
# confirming the selection registered.
- extendedWaitUntil:
    visible:
      text: ".*BaseAttr-${WORKER_INDEX || 0}s.*"
    timeout: 15000

# The SetAttributesPanel breadcrumb now shows the child scope. The panel
# either stays expanded (custom set — no card checklist) or the toggle is
# available. Assert the scope text updated by checking the breadcrumb still
# contains "›" (ancestry separator) — confirming the panel re-rendered for
# the child context. The exact text will be something like
# "Attributes for BaseAttr-0 (Variant Type) — ... › attr-edit-0".
- scrollUntilVisible:
    element:
      id: "Edit attributes"
    centerElement: true
    visibilityPercentage: 10
    waitToSettleTimeoutMs: 1000
    timeout: 15000

# IDEMPOTENT EXPAND at variant-type level.
- runFlow:
    when:
      visible:
        id: "Edit attributes"
    commands:
      - tapOn:
          id: "Edit attributes"
      - extendedWaitUntil:
          visible:
            id: "Hide attributes"
          timeout: 5000

# The breadcrumb now includes "BaseAttr-{N}" as the leaf, confirming the
# panel context has advanced to the child level.
- assertVisible:
    text: ".*›.*BaseAttr-${WORKER_INDEX || 0}.*"
