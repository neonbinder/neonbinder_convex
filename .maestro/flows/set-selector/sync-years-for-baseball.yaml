url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector
name: Sync years for Baseball (depth 2)
tags:
  - set-selector
  - wip
---
# Drill into Baseball (already synced) and trigger Year sync.
# Tests level-2 BSC+SL reconciliation. Assumes BSC and SL credentials
# already saved in the dev backend for the test user.

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# Select Baseball (already synced from a previous session)
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

# Years column should appear
- extendedWaitUntil:
    visible: "Years"
    timeout: 15000

# Trigger Year sync — auto-fires on form mount per stash refinements
- scrollUntilVisible:
    element:
      text: "Sync Years"
    timeout: 10000
- tapOn: "Sync Years"
- extendedWaitUntil:
    visible: "Syncing Year Options"
    timeout: 10000

# Wait for sync to complete (success returns "Sync Years" button)
# OR show error (would surface a Cancel/Retry button)
- extendedWaitUntil:
    visible: ".*Sync Years|Cancel|Retry.*"
    timeout: 60000
