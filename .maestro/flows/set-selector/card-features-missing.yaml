appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Regression — card with no features shows amber missing-feature highlight in CardFeaturesEditor"
tags:
  - regression
  - set-selector
  - requires:setup-done
---
# Regression test: a freshly-added custom card has no feature values. Opening the
# CardFeaturesEditor and expanding it should show the amber "Missing required
# feature" indicator (⚠) on the rows that have no value and no inherited value.
#
# WHY REGRESSION (not smoke):
#   Requires a confirmed CardChecklist. Although the assertion itself is cheap,
#   the setup — drilling to a custom set with a card present — takes a few steps.
#
# PER-WORKER DATA ISOLATION:
#   Drills to Football → 2026 → Topps → cfm-<WORKER_INDEX> (custom set, Insert VT,
#   "Base" insert). Custom subtrees have no marketplace feature inheritance, so a
#   new card added here has no feature values and the "Missing required feature"
#   amber ⚠ is guaranteed to appear. Each worker has its own checklist.
#
# WHAT THIS TESTS:
#   - "Show features" button is present in the card edit form
#   - Clicking it reveals the "Card features editor" section
#   - At least one row with the "Missing required feature" indicator (⚠) is shown
#   - "Hide ▴" collapses the editor back

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# DRILL TO PER-WORKER CUSTOM SET
# Football → 2026 → Topps → cfm-<WORKER_INDEX> → Insert → "Base" (custom insert)
# util-drill-to-custom-set.yaml returns with the Inserts column visible and idle.
# ============================================================

- runFlow:
    file: util-drill-to-custom-set.yaml
    env:
      SET_NAME: "cfm-${WORKER_INDEX || 0}"
      VARIANT_TYPE: "Insert"

# Add a custom insert named "Base" if absent, then select it to open the
# CardChecklist panel for this per-worker custom subtree.
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    centerElement: true
    timeout: 10000
- runFlow:
    when:
      notVisible: "Base"
    commands:
      - tapOn:
          id: "Add custom Inserts"
      - extendedWaitUntil:
          visible: "Add Custom Entry"
          timeout: 5000
      - inputText: "Base"
      - pressKey: Enter
      - extendedWaitUntil:
          notVisible: "Add Custom Entry"
          timeout: 10000

- extendedWaitUntil:
    visible: "Base"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Base"
    centerElement: true
    timeout: 10000
- tapOn: "Base"

# Per-attempt-unique card number + player name. The runner injects
# ATTEMPT_ID="w<worker>-a<attempt>-<RANDOM>" so attempt-2 doesn't
# collide with the row attempt-1 left in the per-worker cardChecklist
# (no idempotent cleanup loop needed when names are unique per attempt).
- scrollUntilVisible:
    element:
      id: "Open add card form"
    centerElement: true
    visibilityPercentage: 50
    timeout: 15000

# Add a fresh card with no features.
- tapOn:
    id: "Open add card form"
- extendedWaitUntil:
    visible:
      id: "Card name"
    timeout: 5000
- inputText: "991-${ATTEMPT_ID}"
- tapOn: "Player name"
- inputText: "Missing Features Player ${ATTEMPT_ID}"
- tapOn:
    id: "Submit new card"

# Virtuoso only renders rows near the viewport; the new card may be
# off-screen until scrollToIndex fires. Drive the scroll directly with
# scrollUntilVisible (does NOT depend on scrollToIndex having fired yet),
# then confirm the row is in the DOM before proceeding. This replaces the
# previous bare extendedWaitUntil that raced Virtuoso's scroll animation.
- scrollUntilVisible:
    element:
      text: "Missing Features Player ${ATTEMPT_ID}"
    centerElement: true
    timeout: 15000
- extendedWaitUntil:
    visible: "Missing Features Player ${ATTEMPT_ID}"
    timeout: 5000

# Now scroll the Edit button into view. With the row already centered by
# the preceding scroll, this is a small adjustment that keeps bounds non-null.
- scrollUntilVisible:
    element:
      id: "Edit card 991-${ATTEMPT_ID}"
    centerElement: true
    visibilityPercentage: 50
    timeout: 10000

# Assert visibility before tapping — surfaces a failed scroll as a clear
# assertion error rather than the null kotlin.Int bounds crash.
- extendedWaitUntil:
    visible:
      id: "Edit card 991-${ATTEMPT_ID}"
    timeout: 5000

# Open the edit form. `waitToSettleTimeoutMs` mitigates the
# virtualisation race — parallel workers' live-query refetches can
# shift this row between Maestro's element lookup and tap dispatch.
- tapOn:
    id: "Edit card 991-${ATTEMPT_ID}"
    waitToSettleTimeoutMs: 2000
- extendedWaitUntil:
    visible:
      id: "Card name"
    timeout: 10000

# The "Show features" button is visible (collapsed by default).
- assertVisible:
    id: "Show features editor"

# Click it to expand the CardFeaturesEditor.
- tapOn:
    id: "Show features editor"

# The "Card features editor" section appears.
- extendedWaitUntil:
    visible:
      id: "Card features editor"
    timeout: 5000

# At least one feature row shows the amber missing-feature indicator.
# The ⚠ icon has aria-label "Missing required feature".
- assertVisible:
    id: "Missing required feature"

# The "Hide ▴" button collapses the editor.
- tapOn:
    id: "Hide features editor"
- extendedWaitUntil:
    notVisible:
      id: "Card features editor"
    timeout: 5000

# Verify the "Show features ▾" button reappears.
- assertVisible:
    id: "Show features editor"

# Cleanup: cancel edit and delete this attempt's test card.
- tapOn:
    id: "Cancel card edit"
- tapOn:
    id: "Delete card 991-${ATTEMPT_ID}"
- extendedWaitUntil:
    visible: "Confirm?"
    timeout: 5000
- tapOn:
    id: "Confirm delete card 991-${ATTEMPT_ID}"
- extendedWaitUntil:
    notVisible: "Missing Features Player ${ATTEMPT_ID}"
    timeout: 10000
