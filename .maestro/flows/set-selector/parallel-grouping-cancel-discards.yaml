appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Parallel Grouping — Cancel discards changes (reopen shows original); also closes via backdrop"
tags:
  - parallel-grouping
  - regression
---
# PRODUCT-FEATURE test: Cancel discards pending groupings and does NOT persist.
# Also covers the modal's two close mechanisms (Cancel button + backdrop tap).
#
# KEY PROOF: after Accept All → Cancel → reopen, the items show "Suggested"
# badges again (live auto-suggestions, not saved placements). If Cancel had
# written to the DB, the reopen would show them as persisted parallels with no
# Suggested badge. So "Suggested" on reopen == Cancel correctly discarded.
#
# Fully custom subtree (E2E Test Sport ${WORKER_INDEX} → 2026 → pg-cancel-<worker>),
# every wait is the 7s default; the util owns the cold custom-subtree drill.

- launchApp
- assertVisible: "Set Selector"

- runFlow:
    file: util-drill-to-custom-set.yaml
    env:
      SET_NAME: "pg-cancel-${WORKER_INDEX || 0}"
      VARIANT_TYPE: "Insert"

# ── ADD THREE CUSTOM INSERTS (Stars / Stars Gold / Stars Red) ───────────────
# aria-label "Add custom Inserts" maps to resource-id (id:); visible text is
# "+ Custom". centerElement on the first add to clear the footer-steal zone.
# --- Stars ---
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    centerElement: true
- tapOn:
    id: "Add custom Inserts"
- assertVisible: "Add Custom Entry"
- inputText: "Stars"
- pressKey: Enter
- assertNotVisible: "Add Custom Entry"

# --- Stars Gold ---
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    visibilityPercentage: 50
- tapOn:
    id: "Add custom Inserts"
- assertVisible: "Add Custom Entry"
- inputText: "Stars Gold"
- pressKey: Enter
- assertNotVisible: "Add Custom Entry"

# --- Stars Red (third entry keeps the Group Parallels button layout stable) ---
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    visibilityPercentage: 50
- tapOn:
    id: "Add custom Inserts"
- assertVisible: "Add Custom Entry"
- inputText: "Stars Red"
- pressKey: Enter
- assertNotVisible: "Add Custom Entry"

# ── OPEN MODAL → ACCEPT ALL (places Stars Gold + Stars Red under Stars) ─────
- scrollUntilVisible:
    element:
      text: "Group Parallels"
- tapOn: "Group Parallels"
- assertVisible: ".*Drag inserts under a parent.*"
- assertVisible: "Top-level inserts"
- assertVisible: ".*Accept all suggestions.*"
- tapOn: ".*Accept all suggestions.*"
- assertVisible: ".*[0-9]+ promotion.*"
- assertVisible: ".*Parallels of.*Stars.*"

# ── CANCEL (close #1, via the Cancel button) discards the pending promotion ─
- tapOn: "Cancel"
- assertNotVisible: ".*Drag inserts under a parent.*"

# ── EXACT DATA CHECK: all three inserts still top-level after Cancel ─────────
# Cancel (button close) returns the Inserts column to idle. In first-run state
# the column is expanded (no selection) and shows all three rows directly.
# On retries the flow re-adds Stars Red via + Custom — but Stars Red already
# exists, so EntityColumn's handleCustomSubmit finds it via onSelectExisting,
# calls handleVariantSelect, and leaves the column in collapsed-pill mode
# (selectedVariantId != null, variantExpanded = false).
#
# Strategy: scroll the "+ Custom" button into view (it is always present in
# idle mode regardless of expanded/collapsed state), then detect whether the
# "Inserts" h2 header is visible. The h2 only appears in expanded state; its
# absence means the column is showing a collapsed pill. When collapsed, tap
# the pill (any .*Stars.* element above the "+ Custom" button) to call
# setExpanded(true). After expansion, assert all three rows are top-level.
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    direction: UP
    centerElement: true
- runFlow:
    when:
      notVisible:
        text: "^Inserts$"
    commands:
      # Column is collapsed — a selected insert is shown as a pill above
      # the action buttons. Tap it (any .*Stars.* above the + Custom button)
      # to call setExpanded(true) and reveal the full list.
      - tapOn:
          text: ".*Stars.*"
          above:
            id: "Add custom Inserts"
      - extendedWaitUntil:
          visible:
            text: "^Inserts$"
          timeout: 5000
- assertVisible:
    text: "^Stars$"
- assertVisible: "Stars Gold"
- assertVisible: "Stars Red"

# ── RE-OPEN → original state: items are SUGGESTIONS again, not persisted ────
- scrollUntilVisible:
    element:
      text: "Group Parallels"
- tapOn: "Group Parallels"
- assertVisible: ".*Drag inserts under a parent.*"
- assertVisible: "Top-level inserts"
# Footer re-shows promotions (auto-suggested), and the rows carry "Suggested"
# badges — the proof that Cancel never wrote to the DB.
- assertVisible: ".*[0-9]+ promotion.*"
- scrollUntilVisible:
    element:
      text: "Suggested"
    visibilityPercentage: 50
- assertVisible: "Suggested"
- assertVisible: ".*Save [0-9]+ change.*"

# ── CLOSE #2: via BACKDROP tap (far-left edge, outside the modal panel) ─────
- tapOn:
    point: "2%, 50%"
- assertNotVisible: ".*Drag inserts under a parent.*"

# ── VERIFY BACKDROP CLOSE LEFT THE COLUMNS INTACT (no persist) ──────────────
# The proof that Cancel/backdrop discarded the grouping is already established
# above: re-opening the modal showed "Suggested" badges again — which only
# appear when the items are NOT persisted as parallels. Here we just confirm
# the backdrop-close left the session in a clean state: the Inserts column
# action buttons are still present (Insert variant type still selected) and
# the modal is gone. The column rows (Stars/Gold/Red) are inside the
# EntitySelector's internal overflow scroll which is collapsed after the modal
# interaction; we assert the action-button row instead, which is always in the
# lower viewport after close.
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    visibilityPercentage: 50
- assertVisible:
    id: "Add custom Inserts"
- assertVisible: "Group Parallels"
