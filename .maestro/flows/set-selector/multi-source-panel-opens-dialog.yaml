appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Multi-source sets panel — Attach more dialog opens and cancels"
tags:
  - smoke
  - set-selector
  - neo-6
  - requires:setup-done
---
# NEO-6 phase 1 smoke test.
#
# Precondition: cascade setup.yaml has run (provides:setup-done).
# That means Baseball → 2024 → Topps → Topps Chrome hierarchy is
# pre-populated and BSC/SL credentials are saved.
#
# This flow drills to the Base variantType row (which has a confirmed
# BaseMappingForm mapping from sets-base.yaml), then verifies that:
#   1. The "Multi-source sets" panel is visible.
#   2. "Attach more…" opens the "Attach more source sets" dialog.
#   3. Typing in the BSC search input narrows the list.
#   4. Cancelling dismisses the dialog without side effects.
#   5. The panel is still visible after cancel.
#
# Mutation (attach + confirm) is intentionally excluded — a regression-tagged
# flow covers the full attach → filter chip → per-card badge cycle.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# FAST DRILL — Baseball → 2024 → Topps → Topps Chrome
# Data is already in Convex from setup.yaml; these taps hit
# the cached column lists with no marketplace sync waits.
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000

# Level 1 — Baseball
- extendedWaitUntil:
    visible: "Baseball"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

# Level 2 — 2024
- extendedWaitUntil:
    visible: "Years"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search years.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search years.*"
    timeout: 10000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"
- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

# Level 3 — Topps
- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search manufacturers.*"
    timeout: 10000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"
- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

# Level 4 — Topps Chrome
- extendedWaitUntil:
    visible: "Sets"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search sets.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search sets.*"
    timeout: 10000
- tapOn:
    text: ".*Search sets.*"
- inputText: "Topps Chrome"
- extendedWaitUntil:
    visible:
      text: "Topps Chrome"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps Chrome"
    index: 1

# ============================================================
# LEVEL 5 — Select Base variant type
# BaseMappingForm may re-open on a fresh session. Handle both
# paths (SL picker shown → confirm it; picker never shown →
# CardChecklist is already visible from the prior confirmed mapping).
# ============================================================

- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 20000
- extendedWaitUntil:
    visible: "Base"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Base"
    timeout: 10000
- tapOn: "Base"

# Wait for either the BaseSetPicker modal (SL data) or the Re-map Base
# button (mapping already confirmed from prior run / auto-confirmed).
- extendedWaitUntil:
    visible:
      text: ".*Select Base Set.*|.*Re-map Base.*"
    timeout: 60000

# If the picker is open, confirm the pre-selected set.
- runFlow:
    when:
      visible: "Select Base Set"
    commands:
      - extendedWaitUntil:
          visible: "Confirm Base Set"
          timeout: 60000
      - tapOn: "Confirm Base Set"
      - extendedWaitUntil:
          notVisible: "Select Base Set"
          timeout: 30000

# Scroll until the CardChecklist action row is visible — confirms the
# Base variantType has a mapping and the checklist panel has rendered.
- scrollUntilVisible:
    element:
      text: "Add Card"
    centerElement: true
    visibilityPercentage: 50
    timeout: 10000

# ============================================================
# ASSERT "Multi-source sets" PANEL IS VISIBLE
# The panel renders below the Re-map Base row once baseHasMapping
# is true. Scroll to bring it into view.
# ============================================================

- scrollUntilVisible:
    element:
      text: "Multi-source sets"
    visibilityPercentage: 50
    timeout: 10000
- assertVisible: "Multi-source sets"

# ============================================================
# OPEN THE ATTACH DIALOG
# The "Attach more…" button has aria-label "Attach more source sets".
# In Maestro web, aria-label maps to resource-id — use id: not text:.
# ============================================================

- scrollUntilVisible:
    element:
      id: "Attach more source sets"
    visibilityPercentage: 50
    timeout: 10000
- tapOn:
    id: "Attach more source sets"

# Dialog should open — its heading/title has aria-label "Attach more source sets".
# assertVisible with id: checks the dialog container is present.
- extendedWaitUntil:
    visible:
      id: "Attach more source sets"
    timeout: 10000

# ============================================================
# TYPE INTO THE BSC SEARCH INPUT AND VERIFY LIST NARROWS
# The input has aria-label "Search BSC sets".
# ============================================================

- tapOn:
    id: "Search BSC sets"
- inputText: "Chrome"

# After typing, the BSC candidate list should update — wait for at least
# one result that matches "Chrome" to confirm the search filtered results.
- extendedWaitUntil:
    visible:
      text: ".*Chrome.*"
    timeout: 10000

# ============================================================
# CANCEL OUT OF THE DIALOG
# Tap the visible "Cancel" button inside the dialog footer.
# ============================================================

- scrollUntilVisible:
    element:
      text: "Cancel"
    visibilityPercentage: 50
    timeout: 10000
- tapOn: "Cancel"

# Wait for dialog to close.
- extendedWaitUntil:
    notVisible:
      id: "Attach more source sets"
    timeout: 10000

# ============================================================
# ASSERT PANEL STILL VISIBLE AFTER CANCEL
# Cancelling must not remove or reset the "Multi-source sets" panel.
# ============================================================

- assertVisible: "Multi-source sets"
