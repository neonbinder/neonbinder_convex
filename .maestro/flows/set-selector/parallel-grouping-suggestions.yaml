appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Parallel Grouping — auto-suggestions render and Accept All clears the Suggested badges"
tags:
  - parallel-grouping
  - regression
---
# PRODUCT-FEATURE test: the auto-suggestion lifecycle. Add Stars / Stars Gold /
# Stars Red — the prefix-match flags Gold + Red as suggested parallels of Stars.
# On open they're pre-placed with "Suggested" badges; Accept All CLEARS the
# badges (the unique assertion this flow owns) while the promotion counts and
# "Save N changes" stay. Cancel at the end — persistence is cancel-discards' job.
#
# Fully custom subtree (E2E Test Sport ${WORKER_INDEX} → 2026 → pg-suggestions-<worker>);
# every wait is the 7s default; the util owns the cold custom-subtree drill.

- launchApp
- assertVisible: "Set Selector"

- runFlow:
    file: util-drill-to-custom-set.yaml
    env:
      SET_NAME: "pg-suggestions-${WORKER_INDEX || 0}"
      VARIANT_TYPE: "Insert"

# ── ADD THREE CUSTOM INSERTS (Stars / Stars Gold / Stars Red) ───────────────
# aria-label "Add custom Inserts" maps to resource-id (id:); centerElement on
# the first add to clear the footer-steal zone.
# --- Stars ---
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    centerElement: true
- tapOn:
    id: "Add custom Inserts"
- assertVisible: "Add Custom Entry"
- inputText: "Stars"
- pressKey: Enter
- assertNotVisible: "Add Custom Entry"

# --- Stars Gold ---
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    visibilityPercentage: 50
- tapOn:
    id: "Add custom Inserts"
- assertVisible: "Add Custom Entry"
- inputText: "Stars Gold"
- pressKey: Enter
- assertNotVisible: "Add Custom Entry"

# --- Stars Red ---
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    visibilityPercentage: 50
- tapOn:
    id: "Add custom Inserts"
- assertVisible: "Add Custom Entry"
- inputText: "Stars Red"
- pressKey: Enter
- assertNotVisible: "Add Custom Entry"

# ── OPEN MODAL → SUGGESTIONS PRE-PLACED WITH "Suggested" BADGES ─────────────
- scrollUntilVisible:
    element:
      text: "Group Parallels"
- tapOn: "Group Parallels"
- assertVisible: ".*Drag inserts under a parent.*"
- assertVisible: "Top-level inserts"
- assertVisible: ".*Accept all suggestions.*"
- assertVisible: ".*[0-9]+ promotion.*"
- assertVisible: ".*Save [0-9]+ change.*"
# The "Suggested" badges live in the "Parallels of Stars" zone (below the
# modal's internal fold) — scroll until at least one is visible.
- scrollUntilVisible:
    element:
      text: "Suggested"
    visibilityPercentage: 50
- assertVisible: "Suggested"

# ── ACCEPT ALL → badges clear (the assertion this flow owns) ────────────────
- tapOn: ".*Accept all suggestions.*"
- assertNotVisible: "Suggested"
# Counts unchanged, Save still enabled — only the badges went away.
- assertVisible: ".*[0-9]+ promotion.*"
- assertVisible: ".*Save [0-9]+ change.*"

# ── CANCEL (no persist) ─────────────────────────────────────────────────────
- tapOn: "Cancel"
- assertNotVisible: ".*Drag inserts under a parent.*"
- assertVisible: "Inserts"
- assertVisible: "Group Parallels"
