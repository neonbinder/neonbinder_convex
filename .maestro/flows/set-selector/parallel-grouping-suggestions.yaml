appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Parallel Grouping — auto-suggestions render and Accept All clears them"
tags:
  - parallel-grouping
  - regression
---
# Feature test: auto-suggestion display and Accept All behaviour.
#
# SETUP STRATEGY — why we add custom inserts:
#   The modal's auto-detection runs on inserts that already exist in the DB
#   for the selected variant type. Rather than saving thousands of synced rows
#   (which is slow and writes to a shared DB), we add a small controlled set
#   of custom inserts whose names are guaranteed to trigger the prefix-match
#   algorithm. We use:
#     "Stars" — the base insert (parent candidate)
#     "Stars Gold" — should be auto-suggested as a parallel of "Stars"
#     "Stars Red" — should be auto-suggested as a parallel of "Stars"
#   After the DB reset in util-drill-to-2024-topps-chrome these names will
#   not exist, so the custom-entry step is always needed.
#
# READING THE ASSERTIONS:
#   "Suggested" badge text is visually rendered inside each suggested row.
#   "Accept all suggestions (N)" appears in the modal header when N > 0.
#   After Accept All the "Suggested" badges disappear and "Save N changes"
#   in the footer enables.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 10000

# ============================================================
# DRILL TO PER-FLOW CUSTOM SET — Football → 2026 → pg-suggestions-<worker>
# Isolated from Baseball → 2024 → Topps Chrome cascade path.
# Returns with Inserts column visible and idle.
# ============================================================

- runFlow:
    file: util-drill-to-custom-set.yaml
    env:
      SET_NAME: "pg-suggestions-${WORKER_INDEX || 0}"
      VARIANT_TYPE: "Insert"

# ============================================================
# ADD CONTROLLED CUSTOM INSERTS
# We add three names that follow the prefix pattern:
#   "Stars" (base) + "Stars Gold" (parallel) + "Stars Red" (parallel)
# Each is added via the "+ Custom" button in the Variants column.
# ============================================================

# --- Add "Stars" ---
# The Inserts column "+ Custom" button has aria-label="Add custom Inserts".
# Maestro web maps aria-label to resource-id, so we use id: with the aria-label value.
# Plain text "Add custom Inserts" does NOT work — Maestro text matchers only see
# the visible DOM text ("+ Custom"), not the aria-label.
# centerElement: true — util-drill-to-custom-set.yaml returns with the Inserts
# column visible but the "+ Custom" button near the bottom of the 1024×629
# headless viewport. visibilityPercentage: 50 leaves the button in the
# footer/scrollbar zone (y≥589) where subsequent taps are silently absorbed.
# Centering puts the button at y≈315 before the tap.
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    centerElement: true
    timeout: 10000
- tapOn:
    id: "Add custom Inserts"
- extendedWaitUntil:
    visible: "Add Custom Entry"
    timeout: 5000
- inputText: "Stars"
# Submit via Enter — the input's onKeyDown handler (EntityColumn.tsx:129)
# calls handleCustomSubmit on Enter. Avoids `tapOn: "Add"` ambiguity
# (text "Add" also matches "Add Custom Entry" heading + "Add Card" button).
- pressKey: Enter
- extendedWaitUntil:
    notVisible: "Add Custom Entry"
    timeout: 10000

# --- Add "Stars Gold" ---
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    visibilityPercentage: 50
    timeout: 10000
- tapOn:
    id: "Add custom Inserts"
- extendedWaitUntil:
    visible: "Add Custom Entry"
    timeout: 5000
- inputText: "Stars Gold"
# Submit via Enter — the input's onKeyDown handler (EntityColumn.tsx:129)
# calls handleCustomSubmit on Enter. Avoids `tapOn: "Add"` ambiguity
# (text "Add" also matches "Add Custom Entry" heading + "Add Card" button).
- pressKey: Enter
- extendedWaitUntil:
    notVisible: "Add Custom Entry"
    timeout: 10000

# --- Add "Stars Red" ---
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    visibilityPercentage: 50
    timeout: 10000
- tapOn:
    id: "Add custom Inserts"
- extendedWaitUntil:
    visible: "Add Custom Entry"
    timeout: 5000
- inputText: "Stars Red"
# Submit via Enter — the input's onKeyDown handler (EntityColumn.tsx:129)
# calls handleCustomSubmit on Enter. Avoids `tapOn: "Add"` ambiguity
# (text "Add" also matches "Add Custom Entry" heading + "Add Card" button).
- pressKey: Enter
- extendedWaitUntil:
    notVisible: "Add Custom Entry"
    timeout: 10000

# ============================================================
# OPEN THE GROUP PARALLELS MODAL
# ============================================================

# Scroll until the "Group Parallels" button is visible, then tap it.
# The Variants column action row can be near the right edge of the viewport.
- scrollUntilVisible:
    element:
      text: "Group Parallels"
- tapOn: "Group Parallels"
- extendedWaitUntil:
    visible:
      text: ".*Drag inserts under a parent.*"
    timeout: 10000

# Wait for the tree query to resolve — skeleton disappears, zones appear.
- extendedWaitUntil:
    visible: "Top-level inserts"
    timeout: 15000

# ============================================================
# VERIFY SUGGESTIONS APPEAR
# The auto-detection flags "Stars Gold" and "Stars Red" as suggested
# parallels of "Stars". The modal pre-positions them inside the
# "Parallels of Stars" zone immediately on open — they count as
# promotions from the start. Each gets a "Suggested" badge.
# The header shows "Accept all suggestions (N)".
# ============================================================

# Header button shows the count — we expect 2 suggestions. This is
# rendered at the modal header, always in viewport.
- assertVisible:
    text: ".*Accept all suggestions.*"

# Footer immediately shows 2 promotions because suggested rows are
# pre-placed inside the Parallels zone. Footer is fixed at the modal
# bottom, always in viewport.
- assertVisible:
    text: ".*[0-9]+ promotion.*"

# Save button is enabled from the start (suggestions are counted as changes)
- assertVisible:
    text: ".*Save [0-9]+ change.*"

# "Suggested" badge text appears on auto-detected rows inside the
# "Parallels of Stars" zone — that zone is below the fold in the modal's
# internal scroll. Scroll until at least one Suggested badge is visible.
# visibilityPercentage: 50 because the badge is small and sometimes lands
# at the viewport edge.
- scrollUntilVisible:
    element:
      text: "Suggested"
    visibilityPercentage: 50
    timeout: 10000
- assertVisible: "Suggested"

# ============================================================
# ACCEPT ALL SUGGESTIONS
# Tapping "Accept all suggestions (N)" clears the "Suggested" badge
# from each suggested row. The promotion counts remain the same — the
# only observable change is badge removal. This confirms the user has
# explicitly acknowledged the auto-suggestions.
# ============================================================

- tapOn:
    text: ".*Accept all suggestions.*"

# "Suggested" badge text should no longer appear — all suggestions accepted
- extendedWaitUntil:
    notVisible: "Suggested"
    timeout: 5000

# Footer still shows 2 promotions (same counts, badges gone)
- assertVisible:
    text: ".*[0-9]+ promotion.*"

# Save button remains enabled
- assertVisible:
    text: ".*Save [0-9]+ change.*"

# ============================================================
# CANCEL — do not persist changes
# We verify the UI state change (badges gone, Save enabled) without
# writing to the DB. The cancel flow (separate file) tests persistence.
# ============================================================

- tapOn: "Cancel"
# The modal description text is the unique signal that the modal is closed.
# "Group Parallels" also appears on the button in the Variants column action
# row, so we cannot use that text to confirm closure.
- extendedWaitUntil:
    notVisible:
      text: ".*Drag inserts under a parent.*"
    timeout: 10000

# Inserts column still present and "Group Parallels" button is back in action row
- assertVisible: "Inserts"
- assertVisible: "Group Parallels"
