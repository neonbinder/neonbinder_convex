appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Checklist — confirm dialog using keyboard Enter on auto-focused button"
tags:
  - set-selector
  - requires:setup-done
---
# Feature test: the UnknownEntitiesDialog confirm button is auto-focused on open
# and responds to the Enter key, allowing keyboard-only confirmation.
#
# WHAT THIS TESTS:
#   - The confirm button is auto-focused on dialog open (confirmButtonRef.focus())
#   - Pressing Enter fires the button's click handler via the dialog's keydown listener
#   - Cards are saved after the keyboard-only interaction
#
# MAESTRO KEYBOARD CONSTRAINTS:
#   - `pressKey: Tab` is NOT supported on Maestro web — throws IllegalStateException.
#     Tab traversal through checkboxes cannot be tested via Maestro.
#   - `pressKey: Escape` does NOT reach document-level keydown — cannot test Esc.
#   - `pressKey: Enter` IS supported and fires the focused element's click handler.
#     The confirm button uses confirmButtonRef.current?.focus() on mount, so Enter
#     on open immediately fires handleConfirm without any prior Tab navigation.
#
# INTERACTION MODEL TESTED HERE:
#   1. Dialog opens — confirm button is auto-focused.
#   2. User presses Enter → handleConfirm fires via the button's click handler.
#   3. Dialog closes and cards are saved.
#
# COVERAGE NOTE:
#   Tab traversal + Space to toggle checkboxes cannot be covered by Maestro web
#   due to the Tab key limitation. That coverage is exercised manually. The key
#   keyboard path — Enter to confirm without touching the mouse — is covered here.
#
# FRESH-DB REQUIREMENT:
#   This test requires that the `players` and `teams` tables are EMPTY so that
#   the UnknownEntitiesDialog opens on first fetch. The DB reset only clears
#   `selectorOptions` and `cardChecklist` rows — not players/teams. After a
#   first successful fetch run, entities are persisted and the dialog no longer
#   opens, causing this test to fail locally. This test is reliable on CI where
#   each preview deployment starts with an empty Convex database.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# DRILL TO A BASE VARIANT WITH EMPTY CHECKLIST
# ============================================================

- runFlow:
    file: util-drill-to-base-variant.yaml
    env:
      BSC_USERNAME: ${BSC_USERNAME}
      BSC_PASSWORD: ${BSC_PASSWORD}
      SPORTLOTS_USERNAME: ${SPORTLOTS_USERNAME}
      SPORTLOTS_PASSWORD: ${SPORTLOTS_PASSWORD}

# ============================================================
# ADD A CUSTOM CARD WITH A UNIQUE PLAYER NAME
# Guarantees the dialog opens regardless of what other tests have
# already committed to the global `players` table. The custom card's
# player goes through fetchCardChecklist reconciliation via the
# cardChecklist.pendingPlayerNames field.
# ============================================================

- scrollUntilVisible:
    element:
      text: "Add Card"
    timeout: 10000
- tapOn: "Add Card"
- extendedWaitUntil:
    visible: "Player name"
    timeout: 5000
- inputText: "9002-${TEST_USERNAME}"
- tapOn: "Player name"
- inputText: "Keyboard Dialog Test ${TEST_USERNAME}"
- scrollUntilVisible:
    element:
      text: "Player(s) — comma separated, optional"
    timeout: 5000
- tapOn:
    text: "Player(s) — comma separated, optional"
- inputText: "KOPlayer-${TEST_USERNAME}"
- tapOn: "Add"
- extendedWaitUntil:
    visible: "Keyboard Dialog Test ${TEST_USERNAME}"
    timeout: 10000

# ============================================================
# TRIGGER THE FETCH
# ============================================================

# If a prior flow on this worker has already populated the checklist, the
# button label is "Refresh" instead of "Fetch from Marketplaces" — both
# drive fetchCardChecklist, so match either.
- tapOn:
    text: ".*Fetch from Marketplaces.*|Refresh"
# The custom-card preamble guarantees an unknown player, so the dialog
# always opens. 60s covers the backend marketplace fetch (BSC ~30s ceiling
# + SL in parallel).
- extendedWaitUntil:
    visible: "Confirm New Players & Teams"
    timeout: 60000

# ============================================================
# KEYBOARD CONFIRMATION — Enter fires the auto-focused confirm button
# The confirm button is auto-focused on dialog open (confirmButtonRef.focus()).
# pressKey: Enter fires the click handler on the currently focused element.
# No Tab navigation is needed — Enter goes straight to confirm.
# ============================================================

# Wait for the confirm button to render with actual count — this also gives
# the auto-focus event time to complete before pressing Enter.
- extendedWaitUntil:
    visible:
      text: ".*Confirm [0-9]+ & Save.*"
    timeout: 10000

- pressKey: Enter

# ============================================================
# VERIFY CARDS SAVED
# ============================================================

- extendedWaitUntil:
    notVisible: "Confirm New Players & Teams"
    timeout: 30000

# Wait for the save confirmation. The commitCardChecklist mutation runs after
# the dialog confirm, writing cards in batches. For large sets (300+ cards),
# this can take several seconds. Use 60s for safety.
- extendedWaitUntil:
    visible:
      text: ".*Saved [0-9]+ cards.*"
    timeout: 60000

- assertVisible:
    text: ".*#[0-9].*"
