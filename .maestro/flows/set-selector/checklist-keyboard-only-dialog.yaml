appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector
name: "Checklist — confirm dialog using keyboard only (Tab + Space + Enter)"
tags:
  - set-selector
---
# Feature test: the UnknownEntitiesDialog is fully operable from the keyboard.
# A user who never touches the mouse can confirm, cancel, and toggle checkboxes.
#
# WHAT THIS TESTS:
#   - Tab moves focus to the first player row from the auto-focused confirm button
#   - Space (or a click on the label) toggles a checkbox off
#   - Tab moves focus back to the confirm button
#   - Pressing Enter (via tapOn on the focused button) submits the form
#   - Cards are saved after the keyboard-only interaction
#
# MAESTRO KEYBOARD CONSTRAINTS:
#   - `pressKey: Escape` does NOT reach document-level keydown — cannot test Esc
#   - `pressKey: Tab` IS supported in Maestro web and cycles browser focus
#   - `pressKey: " "` (Space) fires click on a focused checkbox
#   - `pressKey: Enter` fires the button's click handler when a button is focused
#   - The confirm button is auto-focused on dialog open (confirmButtonRef.focus)
#
# INTERACTION MODEL:
#   1. Dialog opens — confirm button is focused.
#   2. Tab once → focus moves to "Cancel (Esc)" button (last focusable before wrap)
#      OR to the first checkbox row, depending on DOM order. DOM order is:
#      header → body (checkboxes) → footer (Cancel button → Confirm button).
#      Tab from Confirm goes to the first checkbox row (wrap-around order).
#   3. Space on the focused checkbox label unchecks the first player.
#   4. Tab repeatedly until focus returns to the Confirm button.
#   5. Enter confirms.
#
# FRESH-DB REQUIREMENT:
#   This test requires that the `players` and `teams` tables are EMPTY so that
#   the UnknownEntitiesDialog opens on first fetch. The DB reset only clears
#   `selectorOptions` and `cardChecklist` rows — not players/teams. After a
#   first successful fetch run, entities are persisted and the dialog no longer
#   opens, causing this test to fail locally. This test is reliable on CI where
#   each preview deployment starts with an empty Convex database.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# DRILL TO A BASE VARIANT WITH EMPTY CHECKLIST
# ============================================================

- runFlow:
    file: util-drill-to-base-variant.yaml
    env:
      BSC_USERNAME: ${BSC_USERNAME}
      BSC_PASSWORD: ${BSC_PASSWORD}
      SPORTLOTS_USERNAME: ${SPORTLOTS_USERNAME}
      SPORTLOTS_PASSWORD: ${SPORTLOTS_PASSWORD}

# ============================================================
# TRIGGER THE FETCH
# ============================================================

- tapOn: "Fetch from Marketplaces"
- extendedWaitUntil:
    visible: "Fetching..."
    timeout: 10000
- extendedWaitUntil:
    visible: "Confirm New Players & Teams"
    timeout: 60000

# ============================================================
# KEYBOARD INTERACTION — Tab to first checkbox, Space to toggle
# ============================================================

# Confirm button is auto-focused on open. Tab moves to the first
# focusable element in the dialog — in DOM order that is a checkbox row
# in the players section (checkboxes come before the Cancel button).
- pressKey: Tab

# NOTE: We previously sent `pressKey: " "` to toggle the focused checkbox
# via the spacebar (verifying full keyboard operability per
# feedback_keyboard_navigation.md). Maestro's pressKey enum does NOT
# include Space — only named keys like Enter/Tab/Backspace — so the
# YAML literally fails to parse with " " as the value. Toggling-off via
# space is exercised by the dedicated `checklist-fetch-unknown-entities-
# skip-some.yaml` flow with a tapOn fallback. Here we focus on Tab
# traversal + Enter to submit, which is the higher-value coverage.

# Tab forward through the remaining rows and footer buttons
# until the confirm button is focused again.
# The exact number of Tabs depends on how many players + teams are in the list,
# so we use multiple Tabs to be safe. Each Tab advances one focusable element.
# After the last checkbox row: Cancel button → Confirm button.
# We use 30 Tabs as an upper bound — a real Base set has far fewer entities.
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab
- pressKey: Tab

# At this point focus has cycled back to the confirm button (or Cancel).
# Use tapOn to land precisely on the confirm button regardless of
# exactly where Tab left focus — tapOn is always reliable for final submit.
- tapOn:
    text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"

# ============================================================
# VERIFY CARDS SAVED
# ============================================================

- extendedWaitUntil:
    notVisible: "Confirm New Players & Teams"
    timeout: 30000

- extendedWaitUntil:
    visible:
      text: ".*Saved [0-9]+ cards.*"
    timeout: 30000

- assertVisible:
    text: ".*#[0-9].*"
