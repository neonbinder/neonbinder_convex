appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Checklist — confirm dialog using keyboard Enter on auto-focused button"
tags:
  - set-selector
  - requires:setup-done
---
# Feature test: the UnknownEntitiesDialog confirm button is auto-focused on open
# and responds to the Enter key, allowing keyboard-only confirmation.
#
# WHAT THIS TESTS:
#   - The confirm button is auto-focused on dialog open (confirmButtonRef.focus())
#   - Pressing Enter fires the button's click handler via the dialog's keydown listener
#   - Cards are saved after the keyboard-only interaction
#
# MAESTRO KEYBOARD CONSTRAINTS:
#   - `pressKey: Tab` is NOT supported on Maestro web — throws IllegalStateException.
#     Tab traversal through checkboxes cannot be tested via Maestro.
#   - `pressKey: Escape` does NOT reach document-level keydown — cannot test Esc.
#   - `pressKey: Enter` IS supported and fires the focused element's click handler.
#     The confirm button uses confirmButtonRef.current?.focus() on mount, so Enter
#     on open immediately fires handleConfirm without any prior Tab navigation.
#
# INTERACTION MODEL TESTED HERE:
#   1. Dialog opens — confirm button is auto-focused.
#   2. User presses Enter → handleConfirm fires via the button's click handler.
#   3. Dialog closes and cards are saved.
#
# COVERAGE NOTE:
#   Tab traversal + Space to toggle checkboxes cannot be covered by Maestro web
#   due to the Tab key limitation. That coverage is exercised manually. The key
#   keyboard path — Enter to confirm without touching the mouse — is covered here.
#
# FRESH-DB REQUIREMENT:
#   This test requires that the `players` and `teams` tables are EMPTY so that
#   the UnknownEntitiesDialog opens on first fetch. The DB reset only clears
#   `selectorOptions` and `cardChecklist` rows — not players/teams. After a
#   first successful fetch run, entities are persisted and the dialog no longer
#   opens, causing this test to fail locally. This test is reliable on CI where
#   each preview deployment starts with an empty Convex database.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# DRILL TO A BASE VARIANT WITH EMPTY CHECKLIST
# ============================================================

- runFlow:
    file: util-drill-to-base-variant.yaml
    env:
      BSC_USERNAME: ${BSC_USERNAME}
      BSC_PASSWORD: ${BSC_PASSWORD}
      SPORTLOTS_USERNAME: ${SPORTLOTS_USERNAME}
      SPORTLOTS_PASSWORD: ${SPORTLOTS_PASSWORD}

# ============================================================
# ADD A CUSTOM CARD WITH A UNIQUE PLAYER NAME
# Guarantees the dialog opens regardless of what other tests have
# already committed to the global `players` table. The custom card's
# player goes through fetchCardChecklist reconciliation via the
# cardChecklist.pendingPlayerNames field.
# ============================================================

- scrollUntilVisible:
    element:
      text: "Add Card"
    timeout: 10000
- tapOn: "Add Card"
# Wait for the form to open. "Player name" is the card-name input's
# placeholder (still rendered visually) and appears after the auto-focused
# Card number input is on screen.
- extendedWaitUntil:
    visible: "Player name"
    timeout: 5000
- inputText: "9002-${TEST_USERNAME}"
# Address inputs by aria-label (via Maestro's `id:` selector, which matches
# the accessibility-tree identifier). Placeholders overlap ("Player name",
# "Player(s) — comma separated, optional") and Maestro's text matcher cannot
# disambiguate them reliably — see NEO-13 root cause.
- tapOn:
    id: "Card name"
- inputText: "Keyboard Dialog Test ${TEST_USERNAME}"
# The Players input is the 4th row of the form — below the fold on the
# default 1024x629 headless viewport. Scroll anchor uses the visible
# placeholder text; tap target uses the aria-label via `id:`.
- scrollUntilVisible:
    element:
      text: "Player(s) — comma separated, optional"
    timeout: 5000
- tapOn:
    id: "Players"
# Give any post-tap re-render time to settle before typing. Without this,
# observed locally: inputText routes to the Team input above (focus
# appears to bounce between identify and tap). See NEO-13 maestro.log.
- waitForAnimationToEnd:
    timeout: 1000
- inputText: "KOPlayer-${TEST_USERNAME}"
# Defensive: confirm the typed player name landed on the form before
# submitting. If a future regression breaks input targeting again, this
# fails immediately at the form step instead of 60s later at the dialog
# assertion.
- assertVisible: "KOPlayer-${TEST_USERNAME}"
# Anchor the form-submit tap on the viewport so the test does not depend on
# how much vertical space the checklist above the form consumes. Maestro
# text matchers are full-match, so plain "Add" binds to the submit button
# (text exactly "Add") and not to the "Add Card" form header. The form can
# slide below the 629px viewport once the checklist accumulates prior cards
# — see NEO-15 for the failure pattern.
- scrollUntilVisible:
    element:
      text: "Add"
    timeout: 5000
- tapOn:
    text: "Add"
# After submit the form closes and the new card row renders in the
# virtualized checklist (react-virtuoso). Where the row lands depends on
# the checklist's existing length, so scroll to anchor on the new card's
# title rather than assuming it lands inside the current viewport.
- scrollUntilVisible:
    element:
      text: "Keyboard Dialog Test ${TEST_USERNAME}"
    timeout: 15000

# Defensive: under parallel-worker load the addCustomCard mutation has
# been observed to commit server-side (new card appears in list above)
# while the client-side `setShowAddForm(false)` doesn't fire — likely a
# Convex WebSocket reconnect drops the mutation response. When that
# happens, the Add Card form stays mounted at the bottom of the page,
# and the header's "Add Card" + "Sync card checklist" buttons stay
# hidden (they only render when `!showAddForm`). Tapping the form's
# Cancel button forces `setShowAddForm(false)` without going through
# the mutation, restoring the header buttons. If the form already
# closed (the happy path), the `when: visible: Cancel` gate makes this
# step a no-op.
- runFlow:
    when:
      visible: "Cancel"
    commands:
      - tapOn: "Cancel"
      - extendedWaitUntil:
          notVisible: "Cancel"
          timeout: 5000

# ============================================================
# TRIGGER THE FETCH
# ============================================================

# If a prior flow on this worker has already populated the checklist, the
# button label is "Refresh" instead of "Fetch from Marketplaces" — both
# drive fetchCardChecklist, so match either.
# Tap the CardChecklist's Fetch/Refresh button by its aria-label. After
# scrollUntilVisible above (which scrolls down to find the new custom
# card at the bottom of the list), the Sync button is at y~17-49 —
# technically in the viewport but OBSCURED by the sticky page header
# (z-20, ~64px tall — see binder-header.tsx).
#
# scrollUntilVisible's visibility check is DOM-rect intersection; it
# doesn't account for z-index occlusion, so the button is "visible" and
# no scroll happens. Force a real scroll up to "Re-map Base" — a button
# in the variant-types row that lives well ABOVE the cards section.
# Centering it puts the cards section (and Sync button) clearly below
# the header.
- scrollUntilVisible:
    element:
      text: "Re-map Base"
    direction: UP
    centerElement: true
    timeout: 10000
- tapOn:
    id: "Sync card checklist"
# The custom-card preamble guarantees an unknown player, so the dialog
# always opens. 60s covers the backend marketplace fetch (BSC ~30s ceiling
# + SL in parallel).
- extendedWaitUntil:
    visible: "Confirm New Players & Teams"
    timeout: 60000

# ============================================================
# KEYBOARD CONFIRMATION — Enter fires the auto-focused confirm button
# The confirm button is auto-focused on dialog open (confirmButtonRef.focus()).
# pressKey: Enter fires the click handler on the currently focused element.
# No Tab navigation is needed — Enter goes straight to confirm.
# ============================================================

# Wait for the confirm button to render with actual count — this also gives
# the auto-focus event time to complete before pressing Enter.
- extendedWaitUntil:
    visible:
      text: ".*Confirm [0-9]+ & Save.*"
    timeout: 10000

- pressKey: Enter

# ============================================================
# VERIFY CARDS SAVED
# ============================================================

- extendedWaitUntil:
    notVisible: "Confirm New Players & Teams"
    timeout: 30000

# Wait for the save confirmation. The commitCardChecklist mutation runs after
# the dialog confirm, writing cards in batches. For large sets (300+ cards),
# this can take several seconds. Use 60s for safety.
- extendedWaitUntil:
    visible:
      text: ".*Saved [0-9]+ cards.*"
    timeout: 60000

- assertVisible:
    text: ".*#[0-9].*"
