url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/set-selector
name: Card Checklist Sync — Fetch Cards from Marketplaces
tags:
  - set-selector
  - regression
---
# This test verifies that a user can drill down to a variant and then
# use "Fetch from Marketplaces" to populate the card checklist.
# It confirms that individual card entries appear with card numbers and names,
# and that platform badges (BSC / SL) are shown on synced cards.
#
# Prerequisites: BSC and SL credentials must be available in env vars.
#
# All sync forms auto-fire on open — no "Sync from Marketplaces" button.
# Each form shows a "Syncing X" heading then closes automatically on success.

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# --- Ensure marketplace credentials are available ---
# Navigate to /profile before credential setup — runFlow does NOT re-navigate,
# so the sub-flows (which expect "Select Platform" on /profile) would fail if
# the browser is still on /set-selector after sign-in redirect.
- openLink: ${APP_URL || "https://localhost:3000"}/profile
- scrollUntilVisible:
    element:
      text: ".*Select Platform.*"
    timeout: 15000

- runFlow:
    file: ../profile/setup-bsc-credentials.yaml
    env:
      BSC_USERNAME: ${BSC_USERNAME}
      BSC_PASSWORD: ${BSC_PASSWORD}

- runFlow:
    file: ../profile/setup-sportlots-credentials.yaml
    env:
      SPORTLOTS_USERNAME: ${SPORTLOTS_USERNAME}
      SPORTLOTS_PASSWORD: ${SPORTLOTS_PASSWORD}

- openLink: ${APP_URL || "https://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 15000

# --- Sync and select sport ---
# Only sync if the button is present; prior flows in this run may have already
# populated sports, replacing the button with the list.
- runFlow:
    when:
      visible: "Sync Sports"
    commands:
      - tapOn: "Sync Sports"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Sport Options|Sync Sports.*"
          timeout: 15000
      # "Sync Sports" reappears below the list once ALL platforms have responded.
      - scrollUntilVisible:
          element:
            text: "Sync Sports"
          timeout: 60000
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

# --- Sync and select year ---
- extendedWaitUntil:
    visible: "Years"
    timeout: 10000
- runFlow:
    when:
      visible: "Sync Years"
    commands:
      - tapOn: "Sync Years"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Year Options|Sync Years.*"
          timeout: 15000
      # "Sync Years" reappears below the list once ALL platforms have responded.
      - scrollUntilVisible:
          element:
            text: "Sync Years"
          timeout: 60000
- tapOn:
    text: ".*20[0-9][0-9].*"
    index: 0

# --- Sync and select manufacturer ---
- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 10000
- runFlow:
    when:
      visible: "Sync Manufacturers"
    commands:
      - tapOn: "Sync Manufacturers"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Manufacturer Options|Sync Manufacturers.*"
          timeout: 15000
      # "Sync Manufacturers" reappears below the list once ALL platforms have responded.
      - scrollUntilVisible:
          element:
            text: "Sync Manufacturers"
          timeout: 60000
# Pick the first available manufacturer — do not hardcode "Topps".
- tapOn:
    text: ".*"
    index: 0

# --- Sync and select set ---
- extendedWaitUntil:
    visible: "Sets"
    timeout: 10000
- runFlow:
    when:
      visible: "Sync Sets"
    commands:
      - tapOn: "Sync Sets"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Sets|Sync Sets.*"
          timeout: 15000
      # "Sync Sets" does not reappear once data is populated. Wait for
      # "Syncing Sets" to disappear, which signals the form closed.
      - extendedWaitUntil:
          notVisible: "Syncing Sets"
          timeout: 90000
- tapOn:
    text: ".*"
    index: 0

# --- Sync and select variant type (level 5, formerly "Set Variants") ---
- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 10000
- runFlow:
    when:
      visible: "Sync Variant Types"
    commands:
      - tapOn: "Sync Variant Types"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Variant Types|Sync Variant Types.*"
          timeout: 15000
      # "Sync Variant Types" reappears below the list once ALL platforms have responded.
      - scrollUntilVisible:
          element:
            text: "Sync Variant Types"
          timeout: 60000
- tapOn:
    text: ".*"
    index: 0

# --- Sync and select variant (level 6) ---
- extendedWaitUntil:
    visible: "Variants"
    timeout: 10000
- runFlow:
    when:
      visible: "Sync Variants"
    commands:
      - tapOn: "Sync Variants"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Variants|Select Base Set.*"
          timeout: 15000
      # "Sync Variants" reappears once all platforms have responded, OR the
      # BaseSetPicker modal appears (for Base variant type).
      - scrollUntilVisible:
          element:
            text: ".*Sync Variants|Select Base Set.*"
          timeout: 60000
# If the BaseSetPicker modal appeared (Base variant type), confirm it to
# proceed past the modal into the variants list.
- runFlow:
    when:
      visible: "Confirm Base Set"
    commands:
      - tapOn: "Confirm Base Set"
      - extendedWaitUntil:
          notVisible: "Confirm Base Set"
          timeout: 15000
- tapOn:
    text: ".*"
    index: 0

# ============================================================
# CARDS CHECKLIST SYNC
# ============================================================

# The Cards panel appears full-width below the selector row after selecting a variant
- extendedWaitUntil:
    visible: "Cards"
    timeout: 10000

# The empty state shows "No cards in this checklist yet." and a fetch button
- assertVisible: "No cards in this checklist yet."
- assertVisible: "Fetch from Marketplaces"

# Tap "Fetch from Marketplaces" to pull the card list from BSC / SL
- tapOn: "Fetch from Marketplaces"

# While fetching, the button label changes to "Fetching..."
- extendedWaitUntil:
    visible: "Fetching..."
    timeout: 5000

# Wait for the fetch to finish — the button disappears and card rows appear
- extendedWaitUntil:
    notVisible: "Fetching..."
    timeout: 60000

# Verify that at least one card entry appeared (cards show "#NNN" numbers)
- assertVisible: ".*#[0-9].*"

# Verify the "Refresh" button is now available (replaces the fetch button
# once the checklist is populated)
- assertVisible: "Refresh"

# Verify platform badges are shown on at least one card
- assertVisible: "BSC"
