url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: Full Hierarchy Drill-Down — Sport to Cards Column
tags:
  - set-selector
  - wip
  - serial-global
# FIXME: Card functionality deferred to a follow-up release; un-park when card-level UI ships.
---
# This test walks a user all the way through every level of the set hierarchy:
# Sport → Year → Manufacturer → Set → Variant Types → Variants → Cards column.
# It syncs each level from marketplaces and verifies the next column appears
# before drilling down. This is the core "happy path" of the set selector.
#
# All sync forms auto-fire immediately on open — there is no "Sync from
# Marketplaces" button to tap. Each form closes automatically on success
# and its corresponding "Sync X" button returns to the screen.

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# --- Ensure marketplace credentials are available ---
# Navigate to /profile before credential setup — runFlow does NOT re-navigate,
# so the sub-flows (which expect "Select Platform" on /profile) would fail if
# the browser is still on /set-selector after sign-in redirect.
- openLink: ${APP_URL || "https://localhost:3000"}/profile
- scrollUntilVisible:
    element:
      text: ".*Select Platform.*"
    timeout: 15000

- runFlow:
    file: ../profile/setup-bsc-credentials.yaml
    env:
      BSC_USERNAME: ${BSC_USERNAME}
      BSC_PASSWORD: ${BSC_PASSWORD}

- runFlow:
    file: ../profile/setup-sportlots-credentials.yaml
    env:
      SPORTLOTS_USERNAME: ${SPORTLOTS_USERNAME}
      SPORTLOTS_PASSWORD: ${SPORTLOTS_PASSWORD}

# Navigate to the set selector after credential setup
- openLink: ${APP_URL || "https://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 15000

# ============================================================
# LEVEL 1 — SPORT
# ============================================================

# The Sports column should be visible on load
- assertVisible: "Sports"

# Only sync if the button is present; prior flows in this run may have already
# populated sports, replacing the button with the list.
- runFlow:
    when:
      visible: "Sync Sports"
    commands:
      - tapOn: "Sync Sports"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Sport Options|Sync Sports.*"
          timeout: 15000
      # "Sync Sports" reappears below the list once ALL platforms have responded.
      # Scroll to it — this is the correct cross-platform completion signal.
      - scrollUntilVisible:
          element:
            text: "Sync Sports"
          timeout: 60000
      # Verify marketplace sports were written — "Baseball" appearing confirms
      # data from both platforms populated the Sports column.
      # (SL/BSC pills now render only on terminal items, not non-terminal Sports.)
      - assertVisible: "Baseball"

# Select "Baseball" as the sport (expected to exist on both platforms)
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

# ============================================================
# LEVEL 2 — YEAR
# ============================================================

# After selecting a sport, the Years column should appear
- extendedWaitUntil:
    visible: "Years"
    timeout: 10000

# Only sync if the button is present
- runFlow:
    when:
      visible: "Sync Years"
    commands:
      - tapOn: "Sync Years"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Year Options|Sync Years.*"
          timeout: 15000
      # "Sync Years" reappears below the list once all platforms have responded.
      - scrollUntilVisible:
          element:
            text: "Sync Years"
          timeout: 60000

# Verify year entries appear (years are numeric — look for a 4-digit year)
- assertVisible: ".*20[0-9][0-9].*"

# Select any visible year
- tapOn:
    text: ".*20[0-9][0-9].*"
    index: 0

# ============================================================
# LEVEL 3 — MANUFACTURER
# ============================================================

# The Manufacturers column should appear after selecting a year
- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 10000

# Only sync if the button is present
- runFlow:
    when:
      visible: "Sync Manufacturers"
    commands:
      - tapOn: "Sync Manufacturers"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Manufacturer Options|Sync Manufacturers.*"
          timeout: 15000
      # "Sync Manufacturers" reappears below the list once all platforms have responded.
      - scrollUntilVisible:
          element:
            text: "Sync Manufacturers"
          timeout: 60000

# Select the first available manufacturer — do not hardcode "Topps".
- tapOn:
    text: ".*"
    index: 0

# ============================================================
# LEVEL 4 — SET
# ============================================================

# The Sets column should appear after selecting a manufacturer
- extendedWaitUntil:
    visible: "Sets"
    timeout: 10000

# Only sync if the button is present
- runFlow:
    when:
      visible: "Sync Sets"
    commands:
      - tapOn: "Sync Sets"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Sets|Sync Sets.*"
          timeout: 15000
      # "Sync Sets" does not reappear once data is populated. Wait for
      # "Syncing Sets" to disappear, which signals the form closed.
      - extendedWaitUntil:
          notVisible: "Syncing Sets"
          timeout: 90000

# Select the first set in the list
- tapOn:
    text: ".*"
    index: 0

# ============================================================
# LEVEL 5 — VARIANT TYPES
# ============================================================

# The Variant Types column appears after selecting a set
# (Previously called "Set Variants" — now labelled "Variant Types")
- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 10000

# Only sync if the button is present
- runFlow:
    when:
      visible: "Sync Variant Types"
    commands:
      - tapOn: "Sync Variant Types"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Variant Types|Sync Variant Types.*"
          timeout: 15000
      # "Sync Variant Types" reappears below the list once all platforms have responded.
      - scrollUntilVisible:
          element:
            text: "Sync Variant Types"
          timeout: 60000

# CATEGORY-3 NOTE: "tapOn: index 0" selects the first variant type alphabetically,
# which is "Base". Base is now a TERMINAL variantType — the Variants column is
# suppressed when Base is selected. The flow then waits for "Variants" (level 6)
# which will never appear. This requires a human-approved fix: either tap "Insert"
# explicitly (non-terminal, Variants column appears normally), or restructure
# the Base path to follow BaseMappingForm → confirm → CardChecklist.
#
# The flow is already tagged `wip` so it does not run in CI. Fix is BLOCKED
# pending human decision on which variant type index: 0 resolves to and whether
# to hardcode "Insert" here.
# Select the first variant type
- tapOn:
    text: ".*"
    index: 0

# ============================================================
# LEVEL 6 — VARIANTS
# ============================================================

# The Variants column appears after selecting a variant type
- extendedWaitUntil:
    visible: "Variants"
    timeout: 10000

# Only sync if the button is present. For "Base" variant type this shows
# "Select Base Set" heading while loading, then auto-closes on success.
# For other types "Syncing Variants" appears.
- runFlow:
    when:
      visible: "Sync Variants"
    commands:
      - tapOn: "Sync Variants"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Variants|Select Base Set.*"
          timeout: 15000
      # "Sync Variants" reappears once all platforms have responded, OR the
      # BaseSetPicker modal appears (for Base variant type). Either is the
      # correct cross-platform completion signal.
      - scrollUntilVisible:
          element:
            text: ".*Sync Variants|Select Base Set.*"
          timeout: 60000

# If the BaseSetPicker modal appeared (Base variant type), confirm it to
# proceed past the modal into the variants list.
- runFlow:
    when:
      visible: "Confirm Base Set"
    commands:
      - tapOn: "Confirm Base Set"
      - extendedWaitUntil:
          notVisible: "Confirm Base Set"
          timeout: 15000

# Select the first variant in the list
- tapOn:
    text: ".*"
    index: 0

# ============================================================
# CARDS COLUMN (full-width below the selector row)
# ============================================================

# After selecting a variant, the Cards checklist panel appears below
- extendedWaitUntil:
    visible: "Cards"
    timeout: 10000

# The Cards panel shows either a populated checklist or the empty-state
# "No cards in this checklist yet." message. Either way "Add Card" is present.
- assertVisible: "Add Card"
