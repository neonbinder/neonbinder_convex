url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/set-selector
name: Full Hierarchy Drill-Down — Sport to Cards Column
tags:
  - set-selector
  - regression
  - wip
---
# This test walks a user all the way through every level of the set hierarchy:
# Sport → Year → Manufacturer → Set → Variant Types → Variants → Cards column.
# It syncs each level from marketplaces and verifies the next column appears
# before drilling down. This is the core "happy path" of the set selector.
#
# All sync forms auto-fire immediately on open — there is no "Sync from
# Marketplaces" button to tap. Each form closes automatically on success
# and its corresponding "Sync X" button returns to the screen.

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# --- Ensure marketplace credentials are available ---
- runFlow:
    file: ../profile/setup-bsc-credentials.yaml
    env:
      BSC_USERNAME: ${BSC_USERNAME}
      BSC_PASSWORD: ${BSC_PASSWORD}

- runFlow:
    file: ../profile/setup-sportlots-credentials.yaml
    env:
      SPORTLOTS_USERNAME: ${SPORTLOTS_USERNAME}
      SPORTLOTS_PASSWORD: ${SPORTLOTS_PASSWORD}

# Navigate to the set selector after credential setup
- openLink: ${APP_URL || "https://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 15000

# ============================================================
# LEVEL 1 — SPORT
# ============================================================

# The Sports column should be the only column visible on load
- assertVisible: "Sports"
- assertVisible: "Sync Sports"

# Tap "Sync Sports" — the form opens and immediately fires the sync.
# The heading "Syncing Sport Options" appears while the sync runs.
# The form closes automatically on success and "Sync Sports" returns.
- tapOn: "Sync Sports"
- extendedWaitUntil:
    visible: "Syncing Sport Options"
    timeout: 5000
- extendedWaitUntil:
    visible: "Sync Sports"
    timeout: 45000

# Verify platform badges appear on the synced sport entries
- assertVisible: "BSC"
- assertVisible: "SL"

# Select "Baseball" as the sport (expected to exist on both platforms)
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

# ============================================================
# LEVEL 2 — YEAR
# ============================================================

# After selecting a sport, the Years column should appear
- extendedWaitUntil:
    visible: "Years"
    timeout: 10000

# Sync years — form auto-fires, heading appears, then form closes on success
- tapOn: "Sync Years"
- extendedWaitUntil:
    visible: "Syncing Year Options"
    timeout: 5000
- extendedWaitUntil:
    visible: "Sync Years"
    timeout: 45000

# Verify year entries appear (years are numeric — look for a 4-digit year)
- assertVisible: ".*20[0-9][0-9].*"

# Select any visible year
- tapOn:
    text: ".*20[0-9][0-9].*"
    index: 0

# ============================================================
# LEVEL 3 — MANUFACTURER
# ============================================================

# The Manufacturers column should appear after selecting a year
- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 10000

# Sync manufacturers — form auto-fires
- tapOn: "Sync Manufacturers"
- extendedWaitUntil:
    visible: "Syncing Manufacturer Options"
    timeout: 5000
- extendedWaitUntil:
    visible: "Sync Manufacturers"
    timeout: 45000

# Select the first available manufacturer
- tapOn:
    text: "Topps"
    index: 0

# ============================================================
# LEVEL 4 — SET
# ============================================================

# The Sets column should appear after selecting a manufacturer
- extendedWaitUntil:
    visible: "Sets"
    timeout: 10000

# Sync sets — form auto-fires
- tapOn: "Sync Sets"
- extendedWaitUntil:
    visible: "Syncing Sets"
    timeout: 5000
- extendedWaitUntil:
    visible: "Sync Sets"
    timeout: 45000

# Select the first set in the list
- tapOn:
    text: ".*"
    index: 0

# ============================================================
# LEVEL 5 — VARIANT TYPES
# ============================================================

# The Variant Types column appears after selecting a set
# (Previously called "Set Variants" — now labelled "Variant Types")
- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 10000

# Sync variant types — form auto-fires, heading is "Syncing Variant Types"
- tapOn: "Sync Variant Types"
- extendedWaitUntil:
    visible: "Syncing Variant Types"
    timeout: 5000
- extendedWaitUntil:
    visible: "Sync Variant Types"
    timeout: 45000

# Select the first variant type (e.g., "Base" is common on both platforms)
- tapOn:
    text: ".*"
    index: 0

# ============================================================
# LEVEL 6 — VARIANTS
# ============================================================

# The Variants column appears after selecting a variant type
- extendedWaitUntil:
    visible: "Variants"
    timeout: 10000

# Sync variants — form auto-fires.
# For "Base" variant type this shows "Select Base Set" heading while loading,
# then auto-closes on success. For other types "Syncing Variants" appears.
- tapOn: "Sync Variants"
- extendedWaitUntil:
    visible: ".*Syncing Variants|Select Base Set.*"
    timeout: 5000
- extendedWaitUntil:
    visible: "Sync Variants"
    timeout: 45000

# Select the first variant in the list
- tapOn:
    text: ".*"
    index: 0

# ============================================================
# CARDS COLUMN (full-width below the selector row)
# ============================================================

# After selecting a variant, the Cards checklist panel appears below
- extendedWaitUntil:
    visible: "Cards"
    timeout: 10000

# The Cards panel shows either a populated checklist or the empty-state
# "No cards in this checklist yet." message. Either way "Add Card" is present.
- assertVisible: "Add Card"
