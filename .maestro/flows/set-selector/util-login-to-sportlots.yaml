appId: com.neonbinder.web
name: "Util — Ensure SportLots credentials are saved and authenticated (bonus; BSC alone unlocks data flows)"
tags:
  - util
---
# Shared prerequisite for flows that depend on a live SportLots fetch.
#
# WHY THIS EXISTS:
#   Mirrors util-login-to-bsc.yaml for the SportLots platform. SportLots uses
#   cookie-based authentication; the cookie can expire between test runs. Forcing
#   a "Test Credentials" call refreshes the session and ensures SL card data is
#   returned by the checklist fetch.
#
# CALLER CONTRACT:
#   - Caller must have called launchApp and waited for sign-in redirect.
#   - Credentials are already seeded server-side by worker-bootstrap; no
#     credential env vars need to be passed.
#   - This util leaves the browser on /profile (same as util-login-to-bsc).

# ============================================================
# NAVIGATE TO PROFILE
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/profile
- extendedWaitUntil:
    visible: "Neon Binder"
    timeout: 20000

# ============================================================
# FORCE A FRESH SPORTLOTS LOGIN — tap "Test Credentials"
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/profile
- scrollUntilVisible:
    element:
      text: ".*Select Platform.*"
    timeout: 20000

# Switch to SportLots in the platform tablist (was a native <select> —
# now role="tab" buttons; tap the visible label).
- tapOn: "Sportlots"

- scrollUntilVisible:
    element:
      text: "Test Credentials"
    timeout: 10000
- tapOn: "Test Credentials"

# 30s exception: a COLD marketplace login is a real ~22s Puppeteer/SSO round-trip (cached is <1s).
# This is the ONE sanctioned >10s wait (the standing rule is 10s) — do NOT copy this ceiling elsewhere.
# scrollUntilVisible both waits for the element AND scrolls it into the viewport, so the
# assertVisible that follows is guaranteed to see it without a separate extendedWaitUntil.
- scrollUntilVisible:
    element:
      text: ".*Sportlots account authenticated successfully.*|.*Credentials saved successfully.*"
    timeout: 30000

- assertVisible:
    text: ".*Sportlots account authenticated successfully.*|.*Credentials saved successfully.*"
