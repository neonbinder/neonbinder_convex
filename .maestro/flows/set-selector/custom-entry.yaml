url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector
name: Set Selector Custom Entry — Full Hierarchy via Manual Input
tags:
  - set-selector
  - regression
---
# A user builds a complete set hierarchy entirely through custom entries —
# no marketplace sync is involved. This verifies that every level of the
# hierarchy (sport → year → manufacturer → set → variant) can be created
# manually, that each selection reveals the next column, and that the
# Cards column appears after selecting a variant.
#
# Each custom entry is given a unique name so the test can reliably
# identify it later. The "+ Custom" button index tracks which column
# the button belongs to as columns collapse after selection.

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# Wait for the Set Selector page to fully render
- extendedWaitUntil:
    visible: "Sports"
    timeout: 15000

# ============================================================
# LEVEL 1 — Add a custom sport
# ============================================================

# The Sports column is always the first column shown
- assertVisible: "Sync Sports"
- assertVisible: "+ Custom"

# Tap "+ Custom" to open the custom entry form for Sports
- tapOn: "+ Custom"
- extendedWaitUntil:
    visible: "Add Custom Entry"
    timeout: 5000

- tapOn: "Enter custom value..."
- inputText: "TestSport"
- tapOn:
    text: "Add"
    index: 0

# "TestSport" should appear in the Sports list with a "Custom" badge
- extendedWaitUntil:
    visible: "TestSport"
    timeout: 10000
- assertVisible: "Custom"

# Select the custom sport — this collapses Sports and shows Years
- tapOn: "TestSport"
- extendedWaitUntil:
    visible: "Years"
    timeout: 10000

# ============================================================
# LEVEL 2 — Add a custom year
# ============================================================

# After "TestSport" is selected, the Sports column collapses to a pill.
# The "+ Custom" button for Years is now the first visible one.
- tapOn: "+ Custom"
- extendedWaitUntil:
    visible: "Add Custom Entry"
    timeout: 5000

- tapOn: "Enter custom value..."
- inputText: "1999"
- tapOn:
    text: "Add"
    index: 0

# "1999" should appear in the Years list with a "Custom" badge
- extendedWaitUntil:
    visible: "1999"
    timeout: 10000
- assertVisible: "1999"

# Select the custom year — this collapses Years and shows Manufacturers
- tapOn: "1999"
- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 10000

# ============================================================
# LEVEL 3 — Add a custom manufacturer
# ============================================================

# The "+ Custom" button for Manufacturers is now the first visible one
- tapOn: "+ Custom"
- extendedWaitUntil:
    visible: "Add Custom Entry"
    timeout: 5000

- tapOn: "Enter custom value..."
- inputText: "TestMaker"
- tapOn:
    text: "Add"
    index: 0

# "TestMaker" should appear in the Manufacturers list
- extendedWaitUntil:
    visible: "TestMaker"
    timeout: 10000

# Select the custom manufacturer — this collapses Manufacturers and shows Sets
- tapOn: "TestMaker"
- extendedWaitUntil:
    visible: "Sets"
    timeout: 10000

# ============================================================
# LEVEL 4 — Add a custom set
# ============================================================

# The "+ Custom" button for Sets is now the first visible one
- tapOn: "+ Custom"
- extendedWaitUntil:
    visible: "Add Custom Entry"
    timeout: 5000

- tapOn: "Enter custom value..."
- inputText: "TestSet"
- tapOn:
    text: "Add"
    index: 0

# "TestSet" should appear in the Sets list
- extendedWaitUntil:
    visible: "TestSet"
    timeout: 10000

# Select the custom set — this collapses Sets and shows Set Variants
- tapOn: "TestSet"
- extendedWaitUntil:
    visible: "Set Variants"
    timeout: 10000

# ============================================================
# LEVEL 5 — Add a custom variant
# ============================================================

# The "+ Custom" button for Set Variants is now the first visible one
- tapOn: "+ Custom"
- extendedWaitUntil:
    visible: "Add Custom Entry"
    timeout: 5000

- tapOn: "Enter custom value..."
- inputText: "Base"
- tapOn:
    text: "Add"
    index: 0

# "Base" should appear in the Set Variants list
- extendedWaitUntil:
    visible: "Base"
    timeout: 10000

# Select the custom variant — this should reveal the Cards column
- tapOn: "Base"

# ============================================================
# LEVEL 6 — Cards column appears
# ============================================================

# After selecting a variant, the Cards column should be visible
- extendedWaitUntil:
    visible: "Cards"
    timeout: 10000

# The empty checklist state shows "No cards in this checklist yet."
# and the "Add Card" button (since no sync credentials are needed
# for a fully custom hierarchy)
- assertVisible: "Add Card"
