appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Topps Chrome — read-only verify marketplace-derived set attributes are present (read-only)"
tags:
  - regression
  - set-selector
---
# Read-only verification of the SetAttributesPanel on the REAL 2024 Topps Chrome set.
#
# WHY READ-ONLY / NO ISOLATION NEEDED:
#   This flow performs zero writes — it never taps a save button, "Edit attributes",
#   or any mutating input. Because it only reads, concurrent workers in the NEO-49
#   work-queue cannot stomp each other. No isolated lane is needed (the isolated lane
#   is gone; the queue is dynamic, not phased).
#
# WHAT THIS VERIFIES:
#   1. BSC/SportLots sync (run by the setup track) persisted feature data on the
#      real Topps Chrome set — League rows and the "Will propagate to N cards"
#      counter are visible.
#   2. The panel heading, breadcrumb, and at least one populated metadata field
#      are present — the panel renders correctly with real marketplace data.
#   3. At least one feature input row (aria-label "Value for League") is rendered,
#      confirming the features list is populated from the BSC/SL sync.
#
# PREREQUISITE (implicit): the setup track must have run at least once on this
# Convex deployment so Topps Chrome is in selectorOptions. On a brand-new
# deployment the flow will fail clearly ("Topps Chrome" not visible in Sets).
#
# NO WRITES: this flow never taps a save button, "Edit attributes", or any
# input field that mutates data.

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# DRILL TO 2024 TOPPS CHROME (setName level)
# The util navigates to /set-selector itself and returns with
# Baseball → 2024 → Topps → Topps Chrome selected, ready at
# the Variant Types column.
# ============================================================

- runFlow:
    file: util-drill-to-2024-topps-chrome.yaml

# ============================================================
# OPEN SET ATTRIBUTES PANEL (read-only expand)
# Scroll to the "Edit attributes" toggle first to locate the panel area.
# At the setName level the panel defaults EXPANDED, but we guard with the
# idempotent expand pattern in case a prior test collapsed it.
# ============================================================

- scrollUntilVisible:
    element:
      id: "Edit attributes"
    visibilityPercentage: 10
    timeout: 7000

# IDEMPOTENT EXPAND: tap only if the panel is currently collapsed.
- runFlow:
    when:
      visible:
        id: "Edit attributes"
    commands:
      - tapOn:
          id: "Edit attributes"
      - extendedWaitUntil:
          visible:
            id: "Hide attributes"
          timeout: 5000

# Panel is open — "Hide attributes" toggle must be present.
- assertVisible:
    id: "Hide attributes"

# ============================================================
# ASSERT BREADCRUMB SCOPE TEXT
# The breadcrumb shows "Attributes for Topps Chrome (Set) — ... › Topps".
# The "›" separator is the reliable indicator that ancestry is rendered.
# ============================================================

- assertVisible:
    text: ".*›.*Topps Chrome.*"

# ============================================================
# ASSERT MARKETPLACE-DERIVED FEATURE DATA IS PRESENT
# The BSC/SportLots sync populates feature rows (e.g. League) on real sets.
# "Will propagate to N cards" appears when at least one feature row exists
# and a card checklist is associated. We assert this counter OR the metadata
# chips (Released, TCDB) as a positive signal that sync produced data.
# ============================================================

# "Will propagate to N cards" preview counter — visible when feature rows exist.
- assertVisible:
    text: ".*Will propagate to.*"

# The setMetadata section shows either TCDB-synced chips or an empty state.
# We assert the section renders in either state (not a blank screen).
- assertVisible:
    text: ".*No set metadata yet.*|.*Released.*|.*Cards.*|.*TCDB.*|.*Block.*"

# ============================================================
# ASSERT AT LEAST ONE FEATURE INPUT ROW IS VISIBLE
# The League feature row is the primary marketplace-derived feature on
# Baseball sets. Its input (aria-label "Value for League") must be
# rendered — confirming the features list is populated from the BSC/SL sync.
# We scroll to it before asserting (panel body can be taller than viewport).
# ============================================================

- scrollUntilVisible:
    element:
      id: "Value for League"
    visibilityPercentage: 10
    waitToSettleTimeoutMs: 1000
    timeout: 7000
