appId: com.neonbinder.web
name: "Util — drill to a (Sport, Year, Manufacturer, Set) — accepts env overrides"
tags:
  - util
---
# FAST drill when called with defaults — assumes the cascade `setup.yaml`
# flow has already populated:
#   - BSC + SL credentials saved
#   - Baseball → 2024 → Topps → Topps Chrome in selectorOptions
#   - Variant Types (Base, Insert, Parallel) for that set
# Most callers (cards-base, sets-base, all checklist-* flows etc.) use the
# defaults and pay zero extra cost.
#
# OVERRIDE PATH — when the caller passes a different SPORT (or YEAR /
# MANUFACTURER / SET) via its `runFlow.env` block, the data may NOT be
# pre-synced. The drill still works because each level's auto-sync fires
# on column open; the `extendedWaitUntil` waits for the search input
# (which signals sync completion) accommodate the longer marketplace
# round-trip. This is the "lazy per-test sync" pattern documented in the
# plan at ~/.claude/plans/we-ve-been-trying-to-delegated-ullman.md.
#
# CALLER CONTRACT:
#   - Caller has called launchApp and waited for sign-in redirect.
#   - Caller flow tags include `requires:setup-done`.
#   - The browser is on /set-selector when this util is invoked, OR
#     the openLink below brings it there.
#
# Returns with the Variant Types column visible and Base/Insert/Parallel listed.

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000

# Level 1 — Sport (defaults to Baseball). Use the Sports search input to
# filter the column's internal-scroll list down to the target sport —
# most sports past the first ~7 (alphabetical) sit below the column's
# `max-h-[400px] overflow-y-auto` fold and Maestro's page-level scroll
# can't reach them. The search input is targeted by its aria-label
# `Search sports` (added on EntitySelector.tsx).
#
# IMPORTANT: after typing in the search input, the input itself has
# `text=${SPORT}` (its current value) and `resource-id=Search sports`. A bare
# `tapOn: ${SPORT}` re-matches the input (DOM order: input first), not the row.
# `index: 1` is NOT a reliable fix — the input/row order flips between a cold
# sync and a re-drill of already-synced data, so index:1 can land on the input
# (NEO-46: that silently broke the Insert/Parallel pre-sync — the year was never
# selected, so the Manufacturers column never opened). Select by RELATIONSHIP
# instead: the result row is the `${SPORT}` element BELOW the search input.
- tapOn:
    id: "Search sports"
- inputText: ${SPORT || "Baseball"}
- tapOn:
    text: ${SPORT || "Baseball"}
    below:
      id: "Search sports"

# Level 2 — Year. Wait for the Years column search input as the auto-sync
# completion signal. 180 s covers a cold sync (BSC + SL fetch ~30-60 s each).
- scrollUntilVisible:
    element:
      text: ".*Search years.*"
    direction: right
    centerElement: true
- tapOn:
    text: ".*Search years.*"
- inputText: ${YEAR || "2024"}
- tapOn:
    text: ${YEAR || "2024"}
    below:
      id: "Search years"

# Level 3 — Manufacturer. 90 s covers cold sync.
- scrollUntilVisible:
    element:
      text: ".*Search manufacturers.*"
    direction: right
    centerElement: true
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: ${MANUFACTURER || "Topps"}
- tapOn:
    text: ${MANUFACTURER || "Topps"}
    below:
      id: "Search manufacturers"

# Level 4 — Set. 120 s covers cold sync.
- scrollUntilVisible:
    element:
      text: ".*Search sets.*"
    direction: right
    centerElement: true
- tapOn:
    text: ".*Search sets.*"
- inputText: ${SET || "Topps Chrome"}
- tapOn:
    text: ${SET || "Topps Chrome"}
    below:
      id: "Search sets"

# Level 5 — Variant Types. Auto-syncs Base/Insert/Parallel when this
# column first opens for a new set. Default path (Topps Chrome, pre-
# synced by cascade) finishes in <5s. Cold-sync for new sets goes
# through fetchAggregatedOptions → BSC + SL adapters; those calls
# should complete in <10s but occasionally hang on slower runners
# under worker contention. If that timer fires, the underlying bug is
# in the variantType action serializing BSC/SL or hanging on a
# session warm — chase that, not the timeout. Tracked in NEO-8.
- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 10000
- extendedWaitUntil:
    visible: "Base"
    timeout: 60000
- assertVisible: "Base"
