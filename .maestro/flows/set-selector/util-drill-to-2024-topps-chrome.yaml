appId: com.neonbinder.web
name: "Util — FAST drill to 2024 Topps Chrome (assumes cascade setup already ran)"
tags:
  - util
---
# FAST drill — assumes the cascade `setup.yaml` flow has already populated the
# shared Convex deployment with:
#   - BSC + SL credentials saved
#   - Baseball → 2024 → Topps → Topps Chrome in selectorOptions
#   - Variant Types (Base, Insert, Parallel) for that set
#
# Every legacy caller of this util now declares `requires:setup-done` so the
# scheduler runs them only after the cascade root completes. No reset, no
# credential setup, no auto-sync waits — just four taps.
#
# CALLER CONTRACT:
#   - Caller has called launchApp and waited for sign-in redirect.
#   - Caller flow tags include `requires:setup-done`.
#   - The browser is on /set-selector when this util is invoked.
#
# Returns with the Variant Types column visible and Base/Insert/Parallel listed.

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000

# Level 1 — Baseball
- extendedWaitUntil:
    visible: "Baseball"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

# Level 2 — 2024
- extendedWaitUntil:
    visible: "Years"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search years.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search years.*"
    timeout: 10000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"
- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

# Level 3 — Topps (search to avoid long list)
- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search manufacturers.*"
    timeout: 10000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"
- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

# Level 4 — Topps Chrome (search to avoid long list)
- extendedWaitUntil:
    visible: "Sets"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search sets.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search sets.*"
    timeout: 10000
- tapOn:
    text: ".*Search sets.*"
- inputText: "Topps Chrome"
- extendedWaitUntil:
    visible:
      text: "Topps Chrome"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps Chrome"
    index: 1

# Level 5 — Variant Types (already in DB from setup.yaml)
- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 20000
- extendedWaitUntil:
    visible: "Base"
    timeout: 30000
- assertVisible: "Base"
