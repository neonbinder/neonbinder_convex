appId: com.neonbinder.web
name: "Util — drill to a (Sport, Year, Manufacturer, Set) — accepts env overrides"
tags:
  - util
---
# Thin wrapper over util-drill-to-custom.yaml.
#
# DEFAULTS (canonical Topps Chrome test anchor):
#   SPORT        = "Baseball"
#   YEAR         = "2024"
#   MANUFACTURER = "Topps"
#   SET          = "Topps Chrome"   (mapped to SET_NAME on the inner call)
#
# CALLER OVERRIDES — pass any subset of SPORT / YEAR / MANUFACTURER / SET via
# `runFlow.env` to target a different hierarchy. util-drill-to-custom.yaml
# handles both real-synced and custom rows at each level; all drill logic lives
# there. This file exists only to give callers a stable name with baked-in defaults.
#
# IMPORTANT:
#   - util-drill-to-custom.yaml navigates to /set-selector itself. Callers do
#     NOT need to navigate first.
#   - util-drill-to-custom.yaml parameter for the Sets column is SET_NAME, not
#     SET. This wrapper accepts SET from callers (historical name) and forwards
#     it as SET_NAME. No caller change needed.
#   - Passing only SPORT/YEAR/MANUFACTURER/SET_NAME (no VARIANT_TYPE/VARIANT)
#     leaves the drill at Level 4 — the Variant Types column becomes visible
#     and Base/Insert/Parallel appear once auto-sync completes. That is this
#     wrapper's return contract.
#   - The `requires:setup-done` and `cascade/` references from the old drill
#     body are gone. The data-readiness guarantee now lives in the setup track
#     (setup.yaml / setup-insert.yaml / setup-parallel.yaml).

# Delegate all drill logic to the general-purpose drill util.
# SET (old caller env name) is forwarded as SET_NAME (util-drill-to-custom
# contract). Defaults are applied here so callers that pass nothing get the
# canonical Baseball → 2024 → Topps → Topps Chrome path.
- runFlow:
    file: util-drill-to-custom.yaml
    env:
      SPORT: ${SPORT || "Baseball"}
      YEAR: ${YEAR || "2024"}
      MANUFACTURER: ${MANUFACTURER || "Topps"}
      SET_NAME: ${SET || "Topps Chrome"}

# Return guarantee: Variant Types column is visible and Base is listed.
# The 60s on "Base" covers the variant-type auto-sync on the override / cold
# path (BSC + SL fetch for a new set; setup track covers the canonical path).
- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 10000
- extendedWaitUntil:
    visible: "Base"
    timeout: 60000
