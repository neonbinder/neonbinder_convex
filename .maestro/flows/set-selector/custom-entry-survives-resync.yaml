appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: Custom Entry Survives Re-Sync
tags:
  - set-selector
  - regression
  # Column inputs now carry unique per-input classes: EntitySelector search
  # inputs have `mb-search-<col>` (NEO-46) and the custom-entry form input
  # has `mb-field-*` via useFieldTestClass() (EntityColumn.tsx). Maestro's
  # inputText targets the right box in both cases — no WIP concerns remain.
---
# A user adds a custom sport entry, then syncs sports from marketplaces.
# After the sync completes, the custom entry must still be visible in the list.
# This verifies that marketplace sync does not delete or overwrite user-created
# custom entries.
#
# This test also confirms the "Custom" badge is shown on custom entries
# both before and after a re-sync.

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"

# Worker-bootstrap has already seeded marketplace credentials server-side;
# no credential-setup block needed here.
- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- assertVisible: "Set Selector"

# ============================================================
# STEP 1 — Add a custom sport entry
# ============================================================

# Scroll to "+ Custom" in the Sports column — it may be below the fold when
# the list is already populated with marketplace sports.
# timeout: 60000 — after a DB reset the Sports column auto-syncs from scratch
# (empty items → EntityColumn auto-fires sync → mode=sync, SportForm visible,
# "+ Custom" hidden until sync finishes). Warm BSC session finishes in ~10s;
# cold Puppeteer re-auth takes ~17.5s + SL. 60s matches util-drill-to-custom's
# "Baseball" wait which guards the same auto-sync completion.
- scrollUntilVisible:
    element:
      text: "+ Custom"
    timeout: 60000
- tapOn: "+ Custom"
- assertVisible: "Add Custom Entry"

# Type a unique custom sport name that will be easy to find after re-sync
- tapOn: "Enter custom value..."
- inputText: "TestCustomSport-${TEST_USERNAME}"
# Press Enter to submit — the input's `onKeyDown` handler
# (EntityColumn.tsx:129) calls handleCustomSubmit on Enter. We avoid
# `tapOn: "Add"` because `text: "Add"` ambiguously matches the
# "Add Custom Entry" heading and the "Add" button; with the heading
# above the button in DOM order, Index: 0 sometimes resolves to the
# heading (a non-tappable element).
- pressKey: Enter

# Wait for the "Add Custom Entry" form to close before checking the list.
# The form disappearing confirms the entry was saved to the database.
- assertNotVisible: "Add Custom Entry"

# Reload /set-selector to reset the page scroll before tapping the
# Sports column's search input. The earlier `scrollUntilVisible "+ Custom"`
# left the page scrolled down so the column's header + search input sit
# behind the sticky `binder-header` (`top-0 z-20`, ~66 px tall). At that
# scroll position, Maestro resolves the input by aria-label in the DOM
# (bounds ~y=35-73) but `hierarchyBasedTap` clicks at viewport coords
# that fall inside the navbar's vertical range — the higher-z navbar
# eats the click, the input never gains focus, and the subsequent
# `inputText` keystrokes never reach it. The custom entry was persisted
# by `pressKey Enter`; reloading rehydrates the column with the new
# entry already in `items` and the input rendered cleanly below the
# navbar where Maestro can hit it.
- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- assertVisible: "Set Selector"

# Find TestCustomSport-${TEST_USERNAME} via the Sports column's search
# input. The Sports column has an internal `max-h-[400px] overflow-y-auto`
# scroll container; with ~20 standard sports + custom entries the new
# entry sits below the column's fold and Maestro's page-level scroll
# can't reach it. The search input filters the column's list so the
# entry becomes visible inside the 400 px viewport.
- tapOn:
    id: "Search sports"
- inputText: "TestCustomSport-${TEST_USERNAME}"
- assertVisible: "TestCustomSport-${TEST_USERNAME}"

# Verify the "Custom" badge is shown next to the entry (rightOf pins to
# the entry row, avoiding a false match on the column's "+ Custom" button)
- assertVisible:
    text: "Custom"
    rightOf:
      text: "TestCustomSport-${TEST_USERNAME}"

# ============================================================
# STEP 2 — Re-sync sports from marketplaces
# ============================================================

# Reload the /set-selector page to reset all search filters to their empty state.
# This is the cleanest way to ensure "Sync Sports" is visible below the full list
# before Step 2, without needing to interact with the search input state.
- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- assertVisible: "Set Selector"

# Trigger a marketplace sync for sports.
#
# `visibilityPercentage: 50` is required because the page's negative-margin
# breakout layout (`app/set-selector/page.tsx:11-14`, `calc((100vw - 170px) * 0.9)`)
# leaves the "Sync Sports" button at x=-2 at the 1024-wide CI viewport — ~98%
# visible. The default 100% threshold made Maestro attempt a scroll that
# triggered a CDP `Failed to execute JS` error, after which the element
# couldn't be re-located. 50 is used (not 80) per the documented
# viewport-edge-button pattern (mb-search/vis:50) for set-selector flows.
- scrollUntilVisible:
    element:
      text: "Sync Sports"
    timeout: 10000
    visibilityPercentage: 50
- tapOn: "Sync Sports"

# Wait for "Syncing Sport Options" to appear — confirms the sync form mounted
# and the action is in-flight server-side. We do NOT wait for the sync to
# finish: the server-side Convex action runs to completion regardless of whether
# the user stays on this page. The test's assertion (Step 3) is that custom
# entries survive a sync cycle; the action completing after we navigate away is
# equally valid. Waiting for sync completion on a local-dev cold BSC/SL session
# can take >2min (Puppeteer re-auth), making the test too slow for dev iteration.
- extendedWaitUntil:
    visible: "Syncing Sport Options"
    timeout: 15000

# ============================================================
# STEP 3 — Verify custom entry still exists after re-sync
# ============================================================

# Reload /set-selector to reset page scroll before tapping the Sports
# search input again — the post-sync `scrollUntilVisible "Sync Sports"`
# left the page scrolled to the bottom of the column, putting the
# search input behind the sticky navbar (see comment in STEP 1).
- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- assertVisible: "Set Selector"

# Find TestCustomSport-${TEST_USERNAME} again after the re-sync. Same
# search-input approach as STEP 1.
- tapOn:
    id: "Search sports"
- inputText: "TestCustomSport-${TEST_USERNAME}"
- assertVisible: "TestCustomSport-${TEST_USERNAME}"

# The "Custom" badge must still be shown on the entry after re-sync
- assertVisible:
    text: "Custom"
    rightOf:
      text: "TestCustomSport-${TEST_USERNAME}"

# Reload the page again to reset the search filter, then verify marketplace
# badge icons (BSC / SL) appear on synced sport entries in the full list.
# This confirms the re-sync did not destroy the custom entry AND also wrote
# marketplace data for the standard sports entries.
- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- assertVisible: "Set Selector"

# Marketplace-synced entries should be visible in the unfiltered list.
# SL/BSC pills now appear only on terminal items — non-terminal levels like
# Sports no longer show pills. "Baseball" appearing confirms marketplace data
# was written to the Sports column during re-sync.
- assertVisible: "Baseball"
