appId: com.neonbinder.web
name: "Util — drill to E2E Test Sport ${WORKER_INDEX} → 2026 → <SET_NAME> (custom set) and land at Variant Types column"
tags:
  - util
---
# Creates and drills to a per-flow custom set under E2E Test Sport ${WORKER_INDEX} → 2026.
#
# WHY E2E Test Sport ${WORKER_INDEX} / 2026?
#   Flows that add custom data (Stars, Stars Gold, META-TEST, etc.) must NOT
#   touch Baseball → 2024 → Topps Chrome — that path is owned by the cascade
#   and uses real BSC/SL marketplace data. "E2E Test Sport ${WORKER_INDEX}" is a
#   synthetic sport name that no marketplace (BSC/SportLots) will ever return as
#   synced data, so the custom-add is always legitimate and the subtree is truly
#   isolated. The WORKER_INDEX suffix makes the sport node PER-WORKER so that
#   concurrent workers never share the same Sport → Year column: worker 0 owns
#   "E2E Test Sport 0", worker 1 owns "E2E Test Sport 1", etc. "2026" is a custom
#   year that further separates this playground from any real data.
#   Together they ensure custom-data flows cannot interfere with the cascade's
#   reconciliation behaviour — and the custom-add guard never collides with a
#   server-side "already exists as synced data" error.
#
# INPUTS:
#   SET_NAME    (required) — basename of the flow, e.g. "parallel-grouping-suggestions-0"
#   VARIANT_TYPE (optional, defaults to "Insert") — variant type to select after landing
#
# CONTRACT:
#   - Caller has called launchApp and the session is signed in.
#   - Caller has BSC + SL credentials available (passed via env or already saved).
#   - This util navigates to /set-selector, adds E2E Test Sport ${WORKER_INDEX} → 2026 → <SET_NAME>
#     if not already present, and returns with:
#       * The custom set selected (Sets column)
#       * Variant Types column visible
#       * Custom Variant Type selected (if VARIANT_TYPE is provided)
#     The column is in idle mode — the auto-sync gate short-circuits for custom
#     subtrees (no BSC/SL adapter calls), so the "+ Custom" button is immediately
#     available in the Variant Types column on return.
#
# IDEMPOTENCY:
#   If E2E Test Sport ${WORKER_INDEX}, 2026, and SET_NAME already exist from a prior
#   iteration in this CI run (e.g. re-run), the drill taps through to the existing items.
#   addCustomSelectorOption is idempotent on normalized value — no duplicates.

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000

# ============================================================
# LEVEL 1 — E2E Test Sport ${WORKER_INDEX}
# "E2E Test Sport ${WORKER_INDEX}" is a synthetic, per-worker name never returned
# by any marketplace sync, so custom-adding it is always valid (no server-side
# "already exists as synced data" error). Use "Add custom Sports" to create it
# if absent, then tap it. The WORKER_INDEX suffix ensures each concurrent worker
# builds its own isolated Sport subtree.
# The addCustomSelectorOption mutation is idempotent on normalized value —
# typing "E2E Test Sport ${WORKER_INDEX}" twice in the same run is safe: the
# second insert is deduplicated.
# ============================================================

- extendedWaitUntil:
    visible: "Sports"
    timeout: 30000

# Wait for the Sports column to reach idle mode (auto-sync settles).
# Use the "Baseball" entry as the idle signal — Baseball is always seeded
# by the cascade setup.yaml, so its appearance confirms the sync is done.
- extendedWaitUntil:
    visible: "Baseball"
    timeout: 60000

# Try to tap E2E Test Sport ${WORKER_INDEX} directly first (it may already exist from a prior run).
- runFlow:
    when:
      notVisible: "E2E Test Sport ${WORKER_INDEX}"
    commands:
      # E2E Test Sport ${WORKER_INDEX} is not yet in the list. Add it as a custom Sport entry.
      - scrollUntilVisible:
          element:
            id: "Add custom Sports"
          visibilityPercentage: 50
          timeout: 10000
      - tapOn:
          id: "Add custom Sports"
      - extendedWaitUntil:
          visible: "Add Custom Entry"
          timeout: 5000
      - inputText: "E2E Test Sport ${WORKER_INDEX}"
      - pressKey: Enter
      - extendedWaitUntil:
          notVisible: "Add Custom Entry"
          timeout: 10000

- extendedWaitUntil:
    visible: "E2E Test Sport ${WORKER_INDEX}"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "E2E Test Sport ${WORKER_INDEX}"
    timeout: 10000
- tapOn: "E2E Test Sport ${WORKER_INDEX}"

# ============================================================
# LEVEL 2 — Year 2026
# 2026 will not be in the Years column unless it was previously added.
# Add it as a custom year if absent, then tap it.
# ============================================================

- extendedWaitUntil:
    visible: "Years"
    timeout: 20000

# Wait for Years column to settle. For a fresh custom sport (E2E Test Sport ${WORKER_INDEX}) the
# YearForm fires briefly and then short-circuits via the custom-subtree gate.
# The settled state has the "+ Custom" button (aria-label "Add custom Years")
# present. scrollUntilVisible waits for that element, tolerating in-flight
# sync — it polls until found or timeout.
- scrollUntilVisible:
    element:
      id: "Add custom Years"
    visibilityPercentage: 50
    timeout: 60000

- runFlow:
    when:
      notVisible: "2026"
    commands:
      - tapOn:
          id: "Add custom Years"
      - extendedWaitUntil:
          visible: "Add Custom Entry"
          timeout: 5000
      - inputText: "2026"
      - pressKey: Enter
      - extendedWaitUntil:
          notVisible: "Add Custom Entry"
          timeout: 10000

- extendedWaitUntil:
    visible: "2026"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "2026"
    timeout: 10000
- tapOn: "2026"

# ============================================================
# LEVEL 3 — Manufacturer: add "Topps" as a custom entry and tap it
# Under the E2E Test Sport ${WORKER_INDEX} → 2026 custom subtree, the manufacturer
# "exemption" has been removed (once-custom-always-custom). The
# Manufacturers column no longer syncs from marketplaces here — it
# settles to idle showing "+ Custom" (aria-label "Add custom Manufacturers")
# and "No manufacturers available", with NO "Search manufacturers" input.
# So we add "Topps" as a custom value if absent, then tap it.
# addCustomSelectorOption is idempotent on normalized value — concurrent
# workers adding "Topps" simultaneously will converge with no duplicates.
# centerElement: true is required — same 1024×629 footer-steal reason as
# the Sets level below: a "+ Custom" button near y≈583+ gets its tap
# registered but follow-up modal events get swallowed by the footer.
# Centering puts the button mid-viewport (y≈315), clear of the footer.
# ============================================================

- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 20000

# Wait for the Manufacturers column to reach custom-only idle: the
# "+ Custom" button (aria-label "Add custom Manufacturers") is only
# present when mode=idle. 60s ceiling mirrors the Sets level below.
- scrollUntilVisible:
    element:
      id: "Add custom Manufacturers"
    centerElement: true
    timeout: 60000

- runFlow:
    when:
      notVisible: "Topps"
    commands:
      - tapOn:
          id: "Add custom Manufacturers"
      - extendedWaitUntil:
          visible: "Add Custom Entry"
          timeout: 5000
      - inputText: "Topps"
      - pressKey: Enter
      - extendedWaitUntil:
          notVisible: "Add Custom Entry"
          timeout: 10000

- extendedWaitUntil:
    visible: "Topps"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Topps"
    timeout: 10000
- tapOn: "Topps"

# ============================================================
# LEVEL 4 — Set (the per-flow unique SET_NAME)
# ============================================================

- extendedWaitUntil:
    visible: "Sets"
    timeout: 20000

# Wait for Sets column to settle (custom-subtree gate short-circuits the
# SetForm). scrollUntilVisible tolerates the brief in-flight sync.
# centerElement: true is required — the 1024×629 headless viewport has a
# footer that paints over the body's overflow region and steals clicks; a
# "+ Custom" button rendered near the bottom (y≈583+) gets its tap registered
# but the modal's follow-up events get swallowed by the footer, so the modal
# never visibly opens. Centering the button puts it mid-viewport (y≈315),
# clear of the footer. See memory reference_maestro_headless_viewport.md.
- scrollUntilVisible:
    element:
      id: "Add custom Sets"
    centerElement: true
    timeout: 60000

- runFlow:
    when:
      notVisible: ${SET_NAME}
    commands:
      - tapOn:
          id: "Add custom Sets"
      - extendedWaitUntil:
          visible: "Add Custom Entry"
          timeout: 5000
      - inputText: ${SET_NAME}
      - pressKey: Enter
      - extendedWaitUntil:
          notVisible: "Add Custom Entry"
          timeout: 10000

- extendedWaitUntil:
    visible:
      text: ".*${SET_NAME}.*"
    timeout: 10000
# Tap the SET_NAME row. Two paths depending on column population:
#
#   A. List has >8 items → EntitySelector shows a "Search sets..." input.
#      Filter via search so the target row is the only one rendered, then
#      tap it at index: 1 (index 0 is the search input echoing the typed
#      value). This is necessary because the list wraps in
#      `max-h-[400px] overflow-y-auto` — when worker-state has accumulated
#      9+ sets, the SET_NAME we just created sorts past the visible
#      portion and Maestro's hit-test reports bounds outside the rendered
#      area, so direct taps land in the gap between the clipped row and
#      the action buttons (CI repro: PR #31).
#
#   B. List has ≤8 items → no search input. Direct tap is reliable
#      because the row fits inside the inner overflow.
- runFlow:
    when:
      visible: ".*Search sets.*"
    commands:
      # The Add-custom-Sets centerElement: true scroll above leaves the
      # column's top half (Sets header + Search input) above the viewport;
      # Search-sets ends up at y≈4 under the fixed nav header. CI logs from
      # 758de86 confirmed `scrollUntilVisible centerElement: true` on the
      # search input itself was a no-op (Maestro doesn't pull elements
      # already at viewport-top further down). Use `scrollUntilVisible`
      # with direction: UP looking for the column's "Sets" h2 header — UP
      # means swipe-down gesture, which scrolls the page DOWN (pulls content
      # that's above viewport down INTO viewport). The header lives above
      # the search input in the EntitySelector layout, so once "Sets" is
      # visible at center, the search input lands just below it (~y=360),
      # clear of the nav header.
      - scrollUntilVisible:
          element:
            text: "^Sets$"
          direction: UP
          centerElement: true
          timeout: 10000
      - tapOn:
          text: ".*Search sets.*"
      - inputText: ${SET_NAME}
      # Select the result ROW by relationship, not index. After typing, the
      # "Search sets" input ITSELF has text=${SET_NAME} (its value), so a bare
      # text match is ambiguous and `index:` is unreliable — the (input,row)
      # DOM order flips between a cold sync and a re-drill, so index:1 can land
      # on the input (NEO-46: this failed once >8 custom sets accumulated under
      # the worker's playground and the search input appeared). The result row
      # is the ${SET_NAME} element BELOW the search input. Same fix as
      # util-drill-to-2024-topps-chrome.yaml; see feedback_search_input_index_pattern.
      - extendedWaitUntil:
          visible:
            text: ".*${SET_NAME}.*"
            below:
              id: "Search sets"
          timeout: 10000
      - tapOn:
          text: ".*${SET_NAME}.*"
          below:
            id: "Search sets"
          waitToSettleTimeoutMs: 2000
      # Wait for Variant Types to render before returning from this branch.
      # Under shared-Convex contention the column can take up to ~11s to
      # appear. Without this wait the fallback's `notVisible: "Variant Types"`
      # guard evaluates while the column is still loading, fires a second tap
      # that collapses the column mid-flight, and the 30s settle-wait below
      # times out (PR #26672941213 run-26 vme-insert failure).
      - extendedWaitUntil:
          visible: "Variant Types"
          timeout: 30000
# Fallback path for small lists (no search input). Guarded by
# `notVisible: "Variant Types"` so it doesn't double-tap after the
# search-input branch above succeeded — when that branch selects the
# row, Search-sets disappears AND Variant Types appears; without this
# guard, the fallback would also fire (Search-sets gone) and re-tap
# the already-selected row, collapsing the column and re-mounting the
# next column mid-flight (PR #31 vme-insert-2 CI failure).
- runFlow:
    when:
      notVisible: "Variant Types"
    commands:
      - scrollUntilVisible:
          element:
            text: ".*${SET_NAME}.*"
          centerElement: true
          timeout: 10000
      - tapOn:
          text: ".*${SET_NAME}.*"
          waitToSettleTimeoutMs: 2000
      # Wait for Variant Types to render before returning from this branch.
      # Same settle guarantee as the search-input branch — ensures the
      # top-level extendedWaitUntil below is a no-op fast-pass rather than
      # racing the fallback guard.
      - extendedWaitUntil:
          visible: "Variant Types"
          timeout: 30000

# ============================================================
# LEVEL 5 — Variant Types
# Custom subtree: gate short-circuits, no BSC/SL adapter calls.
# Wait for idle mode (the "+ Custom" button appears when mode=idle).
# Then select the requested VARIANT_TYPE (defaults to "Insert").
# If VARIANT_TYPE does not exist yet, add it as a custom entry first.
#
# Bumped to 30000 from 10000 — under shared-Convex contention from
# parallel workers, the Variant Types column can take longer to render
# after the SET_NAME tap. Observed ~11s render time in CI (PR #31 first run).
# ============================================================

- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 30000

# Idle-mode signal: wait for the "+ Custom" button WITHOUT scrolling.
#
# History: centerElement was unreliable (PR #31, CI fb5c2b6 — button landed at
# y=179, tap missed); switching to `visibilityPercentage: 100` scroll then hit
# a WORSE failure (NEO-46, cards-parallel-custom attempt-1): every scroll retry
# threw `MismatchedInputException: No content to map due to end-of-input` at
# CdpWebDriver.scroll for the full 30s. The button was actually rendered and
# in-viewport (~y=429 at 1024×629) — Maestro's *scroll* mechanic was throwing
# because the page was still re-rendering right after the fresh set was created
# + selected. The SAME step passed on attempt-2 when the set pre-existed (page
# settled, no re-render).
#
# Fix: don't scroll at all. For a custom set the Variant Types column is short
# (0 marketplace types — the gate short-circuits), so the button renders in
# the viewport. A non-scrolling visibility wait both signals idle mode AND
# sidesteps the CDP scroll bug. The subsequent tapOn taps the already-visible
# button directly.
- extendedWaitUntil:
    visible:
      id: "Add custom Variant Types"
    timeout: 30000

# Insert: add if absent, then tap. waitToSettleTimeoutMs on the tap
# defends against the stale-coordinate race observed in PR #31
# variant-metadata-editor-insert CI failures: Maestro found the
# "+ Custom" button at y=179 then the page scrolled before the tap
# fired (button moved up to y≈90), so the tap landed in empty space
# below the button and the create modal never opened.
- runFlow:
    when:
      notVisible: ${VARIANT_TYPE || "Insert"}
    commands:
      - tapOn:
          id: "Add custom Variant Types"
          waitToSettleTimeoutMs: 2000
      - extendedWaitUntil:
          visible: "Add Custom Entry"
          timeout: 10000
      - inputText: ${VARIANT_TYPE || "Insert"}
      - pressKey: Enter
      - extendedWaitUntil:
          visible:
            text: ".*${VARIANT_TYPE || 'Insert'}.*"
          timeout: 5000

- scrollUntilVisible:
    element:
      text: ${VARIANT_TYPE || "Insert"}
    timeout: 10000
- tapOn: ${VARIANT_TYPE || "Insert"}

# ============================================================
# Verify the Variants column opened for the selected type.
# Column header is the pluralized variantType value.
# For "Insert" the header is "Inserts".
# ============================================================

- extendedWaitUntil:
    visible:
      text: ".*${VARIANT_TYPE || 'Insert'}s.*"
    timeout: 15000

# Wait for idle mode in the Variants column (short-circuits for custom VT).
- scrollUntilVisible:
    element:
      id: "Add custom ${VARIANT_TYPE || 'Insert'}s"
    visibilityPercentage: 50
    timeout: 30000
