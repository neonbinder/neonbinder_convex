appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/testing/seed-credentials?redirect=/profile&worker=${WORKER_INDEX || "0"}
name: "Set Builder Gate — admin without SportLots credentials sees the warning banner"
tags:
  - set-selector
  - regression
  - isolated:true
---
# Mirror of admin-missing-bsc-shows-warning.yaml for the SportLots side.

- launchApp
- extendedWaitUntil:
    visible: "Neon Binder"
    timeout: 45000

# 1. Guarantee both creds exist
- runFlow:
    file: ../profile/setup-sportlots-credentials.yaml

# 2. Clear SL creds only
- openLink: ${APP_URL || "http://localhost:3000"}/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 20000
# Center the "Sportlots" tab rather than stopping at "BuySportsCards Credentials".
# The tab row sits just below the h2 heading; scrolling only to the heading leaves
# the Sportlots tab at the 629px viewport bottom edge, causing tapOn to trigger
# Maestro's scrollToPoint → CDP empty-response flake. Centering the tab puts it
# near y≈315 so the subsequent tapOn needs no implicit scroll.
- scrollUntilVisible:
    element:
      text: "Sportlots"
    centerElement: true
    timeout: 20000
# Switch to SportLots tab
- tapOn: "Sportlots"
- scrollUntilVisible:
    element:
      text: ".*Sportlots Credentials.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    timeout: 10000
- tapOn: "Clear Credentials"
- scrollUntilVisible:
    element:
      text: "Yes, Clear"
    timeout: 15000
- tapOn: "Yes, Clear"
- extendedWaitUntil:
    visible: ".*Credentials cleared.*"
    timeout: 30000

# 3. Visit Set Builder — gate fires
- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Builder requires marketplace credentials"
    timeout: 20000
- assertVisible: "SportLots"
- assertNotVisible: "Set Selector"
- assertNotVisible: "Sync Sports"

# 4. Link works
- tapOn:
    id: "Configure credentials in Profile"
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 20000

# 5. Cleanup — restore SL creds
- runFlow:
    file: ../profile/clear-then-setup-sportlots-credentials.yaml
