appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/profile&worker=${WORKER_INDEX || "0"}
name: "Set Builder Gate — admin with neither BSC nor SportLots credentials sees the warning banner"
tags:
  - set-selector
  - regression
---
# Verifies the credentials gate when both marketplace credentials are missing.
# The banner must name BOTH platforms in its missing-creds list.
#
# Safe to run in parallel: credentials are per-user (Clerk userId). Each
# worker signs in as its own dev+e2e-N account, so clearing/restoring creds
# on this worker does not affect any other worker's session.

- launchApp
- extendedWaitUntil:
    visible: "Neon Binder"
    timeout: 45000

# ============================================================
# 1. Clear BSC creds
# BSC is the default tab. The section scroll also serves as the wait for
# Convex to populate the credential state after the page reload.
# ============================================================
- openLink: ${APP_URL || "http://localhost:3000"}/profile
- assertVisible: "Profile Settings"
- scrollUntilVisible:
    element:
      text: "BuySportsCards Credentials"
    centerElement: true
    timeout: 20000
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    centerElement: true
    timeout: 10000
- tapOn: "Clear Credentials"
- scrollUntilVisible:
    element:
      text: "Yes, Clear"
    centerElement: true
    timeout: 15000
- tapOn: "Yes, Clear"
- extendedWaitUntil:
    visible: ".*Credentials cleared.*"
    timeout: 30000

# ============================================================
# 2. Clear SL creds
# ============================================================
- openLink: ${APP_URL || "http://localhost:3000"}/profile
- assertVisible: "Profile Settings"
# Center the "Sportlots" tab rather than stopping at "BuySportsCards Credentials".
# The tab row sits just below the h2 heading; scrolling only to the heading leaves
# the Sportlots tab at the 629px viewport bottom edge, causing tapOn to trigger
# Maestro's scrollToPoint → CDP empty-response flake. Centering the tab puts it
# near y≈315 so the subsequent tapOn needs no implicit scroll.
- scrollUntilVisible:
    element:
      text: "Sportlots"
    centerElement: true
    timeout: 20000
- tapOn: "Sportlots"
- scrollUntilVisible:
    element:
      text: ".*Sportlots Credentials.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    centerElement: true
    timeout: 10000
- tapOn: "Clear Credentials"
- scrollUntilVisible:
    element:
      text: "Yes, Clear"
    centerElement: true
    timeout: 15000
- tapOn: "Yes, Clear"
- extendedWaitUntil:
    visible: ".*Credentials cleared.*"
    timeout: 30000

# ============================================================
# 3. Visit Set Builder — gate fires with both platforms named
# ============================================================
- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- assertVisible: "Set Builder requires marketplace credentials"
# Both platforms named inside a single <strong>; this regex stays in one
# element so Maestro's text matcher sees the whole run.
- assertVisible: ".*BuySportsCards and SportLots.*"
- assertNotVisible: "Set Selector"
- assertNotVisible: "Sync Sports"

# ============================================================
# 4. Link works
# ============================================================
- scrollUntilVisible:
    element:
      id: "Configure credentials in Profile"
    centerElement: true
    timeout: 10000
- tapOn:
    id: "Configure credentials in Profile"
- assertVisible: "Profile Settings"

# ============================================================
# 5. Cleanup — restore BOTH creds (destructive variants used so we re-auth
#    even if a residual flag is somehow still set)
# ============================================================
- runFlow:
    file: ../profile/clear-then-setup-bsc-credentials.yaml
- openLink: ${APP_URL || "http://localhost:3000"}/profile
- assertVisible: "Profile Settings"
- runFlow:
    file: ../profile/clear-then-setup-sportlots-credentials.yaml

# ============================================================
# RESTORE REAL CREDENTIALS
# clear-then-setup-* above saved fake credentials (form-typing coverage).
# Restore real credentials via seed-credentials so downstream flows on
# this worker have a working marketplace token. No secret via Maestro -e.
# ============================================================
- openLink: ${APP_URL || "http://localhost:3000"}/testing/seed-credentials?redirect=/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 30000
