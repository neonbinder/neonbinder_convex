appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Custom field — typing a known synced value selects it instead of creating a duplicate"
tags:
  - set-selector
  - regression
  - requires:setup-done
---
# Regression test for the "forgiving + Custom field" behaviour introduced in NEO-46.
#
# WHAT IS BEING TESTED
# When a user opens the Sports column's "+ Custom" form and types a value that
# already exists as real marketplace-synced data ("Baseball"), the app must:
#   1. NOT error.
#   2. NOT create a duplicate custom entry.
#   3. Treat the input exactly like tapping the existing "Baseball" row —
#      close the form and advance the drill so the Year column appears.
#
# SERVER BEHAVIOUR (addCustomSelectorOption):
#   Finds the existing row by normalised value, returns its _id.
#   The EntityColumn FE calls onSelectExisting(_id) — the same handler that
#   fires when the user taps the row directly — which drives the drill forward.
#
# PRECONDITION (requires:setup-done):
#   cascade/setup.yaml has run; Baseball is already in the Sports column as
#   synced data (not custom). The cascade also saves BSC + SL credentials and
#   warms the Puppeteer session, so the subsequent Years auto-sync can use a
#   live token and won't cold-start during this flow's assertions.
#
# DATA ISOLATION:
#   This flow only reads from the shared Sports column (Baseball) and drills
#   forward — it creates NO new selectorOptions rows. Concurrent workers are safe.

# ============================================================
# LAUNCH + SIGN IN → /set-selector
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000

# ============================================================
# WAIT FOR SPORTS COLUMN IDLE
# Baseball is the established idle signal — setup.yaml seeded it and it
# appears in the Sports column once the auto-sync settles. Using it as
# the idle guard means this flow works even if the column is still
# syncing when launchApp fires.
# ============================================================

- extendedWaitUntil:
    visible: "Sports"
    timeout: 30000

- extendedWaitUntil:
    visible: "Baseball"
    timeout: 60000

# ============================================================
# OPEN THE "+ CUSTOM" FORM ON THE SPORTS COLUMN
# The button's aria-label is "Add custom Sports" — in Maestro web,
# aria-label maps to resource-id, so we use `id:` not `text:`.
#
# scrollUntilVisible with visibilityPercentage: 50 is required because
# the 1024×629 headless viewport's page layout leaves this button up
# to 2px off the left edge (~98% visible). The default 100% threshold
# triggers a CDP centering scroll that can throw MismatchedInputException.
# ============================================================

- scrollUntilVisible:
    element:
      id: "Add custom Sports"
    visibilityPercentage: 50
    timeout: 10000
- tapOn:
    id: "Add custom Sports"

# The form heading "Add Custom Entry" is the unambiguous open signal.
- extendedWaitUntil:
    visible: "Add Custom Entry"
    timeout: 5000

# ============================================================
# TYPE A VALUE THAT ALREADY EXISTS AS SYNCED DATA
# "Baseball" is real marketplace data already in the Sports column.
# Typing it here exercises the server-side match path in
# addCustomSelectorOption: the mutation finds the existing row,
# returns its _id, and the FE calls onSelectExisting(_id) rather
# than creating a new custom row.
# ============================================================

# No need to tap a placeholder input first — the form's text input
# receives focus automatically when the form mounts (autoFocus).
- inputText: "Baseball"

# Press Enter to submit. The input's onKeyDown handler calls
# handleCustomSubmit on Enter. We avoid tapping the "Add" button
# because `text: "Add"` is ambiguous with the "Add Custom Entry"
# heading and the button resolves differently across renders.
- pressKey: Enter

# ============================================================
# ASSERT OUTCOME 1 — FORM CLOSED (no error, drill advanced)
# The form unmounting proves the server accepted the input and the
# FE called onSelectExisting. If an error occurred the form would
# stay open (or re-render with an error message).
# The unit test for addCustomSelectorOption covers the no-duplicate
# guarantee; here we cover the UI path only.
# ============================================================

- extendedWaitUntil:
    notVisible: "Add Custom Entry"
    timeout: 10000

# ============================================================
# ASSERT OUTCOME 2 — DRILL ADVANCED TO YEAR COLUMN
# The Year column rendering is the definitive proof that
# onSelectExisting fired correctly. If the form had simply closed
# without selecting (e.g. a silent dismiss), the Years column
# would never appear.
#
# "Years" (the column heading) appears as soon as the Baseball row
# is selected and React mounts the next column — before the Years
# marketplace sync even starts. This is a fast, reliable signal.
# ============================================================

- extendedWaitUntil:
    visible: "Years"
    timeout: 30000

# Asserting the "Add custom Years" button (aria-label) OR the "Sync Years"
# button confirms the Years column has rendered to its idle or sync state —
# proving the column is fully mounted, not just the heading flashed.
# We use the scrollUntilVisible pattern (not extendedWaitUntil) because
# the button may be below the fold when several columns are open.
# visibilityPercentage: 50 matches the established Sports-column pattern.
- scrollUntilVisible:
    element:
      text: ".*Sync Years.*|.*Search years.*"
    visibilityPercentage: 50
    timeout: 60000

# Final visible assertion: the Years column is fully present, confirming
# that typing "Baseball" into the + Custom form selected the existing
# Baseball row and advanced the drill — exactly like tapping Baseball
# directly would have done.
- assertVisible: "Years"
