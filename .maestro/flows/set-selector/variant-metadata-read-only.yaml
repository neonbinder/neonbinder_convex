appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector
name: "Variant metadata — edit Prefix on 2024 Topps Chrome Base variant and verify persistence"
tags:
  - set-selector
  - regression
---
# After drilling to the "Chrome" variant in the 2024 Topps Chrome → Base path,
# the VariantMetadataEditor panel appears below the Variants list. It shows
# read-only Insert/Parallel flags and an editable Prefix field.
#
# End-user goal: user edits the Prefix on the Base "Chrome" variant row,
# taps Save, and the Save button disappears — confirming the value was persisted.
#
# This test uses the same 2024 Topps Chrome anchor as the base-set-picker flow.
# If the Chrome variant row already exists (base-set-picker ran first), the
# Sync Variants step is skipped and the test goes straight to the Chrome row.
# If Chrome does not yet exist, the BaseSetPicker modal opens and is confirmed.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# PREREQUISITE: credentials + drill to 2024 Topps Chrome
# Returns with Variant Types column visible and list populated.
# ============================================================

- runFlow:
    file: util-drill-to-2024-topps-chrome.yaml
    env:
      BSC_USERNAME: ${BSC_USERNAME}
      BSC_PASSWORD: ${BSC_PASSWORD}
      SPORTLOTS_USERNAME: ${SPORTLOTS_USERNAME}
      SPORTLOTS_PASSWORD: ${SPORTLOTS_PASSWORD}

# ============================================================
# LEVEL 5 — Select "Base" variant type
# ============================================================

- scrollUntilVisible:
    element:
      text: "Base"
    timeout: 10000
- tapOn: "Base"

# ============================================================
# LEVEL 6 — Sync Variants (if needed) and select the "Chrome" variant
# ============================================================

- extendedWaitUntil:
    visible: "Variants"
    timeout: 10000

# Sync only if the button is visible. If Chrome already exists from a
# previous run of base-set-picker.yaml, the "Sync Variants" button may
# not be present and we skip straight to tapping "Chrome".
- runFlow:
    when:
      visible: "Sync Variants"
    commands:
      - tapOn: "Sync Variants"
      # For Base variant type, the VariantForm may open the BaseSetPicker modal
      # when SL data arrives. Wait for either the modal subtitle or the modal heading.
      - extendedWaitUntil:
          visible:
            text: ".*Choose the base set for.*"
          timeout: 60000

# If the BaseSetPicker modal appeared, confirm it to proceed to the Variants list
- runFlow:
    when:
      visible: "Confirm Base Set"
    commands:
      - scrollUntilVisible:
          element:
            text: "Confirm Base Set"
          timeout: 10000
      - tapOn: "Confirm Base Set"
      - extendedWaitUntil:
          notVisible: "Select Base Set"
          timeout: 15000

# "Chrome" should now be visible in the Variants list — tap it to select it
- scrollUntilVisible:
    element:
      text: "Chrome"
    timeout: 15000
- tapOn: "Chrome"

# ============================================================
# VERIFY VariantMetadataEditor appears below the Variants list
# ============================================================

# After selecting a variant, the VariantMetadataEditor panel appears.
# Scroll down to bring it into view — it sits below the variant list.
- scrollUntilVisible:
    element:
      text: "Metadata"
    timeout: 10000
- assertVisible: "Metadata"

# The Insert checkbox label is visible (read-only — not interactive)
- assertVisible: "Insert"

# The Parallel checkbox label is visible (read-only — not interactive)
- assertVisible: "Parallel"

# The Prefix field label is visible
- assertVisible: "Prefix:"

# ============================================================
# EDIT the Prefix field — "Save" button should appear
# ============================================================

# Tap the Prefix input (placeholder "e.g. DK-") to focus it
- tapOn: "e.g. DK-"
- inputText: "TEST-"

# The "Save" button only appears when the field has unsaved changes
- extendedWaitUntil:
    visible: "Save"
    timeout: 5000
- assertVisible: "Save"

# ============================================================
# SAVE — the "Save" button should disappear after saving
# ============================================================

- tapOn: "Save"

# After saving, the dirty flag clears and the "Save" button disappears
- extendedWaitUntil:
    notVisible: "Save"
    timeout: 10000

# The Metadata section and Prefix field should still be present
- assertVisible: "Metadata"
- assertVisible: "Prefix:"
