url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/profile
name: Sync Without Credentials Shows Error
tags:
  - set-selector
  - regression
---
# A user with no marketplace credentials saved tries to sync sports.
# The sync should complete without crashing but must show an error or
# "no results" message — it must NOT silently succeed or show stale data
# as if credentials were present.
#
# This test clears any existing credentials first to ensure a clean state,
# then navigates to the set selector and attempts a sync.

- launchApp
- extendedWaitUntil:
    visible: "Neon Binder"
    timeout: 45000

# ============================================================
# STEP 1 — Clear BSC credentials so none are saved
# ============================================================

# Scroll to the credential section on the profile page
- scrollUntilVisible:
    element:
      text: ".*Select Platform.*"
    timeout: 20000

# If BSC credentials are already saved, clear them
- runFlow:
    when:
      visible: ".*Credentials saved.*"
    commands:
      - scrollUntilVisible:
          element:
            text: "Clear Credentials"
          timeout: 10000
      - tapOn: "Clear Credentials"
      - extendedWaitUntil:
          visible: ".*Yes, Clear.*"
          timeout: 5000
      - tapOn: "Yes, Clear"
      - extendedWaitUntil:
          visible: ".*Credentials cleared.*"
          timeout: 15000

# Switch to Sportlots and clear those credentials too
- tapOn:
    id: "site-select"
- tapOn: "Sportlots"
- runFlow:
    when:
      visible: ".*Credentials saved for Sportlots.*"
    commands:
      - scrollUntilVisible:
          element:
            text: "Clear Credentials"
          timeout: 10000
      - tapOn: "Clear Credentials"
      - extendedWaitUntil:
          visible: ".*Yes, Clear.*"
          timeout: 5000
      - tapOn: "Yes, Clear"
      - extendedWaitUntil:
          visible: ".*Credentials cleared.*"
          timeout: 15000

# ============================================================
# STEP 2 — Navigate to the set selector and attempt to sync
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 15000

- assertVisible: "Sports"
- tapOn: "Sync Sports"
- extendedWaitUntil:
    visible: "Sync Sport Options"
    timeout: 5000

# Attempt the sync — no credentials are configured
- tapOn: "Sync from Marketplaces"

# ============================================================
# STEP 3 — Verify an error or warning is displayed
# ============================================================

# The sync form should show an error or informational message.
# It must NOT silently succeed. The message text varies but will include
# words like "error", "failed", "no credentials", or "not configured".
- extendedWaitUntil:
    visible: ".*[Ee]rror|[Ff]ailed|[Nn]o credentials|[Nn]ot configured|[Uu]nauthorized.*"
    timeout: 30000

# The sync form should still be open (user can cancel or retry)
- assertVisible: "Cancel"
