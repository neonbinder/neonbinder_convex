url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: Add Custom Card to Checklist
tags:
  - set-selector
  - wip
  - serial-global
# FIXME: Card functionality deferred to a follow-up release; un-park when card-level UI ships.
---
# A user manually adds a card to the checklist using the "Add Card" form.
# This covers the scenario where a card is missing from marketplace data
# and the user wants to track it anyway.
#
# The test verifies:
# - The "Add Card" button opens the add card form
# - Filling in card number and player name then tapping "Add" saves the card
# - The new card appears in the checklist with a "Custom" badge
# - The card shows the card number and player name the user entered
#
# Prerequisites: BSC and SL credentials in env vars, and a synced variant.
# All sync forms auto-fire on open — there is no "Sync from Marketplaces" button.

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# --- Set up credentials ---
# Navigate to /profile before credential setup — runFlow does NOT re-navigate,
# so the sub-flows (which expect "Select Platform" on /profile) would fail if
# the browser is still on /set-selector after sign-in redirect.
- openLink: ${APP_URL || "https://localhost:3000"}/profile
- scrollUntilVisible:
    element:
      text: ".*Select Platform.*"
    timeout: 15000

- runFlow:
    file: ../profile/setup-bsc-credentials.yaml
    env:
      BSC_USERNAME: ${BSC_USERNAME}
      BSC_PASSWORD: ${BSC_PASSWORD}

- runFlow:
    file: ../profile/setup-sportlots-credentials.yaml
    env:
      SPORTLOTS_USERNAME: ${SPORTLOTS_USERNAME}
      SPORTLOTS_PASSWORD: ${SPORTLOTS_PASSWORD}

- openLink: ${APP_URL || "https://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 15000

# --- Sync and drill down to a variant (same path as other regression tests) ---

# Only sync if the button is present; prior flows in this run may have already
# populated sports, replacing the button with the list.
- runFlow:
    when:
      visible: "Sync Sports"
    commands:
      - tapOn: "Sync Sports"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Sport Options|Sync Sports.*"
          timeout: 15000
      # "Sync Sports" reappears below the list once ALL platforms have responded.
      - scrollUntilVisible:
          element:
            text: "Sync Sports"
          timeout: 60000
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

- extendedWaitUntil:
    visible: "Years"
    timeout: 10000
- runFlow:
    when:
      visible: "Sync Years"
    commands:
      - tapOn: "Sync Years"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Year Options|Sync Years.*"
          timeout: 15000
      # "Sync Years" reappears below the list once ALL platforms have responded.
      - scrollUntilVisible:
          element:
            text: "Sync Years"
          timeout: 60000
- tapOn:
    text: ".*20[0-9][0-9].*"
    index: 0

- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 10000
- runFlow:
    when:
      visible: "Sync Manufacturers"
    commands:
      - tapOn: "Sync Manufacturers"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Manufacturer Options|Sync Manufacturers.*"
          timeout: 15000
      # "Sync Manufacturers" reappears below the list once ALL platforms have responded.
      - scrollUntilVisible:
          element:
            text: "Sync Manufacturers"
          timeout: 60000
# Pick the first available manufacturer — do not hardcode "Topps".
- tapOn:
    text: ".*"
    index: 0

- extendedWaitUntil:
    visible: "Sets"
    timeout: 10000
- runFlow:
    when:
      visible: "Sync Sets"
    commands:
      - tapOn: "Sync Sets"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Sets|Sync Sets.*"
          timeout: 15000
      # "Sync Sets" does not reappear once data is populated. Wait for
      # "Syncing Sets" to disappear, which signals the form closed.
      - extendedWaitUntil:
          notVisible: "Syncing Sets"
          timeout: 90000
- tapOn:
    text: ".*"
    index: 0

# Level 5 — Variant Types (formerly "Set Variants")
- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 10000
- runFlow:
    when:
      visible: "Sync Variant Types"
    commands:
      - tapOn: "Sync Variant Types"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Variant Types|Sync Variant Types.*"
          timeout: 15000
      # "Sync Variant Types" reappears below the list once ALL platforms have responded.
      - scrollUntilVisible:
          element:
            text: "Sync Variant Types"
          timeout: 60000
- tapOn:
    text: ".*"
    index: 0

# Level 6 — Variants/Inserts/Parallels
# The column header is the pluralized variantType name: "Inserts", "Parallels", etc.
# index: 0 picks an unknown variantType so we match any of these with a regex.
- extendedWaitUntil:
    visible:
      text: ".*Inserts.*|.*Parallels.*|.*Variants.*"
    timeout: 10000
- runFlow:
    when:
      visible:
        text: ".*Sync Inserts.*|.*Sync Parallels.*|.*Sync Variants.*"
    commands:
      - tapOn:
          text: ".*Sync Inserts.*|.*Sync Parallels.*|.*Sync Variants.*"
      - extendedWaitUntil:
          visible:
            text: ".*Syncing Inserts.*|.*Syncing Parallels.*|.*Syncing Variants.*|Select Base Set.*"
          timeout: 15000
      # Button reappears once all platforms have responded, OR the
      # BaseSetPicker modal appears (for Base variant type).
      - scrollUntilVisible:
          element:
            text: ".*Sync Inserts.*|.*Sync Parallels.*|.*Sync Variants.*|Select Base Set.*"
          timeout: 60000
# If the BaseSetPicker modal appeared (Base variant type), confirm it to
# proceed past the modal into the variants list.
- runFlow:
    when:
      visible: "Confirm Base Set"
    commands:
      - tapOn: "Confirm Base Set"
      - extendedWaitUntil:
          notVisible: "Confirm Base Set"
          timeout: 15000
- tapOn:
    text: ".*"
    index: 0

# ============================================================
# CARDS COLUMN — Add a custom card
# ============================================================

# Wait for the Cards panel to appear (full-width below the selector row)
- extendedWaitUntil:
    visible: "Cards"
    timeout: 10000

# The "Add Card" button should be visible at the bottom of the Cards panel
- scrollUntilVisible:
    element:
      text: "Add Card"
    timeout: 10000
- tapOn: "Add Card"

# The add card form opens — the card number input has autoFocus so it is
# already focused when the form appears. "Player name" becomes visible as
# the second field label text.
- extendedWaitUntil:
    visible: "Player name"
    timeout: 5000

# The card number field is auto-focused — type directly into it
- inputText: "999"

# Move to the player name field and type
- tapOn: "Player name"
- inputText: "Test Player"

# Submit the form
- tapOn: "Add"

# ============================================================
# Verify the new card appears in the checklist
# ============================================================

# The add form should close and the card should appear in the list
- extendedWaitUntil:
    visible: "#999"
    timeout: 10000

- assertVisible: "Test Player"

# The card should have a "Custom" badge because it was manually added
- assertVisible: "Custom"

# The "Add Card" button should be available again for further additions
- assertVisible: "Add Card"
