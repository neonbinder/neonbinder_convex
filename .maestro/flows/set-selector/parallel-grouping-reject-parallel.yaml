appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Parallel Grouping — reject (✕) button moves a parallel back to top-level inserts"
tags:
  - parallel-grouping
  - regression
---
# PRODUCT-FEATURE test: the per-row ✕ (reject) button inside a "Parallels of X"
# card. Add Stars / Stars Gold / Champions (Champions has no prefix match, so it
# stays top-level and gives us 3 inserts for a stable Group Parallels button).
# Accept All places Stars Gold under Stars; the ✕ ungroups it. Net diff is zero,
# so the footer reverts to "No changes yet" and Save disables — a subtle state
# invariant worth pinning.
#
# Fully custom subtree (E2E Test Sport ${WORKER_INDEX} → 2026 → pg-reject-<worker>);
# every wait is the 7s default; the util owns the cold custom-subtree drill.

- launchApp
- assertVisible: "Set Selector"

- runFlow:
    file: util-drill-to-custom-set.yaml
    env:
      SET_NAME: "pg-reject-${WORKER_INDEX || 0}"
      VARIANT_TYPE: "Insert"

# ── ADD THREE CUSTOM INSERTS (Stars / Stars Gold / Champions) ───────────────
# aria-label "Add custom Inserts" maps to resource-id (id:); centerElement on
# the first add to clear the footer-steal zone.
# --- Stars ---
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    centerElement: true
- tapOn:
    id: "Add custom Inserts"
- assertVisible: "Add Custom Entry"
- inputText: "Stars"
- pressKey: Enter
- assertNotVisible: "Add Custom Entry"

# --- Stars Gold (prefix-matches Stars → suggested parallel) ---
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    visibilityPercentage: 50
- tapOn:
    id: "Add custom Inserts"
- assertVisible: "Add Custom Entry"
- inputText: "Stars Gold"
- pressKey: Enter
- assertNotVisible: "Add Custom Entry"

# --- Champions (no prefix match → stays top-level; gives 3 inserts) ---
- scrollUntilVisible:
    element:
      id: "Add custom Inserts"
    visibilityPercentage: 50
- tapOn:
    id: "Add custom Inserts"
- assertVisible: "Add Custom Entry"
- inputText: "Champions"
- pressKey: Enter
- assertNotVisible: "Add Custom Entry"
- assertVisible: "Champions"

# ── OPEN MODAL → ACCEPT ALL (places Stars Gold under Stars) ─────────────────
- scrollUntilVisible:
    element:
      text: "Group Parallels"
- tapOn: "Group Parallels"
- assertVisible: ".*Drag inserts under a parent.*"
- assertVisible: "Top-level inserts"
- assertVisible: ".*Accept all suggestions.*"
- tapOn: ".*Accept all suggestions.*"
- assertVisible: ".*[0-9]+ promotion.*"
- assertVisible: ".*Parallels of.*Stars.*"

# ── TAP ✕ NEXT TO "Stars Gold" (aria-label "Remove Stars Gold from parallels") ─
- tapOn:
    id: "Remove Stars Gold from parallels"

# ── VERIFY: net diff zero → "No changes yet" + Save disabled, Gold back up ──
- assertVisible: "No changes yet"
- assertVisible: "No changes"
- assertVisible: "Stars Gold"

# ── CLOSE ───────────────────────────────────────────────────────────────────
- tapOn: "Cancel"
- assertNotVisible: ".*Drag inserts under a parent.*"
