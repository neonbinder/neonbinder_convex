appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Cascade — select Insert variant type, sync Insert variants, verify ReconciliationModal"
tags:
  - set-selector
  - cascade
  - regression
  - requires:setup-done
  - provides:sets-loaded
---
# Cascade node: depends on setup-done, contributes to sets-loaded.
#
# This flow exercises the "Insert" code path from Level 5 onward.
# The hierarchy through Topps Chrome is already in DB — no full sync needed.
# Fast drill gets to Topps Chrome, then this flow selects "Insert" and handles
# the Variants sync (which fires ReconciliationModal on first run).
#
# WHAT THIS VERIFIES:
#   - "Insert" is selectable in the Variant Types column
#   - Variants column appears after selecting Insert
#   - ReconciliationModal opens when both BSC and SL have Insert variant data
#   - Modal shows matched and unmatched counts
#   - User can cancel the modal and return to the set selector
#   - On re-runs, the already-populated Variants column is asserted directly
#
# NOTE ON RECONCILIATION MODAL:
#   We cancel rather than save — writing thousands of variant rows on every CI
#   run would make the cascade slow and bloat the DB. The cancel-and-assert
#   pattern is sufficient to verify the modal pipeline.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# FAST DRILL — Baseball → 2024 → Topps → Topps Chrome
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000

- extendedWaitUntil:
    visible: "Baseball"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

- extendedWaitUntil:
    visible: "Years"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search years.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search years.*"
    timeout: 10000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"
- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search manufacturers.*"
    timeout: 10000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"
- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

- extendedWaitUntil:
    visible: "Sets"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search sets.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search sets.*"
    timeout: 10000
- tapOn:
    text: ".*Search sets.*"
- inputText: "Topps Chrome"
- extendedWaitUntil:
    visible:
      text: "Topps Chrome"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps Chrome"
    index: 1

- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 20000
- extendedWaitUntil:
    visible: "Insert"
    timeout: 30000

# ============================================================
# SELECT INSERT — Level 5
# ============================================================

- scrollUntilVisible:
    element:
      text: "Insert"
    timeout: 10000
- tapOn: "Insert"

# ============================================================
# LEVEL 6 — Sync Variants (first run) or verify populated (re-run)
# Auto-sync fires immediately when the Variants column renders empty.
# ReconciliationModal opens automatically — no need to tap "Sync Variants".
# If variants are already populated, skip the modal block entirely.
# ============================================================

- extendedWaitUntil:
    visible: "Inserts"
    timeout: 10000

# Detect first-run vs re-run by checking for the empty-state text.
- runFlow:
    when:
      visible: "No variants available. Sync from marketplaces to populate."
    commands:
      # Auto-sync fires the VariantForm. Wait for either:
      #  - ReconciliationModal (cross-platform path: BSC + SL both returned items), or
      #  - Single-platform success ("Stored N variants (single platform)") — VariantForm
      #    auto-closes and Inserts column re-populates.
      # 240s — BSC + SL Insert fetch; local runs recorded ~213s.
      - extendedWaitUntil:
          visible:
            text: ".*Reconcile Inserts.*|.*Stored [0-9]+ variants.*|.*Saved [0-9]+ matched.*"
          timeout: 240000

      # If the cross-platform modal opened, verify it and cancel.
      - runFlow:
          when:
            visible: "Reconcile Inserts"
          commands:
            - assertVisible: "Reconcile Inserts"
            - assertVisible:
                text: ".*[0-9]+ matched.*BSC-only.*SL-only.*"
            - scrollUntilVisible:
                element:
                  text: ".*Unmatched.*"
                timeout: 10000
            - assertVisible:
                text: ".*Unmatched.*"
            - assertVisible:
                text: ".*BSC.*"
            - assertVisible:
                text: ".*SportLots.*"
            - scrollUntilVisible:
                element:
                  text: ".*Save [0-9]+ matched.*"
                timeout: 10000
            - assertVisible:
                text: ".*Save [0-9]+ matched.*"
            # Cancel — do not write thousands of variant rows.
            - scrollUntilVisible:
                element:
                  text: "Cancel"
                timeout: 5000
            - tapOn: "Cancel"
            - extendedWaitUntil:
                notVisible: "Reconcile Inserts"
                timeout: 10000

# Verify the Inserts column is present (both first-run and re-run).
- assertVisible: "Set Selector"
- assertVisible: "Inserts"
