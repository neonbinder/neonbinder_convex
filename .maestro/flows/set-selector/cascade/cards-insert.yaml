appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Cascade — fetch card checklist for real Insert variant (All-Etch), assert 35 cards"
tags:
  - set-selector
  - cascade
  - regression
  - requires:sets-loaded
  - provides:cards-loaded
---
# Cascade node: depends on sets-loaded, contributes to cards-loaded.
#
# By the time this flow runs, sets-inserts.yaml has cancelled the
# ReconciliationModal, leaving the Inserts column EMPTY. Tapping "Insert"
# again causes auto-sync to fire and re-open the ReconciliationModal.
# We save the "All-Etch" matched row, which writes real BSC+SL data to
# the DB for further downstream flows.
#
# WHAT THIS VERIFIES:
#   - Auto-sync reopens ReconciliationModal when Inserts column is empty.
#   - The "All-Etch" row is present in the matched section.
#   - Saving produces a real card checklist with exactly 35 cards.
#   - The fetch pipeline handles known Insert variants correctly.
#
# WHY ALL-ETCH?
#   2024 Topps Chrome All-Etch is a well-known insert with stable checklist
#   coverage on both BSC and SL. 35 cards is the expected count as of the
#   last verification. If this assertion fails, the count changed on the
#   marketplace — update the number, it is not a code regression.
#
# CASCADE FLOW STATE AFTER THIS NODE:
#   The Inserts column contains All-Etch (and any other saved matched rows).
#   The "All-Etch" entry in the Inserts column has 35 cards in its checklist.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 10000

# ============================================================
# FAST DRILL — Baseball → 2024 → Topps → Topps Chrome
# Data is already in DB from setup.yaml; no syncs fire at Levels 1-4.
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000

- extendedWaitUntil:
    visible: "Baseball"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

- extendedWaitUntil:
    visible: "Years"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search years.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: ".*Search years.*"
    timeout: 10000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"
- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: ".*Search manufacturers.*"
    timeout: 10000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"
- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

- extendedWaitUntil:
    visible: "Sets"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search sets.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: ".*Search sets.*"
    timeout: 10000
- tapOn:
    text: ".*Search sets.*"
- inputText: "Topps Chrome"
- extendedWaitUntil:
    visible:
      text: "Topps Chrome"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps Chrome"
    index: 1

- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 20000
- extendedWaitUntil:
    visible: "Insert"
    timeout: 10000

# ============================================================
# SELECT INSERT — auto-sync fires because Inserts column is empty
# (sets-inserts.yaml cancelled the ReconciliationModal, leaving no rows)
# ============================================================

- scrollUntilVisible:
    element:
      text: "Insert"
    timeout: 10000
- tapOn: "Insert"

- extendedWaitUntil:
    visible: "Inserts"
    timeout: 10000

# Auto-sync fires immediately when the column is empty. ReconciliationModal
# opens automatically — wait up to 240s for the BSC + SL fetch.
# If the column was already populated (unexpected re-run state), the modal
# will not open. In that case, skip straight to tapping All-Etch.
- extendedWaitUntil:
    visible:
      text: ".*Reconcile Inserts.*|All-Etch"
    timeout: 240000

# ============================================================
# RECONCILIATION MODAL — find and save "All-Etch"
# ============================================================

- runFlow:
    when:
      visible: "Reconcile Inserts"
    commands:
      # Scroll to find "All-Etch" in the matched section.
      - scrollUntilVisible:
          element:
            text: "All-Etch"
          timeout: 30000
      - assertVisible: "All-Etch"
      # Save all matched rows. The save button reads "Save N matched".
      - scrollUntilVisible:
          element:
            text: ".*Save [0-9]+ matched.*"
          timeout: 10000
      - tapOn:
          text: ".*Save [0-9]+ matched.*"
      # Wait for the modal to close.
      - extendedWaitUntil:
          notVisible: "Reconcile Inserts"
          timeout: 30000

# ============================================================
# TAP "All-Etch" IN THE INSERTS COLUMN
# After saving, All-Etch appears in the Inserts column.
# ============================================================

- extendedWaitUntil:
    visible: "All-Etch"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "All-Etch"
    visibilityPercentage: 50
    timeout: 15000
- tapOn: "All-Etch"

# ============================================================
# CARD CHECKLIST PANEL APPEARS
# ============================================================

- scrollUntilVisible:
    element:
      text: ".*Fetch from Marketplaces.*|Refresh"
    timeout: 15000
- assertVisible:
    text: ".*Fetch from Marketplaces.*|Refresh"

# ============================================================
# FETCH FROM MARKETPLACES
# ============================================================

- tapOn: "Fetch from Marketplaces"

# The first real fetch on a fresh DB finds unknown players/teams.
# Wait for either the dialog or the terminal save message.
# 90s — BSC + SL network calls for real Insert data.
- extendedWaitUntil:
    visible:
      text: ".*Confirm New Players.*|.*Saved [0-9]+.*"
    timeout: 90000

- runFlow:
    when:
      visible: "Confirm New Players & Teams"
    commands:
      - extendedWaitUntil:
          visible:
            text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
          timeout: 10000
      - tapOn:
          text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
      - extendedWaitUntil:
          notVisible: "Confirm New Players & Teams"
          timeout: 30000

- extendedWaitUntil:
    visible:
      text: ".*Saved [0-9]+ cards.*"
    timeout: 30000

- assertVisible:
    text: ".*Saved 35 cards.*"
