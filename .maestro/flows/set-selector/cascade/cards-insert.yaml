appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Cascade — fetch card checklist for real Insert variant (Future Stars), assert 20 cards"
tags:
  - set-selector
  - cascade
  - regression
  - requires:sets-loaded
  - provides:cards-loaded
---
# Cascade node: depends on sets-loaded, contributes to cards-loaded.
#
# By the time this flow runs, sets-inserts.yaml has cancelled the
# ReconciliationModal, leaving the Inserts column EMPTY. Tapping "Insert"
# again causes auto-sync to fire and re-open the ReconciliationModal.
# We save the "Future Stars" matched row, which writes real BSC+SL data to
# the DB for further downstream flows.
#
# WHAT THIS VERIFIES:
#   - Auto-sync reopens ReconciliationModal when Inserts column is empty.
#   - The "Future Stars" row is present in the matched section.
#   - Saving produces a real card checklist with exactly 20 cards.
#   - The fetch pipeline handles known Insert variants correctly.
#
# WHY FUTURE STARS?
#   2024 Topps Chrome Future Stars is a well-known insert with stable checklist
#   coverage on both BSC and SL. 20 cards is the expected count, user-verified.
#   If this assertion fails, the count changed on the marketplace — update the
#   number, it is not a code regression.
#
# CASCADE FLOW STATE AFTER THIS NODE:
#   The Inserts column contains Future Stars (and any other saved matched rows).
#   The "Future Stars" entry in the Inserts column has 20 cards in its checklist.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 10000

# ============================================================
# CREDENTIAL WARMING
# seed-credentials seeded BSC + SL creds server-side via the sign-in URL chain.
# Warm the Puppeteer session tokens so the Insert auto-sync (which fires when
# the Inserts column is empty) uses a live session and doesn't trigger a fresh
# ~20s mid-flow login that overruns the ReconciliationModal wait.
# Both utils cost ~0.5s when the token is already cached.
# ============================================================

- runFlow:
    file: ../util-login-to-bsc.yaml

- runFlow:
    file: ../util-login-to-sportlots.yaml

# ============================================================
# FAST DRILL — Baseball → 2024 → Topps → Topps Chrome
# Data is already in DB from setup.yaml; no syncs fire at Levels 1-4.
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000

- extendedWaitUntil:
    visible: "Baseball"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

- extendedWaitUntil:
    visible: "Years"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search years.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: ".*Search years.*"
    timeout: 10000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"
- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: ".*Search manufacturers.*"
    timeout: 10000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"
- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

- extendedWaitUntil:
    visible: "Sets"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search sets.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: ".*Search sets.*"
    timeout: 10000
- tapOn:
    text: ".*Search sets.*"
- inputText: "Topps Chrome"
- extendedWaitUntil:
    visible:
      text: "Topps Chrome"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps Chrome"
    index: 1

- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 20000
- extendedWaitUntil:
    visible: "Insert"
    timeout: 10000

# ============================================================
# SELECT INSERT — auto-sync fires because Inserts column is empty
# (sets-inserts.yaml cancelled the ReconciliationModal, leaving no rows)
# ============================================================

- scrollUntilVisible:
    element:
      text: "Insert"
    timeout: 10000
- tapOn: "Insert"

- extendedWaitUntil:
    visible: "Inserts"
    timeout: 10000

# Auto-sync fires immediately when the column is empty. ReconciliationModal
# opens automatically — wait up to 240s for the BSC + SL fetch.
# If the column is already populated from a previous run, no modal opens
# and we jump straight to the search. Detect either state by waiting for
# the modal heading OR the Search input to appear.
- extendedWaitUntil:
    visible:
      text: ".*Reconcile Inserts.*|Search inserts.*"
    timeout: 240000

# ============================================================
# RECONCILIATION MODAL — save all matched rows
# The "Matched (N)" section is COLLAPSED by default (▶ click to review),
# so scrolling for a specific row inside the modal can't find it. Skip
# the in-modal find and just tap "Save N matched" — the matched rows
# (including Future Stars) will all be written to the Inserts column.
# ============================================================

- runFlow:
    when:
      visible: "Reconcile Inserts"
    commands:
      - scrollUntilVisible:
          element:
            text: ".*Save [0-9]+ matched.*"
          timeout: 10000
      - tapOn:
          text: ".*Save [0-9]+ matched.*"
      - extendedWaitUntil:
          notVisible: "Reconcile Inserts"
          timeout: 30000

# ============================================================
# FIND "Future Stars" IN THE INSERTS COLUMN VIA SEARCH
# Inserts column has a "Search inserts..." input; use it to filter
# rather than scrolling the page. "Future Stars" is auto-matched by both
# BSC and SL adapters. The regex anchors ^...$ ensure we match the bare
# "Future Stars" row, not its many parallel siblings ("Future Stars
# Autographs", "Future Stars Black Refractor", etc).
# ============================================================

- extendedWaitUntil:
    visible: ".*Search inserts.*"
    timeout: 15000
- scrollUntilVisible:
    element:
      text: ".*Search inserts.*"
    timeout: 10000
- tapOn:
    text: ".*Search inserts.*"
- inputText: "Future Stars"
# index: 1 — the search input itself has text "Future Stars" (the typed
# value) at index 0; the bare "Future Stars" list row sits at index 1,
# above all its parallel siblings ("Future Stars Autographs", etc).
# Regex anchors keep us off the siblings even if list order shifts.
- extendedWaitUntil:
    visible:
      text: "^Future Stars$"
      index: 1
    timeout: 10000
- tapOn:
    text: "^Future Stars$"
    index: 1

# ============================================================
# CARD CHECKLIST PANEL APPEARS
# ============================================================

- scrollUntilVisible:
    element:
      text: ".*Fetch from Marketplaces.*|Refresh"
    timeout: 15000
- assertVisible:
    text: ".*Fetch from Marketplaces.*|Refresh"

# ============================================================
# FETCH FROM MARKETPLACES
# Button text depends on whether the checklist already has cards:
#   - Fresh checklist: "Fetch from Marketplaces"
#   - Already populated: "Refresh"
# Either button triggers the same fetch + save pipeline.
# ============================================================

- tapOn:
    text: ".*Fetch from Marketplaces.*|^Refresh$"

# The first real fetch on a fresh DB finds unknown players/teams.
# Wait for either the dialog or the terminal save message.
# 90s — BSC + SL network calls for real Insert data.
- extendedWaitUntil:
    visible:
      text: ".*Confirm New Players.*|.*Saved [0-9]+.*"
    timeout: 90000

- runFlow:
    when:
      visible: "Confirm New Players & Teams"
    commands:
      - extendedWaitUntil:
          visible:
            text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
          timeout: 10000
      - tapOn:
          text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
      - extendedWaitUntil:
          notVisible: "Confirm New Players & Teams"
          timeout: 30000

- extendedWaitUntil:
    visible:
      text: ".*Saved [0-9]+ cards.*"
    timeout: 30000

- assertVisible:
    text: ".*Saved 20 cards.*"
