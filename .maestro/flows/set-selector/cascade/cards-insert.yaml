appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Cascade — fetch card checklist for an Insert variant, verify saved cards"
tags:
  - set-selector
  - cascade
  - regression
  - requires:sets-loaded
  - provides:cards-loaded
---
# Cascade node: depends on sets-loaded, contributes to cards-loaded.
#
# By the time this flow runs, sets-inserts.yaml has verified that
# the Insert variant type can be synced. The Variants column was left empty
# (ReconciliationModal was cancelled). This flow adds a custom insert variant
# and fetches its card checklist.
#
# WHY A CUSTOM VARIANT:
#   The ReconciliationModal was cancelled by sets-inserts.yaml, so no
#   variants were written. We add "Baseball Stars" as a custom Insert variant —
#   this name matches the prefix pattern used by auto-detection and is a
#   realistic insert name from 2024 Topps Chrome.
#
# EXPECTED RESULT:
#   BSC and SL will return 0 cards for a custom insert with no set mapping.
#   "Saved 0 cards." is the expected success signal. The fetch pipeline
#   completes without error and the checklist panel stays in a usable state.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# FAST DRILL — Baseball → 2024 → Topps → Topps Chrome → Insert
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000

- extendedWaitUntil:
    visible: "Baseball"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

- extendedWaitUntil:
    visible: "Years"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search years.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search years.*"
    timeout: 10000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"
- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search manufacturers.*"
    timeout: 10000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"
- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

- extendedWaitUntil:
    visible: "Sets"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search sets.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search sets.*"
    timeout: 10000
- tapOn:
    text: ".*Search sets.*"
- inputText: "Topps Chrome"
- extendedWaitUntil:
    visible:
      text: "Topps Chrome"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps Chrome"
    index: 1

- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 20000
- extendedWaitUntil:
    visible: "Insert"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Insert"
    timeout: 10000
- tapOn: "Insert"

# Variants column appears. Cancel modal if auto-sync fires on empty column.
- extendedWaitUntil:
    visible: "Variants"
    timeout: 10000

- runFlow:
    when:
      notVisible: "Group Parallels"
    commands:
      - extendedWaitUntil:
          visible:
            text: ".*Reconcile Variants.*|.*Group Parallels.*"
          timeout: 240000
      - runFlow:
          when:
            visible: "Reconcile Variants"
          commands:
            - tapOn: "Cancel"
            - extendedWaitUntil:
                notVisible: "Reconcile Variants"
                timeout: 10000

# ============================================================
# ADD A CUSTOM INSERT VARIANT
# ============================================================

- tapOn:
    id: "Add custom Variants"
- extendedWaitUntil:
    visible: "Add Custom Entry"
    timeout: 5000
- inputText: "Baseball Stars"
- scrollUntilVisible:
    element:
      text: "Add"
    timeout: 5000
- tapOn: "Add"
- extendedWaitUntil:
    notVisible: "Add Custom Entry"
    timeout: 10000

- extendedWaitUntil:
    visible: "Baseball Stars"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Baseball Stars"
    timeout: 10000
- tapOn: "Baseball Stars"

# ============================================================
# WAIT FOR CARDCHECKLIST PANEL
# ============================================================

- scrollUntilVisible:
    element:
      text: ".*Fetch from Marketplaces.*|Refresh"
    timeout: 30000
- assertVisible:
    text: ".*Fetch from Marketplaces.*|Refresh"
- assertVisible: "No cards in this checklist yet."

# ============================================================
# FETCH THE CARD CHECKLIST
# ============================================================

- tapOn: "Fetch from Marketplaces"

# Wait for fetch to start or complete. The cascade reset wipes the global
# players/teams tables, so the first fetch always finds unknown entities and
# opens the "Confirm New Players & Teams" dialog before saving cards.
# Bump to 90s — BSC can be slow on a fresh DB.
- extendedWaitUntil:
    visible:
      text: ".*Confirm New Players.*|.*Saved [0-9]+.*"
    timeout: 90000

# If the dialog opened (fresh players/teams tables), confirm all entities.
- runFlow:
    when:
      visible: "Confirm New Players & Teams"
    commands:
      - extendedWaitUntil:
          visible:
            text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
          timeout: 10000
      - tapOn:
          text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
      - extendedWaitUntil:
          notVisible: "Confirm New Players & Teams"
          timeout: 30000

# Either path ends with the save confirmation.
- extendedWaitUntil:
    visible:
      text: ".*Saved [0-9]+ cards.*"
    timeout: 30000

- assertVisible:
    text: ".*Saved [0-9]+ cards.*"
