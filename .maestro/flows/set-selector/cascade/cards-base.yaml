appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Cascade — fetch card checklist for Base variant, confirm entities dialog, verify saved cards"
tags:
  - set-selector
  - cascade
  - regression
  - requires:sets-loaded
  - provides:cards-loaded
---
# Cascade node: depends on sets-loaded, contributes to cards-loaded.
#
# By the time this flow runs, setup.yaml and sets-base.yaml have already:
#   - Populated the hierarchy through Topps Chrome
#   - Confirmed the BaseSetPicker for the Base variant type
#   - Verified CardChecklist renders with "Fetch from Marketplaces"
#
# This flow navigates fresh to /set-selector, fast-drills to
# Topps Chrome → Base, then fetches the card checklist.
#
# FIRST FETCH vs RE-FETCH:
#   On the first fetch after setup, all players and teams are new to the DB.
#   The UnknownEntitiesDialog opens. We confirm all and verify "Saved N cards."
#   On re-runs, entities already exist — no dialog, cards save immediately.
#
# NOTE ON SETS-LOADED DEPENDENCY:
#   sets-loaded is satisfied when ALL five sets-* flows succeed. The BaseMappingForm
#   for "Base" was confirmed in sets-base.yaml, so "Fetch from Marketplaces" will
#   be available here. If for any reason it is not (SL path B auto-closed), the
#   flow still works because BaseMappingForm is idempotent on re-open.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# FAST DRILL — Baseball → 2024 → Topps → Topps Chrome → Base
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000

- extendedWaitUntil:
    visible: "Baseball"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

- extendedWaitUntil:
    visible: "Years"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search years.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search years.*"
    timeout: 10000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"
- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search manufacturers.*"
    timeout: 10000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"
- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

- extendedWaitUntil:
    visible: "Sets"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search sets.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search sets.*"
    timeout: 10000
- tapOn:
    text: ".*Search sets.*"
- inputText: "Topps Chrome"
- extendedWaitUntil:
    visible:
      text: "Topps Chrome"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps Chrome"
    index: 1

- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 20000
- extendedWaitUntil:
    visible: "Base"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Base"
    timeout: 10000
- tapOn: "Base"

# BaseMappingForm may re-open if the session is fresh. Handle both paths.
- extendedWaitUntil:
    visible:
      text: ".*Select Base Set.*|.*Re-map Base.*"
    timeout: 60000

- runFlow:
    when:
      visible: "Select Base Set"
    commands:
      - extendedWaitUntil:
          visible: "Confirm Base Set"
          timeout: 60000
      - tapOn: "Confirm Base Set"
      - extendedWaitUntil:
          notVisible: "Select Base Set"
          timeout: 30000

- scrollUntilVisible:
    element:
      text: ".*Fetch from Marketplaces.*|Refresh"
    timeout: 30000
- assertVisible:
    text: ".*Fetch from Marketplaces.*|Refresh"

# ============================================================
# FETCH THE CARD CHECKLIST
# ============================================================

- tapOn: "Fetch from Marketplaces"

# Wait for fetch to start or complete. "Fetching..." may be too transient to
# catch if BSC returns quickly. Wait for dialog or success message.
- extendedWaitUntil:
    visible:
      text: ".*Confirm New Players.*|.*Saved [0-9]+.*"
    timeout: 60000

# If the dialog opened (fresh players/teams tables), confirm all entities.
- runFlow:
    when:
      visible: "Confirm New Players & Teams"
    commands:
      - extendedWaitUntil:
          visible:
            text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
          timeout: 10000
      - tapOn:
          text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
      - extendedWaitUntil:
          notVisible: "Confirm New Players & Teams"
          timeout: 30000

# Either path ends with the save confirmation.
- extendedWaitUntil:
    visible:
      text: ".*Saved [0-9]+ cards.*"
    timeout: 30000

# At least one card row with a "#NNN" number confirms cards are present.
# (We deliberately don't assert "BSC" or "SL" platform badges — SL coverage
# is variant-specific and the Base variant of 2024 Topps Chrome currently
# returns no SL matches. The "Saved N cards." message + a card row are
# sufficient evidence that the fetch + save pipeline ran end-to-end.)
- assertVisible:
    text: ".*#[0-9].*"