appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/testing/seed-credentials?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Cascade Setup — reset DB, save credentials, drill to 2024 Topps Chrome, sync Variant Types"
tags:
  - set-selector
  - cascade
  - regression
  - provides:setup-done
---
# First node in the cascade dependency graph.
#
# When this flow completes, the shared Convex deployment has:
#   - selectorOptions and cardChecklist tables cleared (fresh state)
#   - BSC + SL credentials saved for the test user (idempotent)
#   - Sports → Years → Manufacturers → Sets hierarchy populated
#   - Baseball → 2024 → Topps → Topps Chrome path accessible
#   - Variant Types column visible with Base, Insert, and Parallel listed
#
# The browser session ends when this flow ends. The cascade state persists in
# the Convex deployment (shared for all workers). Downstream cascade flows
# sign in fresh, navigate to /set-selector, and assume data is already present.
#
# WHY NOT A UTIL:
#   This is a runnable scheduled flow, not a util. It is scheduled by the runner
#   as the first node (no requires:) and must produce setup-done for the five
#   sets-level flows to start. Unlike util-drill-to-2024-topps-chrome (which is
#   called via runFlow from parent flows), this flow stands alone.

# ============================================================
# LAUNCH + SIGN IN → /set-selector
# seed-credentials redirects here after storing BSC + SL creds.
# BSC and SportLots tokens were already warmed in worker-bootstrap
# (Phase 0) — this flow reuses those cached sessions; no re-login
# is triggered here.
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# RESET STATE
# Clear selectorOptions and cardChecklist rows on the shared Convex
# deployment. Requires ALLOW_RESET_SET_BUILDER_DATA env var (dev/preview only).
# ============================================================

- scrollUntilVisible:
    element:
      text: "Reset Set Builder Data"
    timeout: 10000
- tapOn: "Reset Set Builder Data"

# The confirm panel appears with "Delete Everything" and an autofocused input.
# 30s — tapOn "Reset Set Builder Data" can take 5-6s retrying, plus panel animation.
- extendedWaitUntil:
    visible: "Delete Everything"
    timeout: 30000

# Input has autoFocus. Erase any stray characters from prior events, then type.
# NEVER tapOn the placeholder text first — it injects a stray character.
- eraseText: 10
- inputText: "RESET"

- tapOn: "Delete Everything"

# Wait for the success message. 60s covers large accumulated DBs.
# Convex read-limit errors appear as "Reset failed: ..." — if reset fails,
# the success pattern never matches and this flow fails clearly.
- extendedWaitUntil:
    visible:
      text: ".*Deleted [0-9]+ selector options.*"
    timeout: 60000

# ============================================================
# SEED TEST TEAMS
# Resets above wiped the `teams` table along with selectorOptions /
# cardChecklist / players. The cascade card-commit flows normally
# repopulate teams via "Confirm New Players & Teams", but their output
# depends on marketplace data + the order checklist-fetch-* flows hit
# the confirm dialog. The TeamPicker tests (team-picker.yaml,
# team-picker-regression.yaml, edit-and-delete-card.yaml) need a deterministic
# typeahead match. Seed New York Yankees + New York Mets explicitly so
# those flows never depend on cascade output.
# ============================================================

- scrollUntilVisible:
    element:
      text: "Seed Test Teams"
    timeout: 10000
- tapOn: "Seed Test Teams"
- extendedWaitUntil:
    visible:
      text: ".*Seed complete.*"
    timeout: 15000

# ============================================================
# CREDENTIALS + SESSION WARMING
# Credentials were seeded server-side via /testing/seed-credentials in the
# sign-in URL chain. BSC + SL Puppeteer sessions were warmed once in
# worker-bootstrap (Phase 0) and are reused here — no re-login needed.
# The marketplace adapters are ready for the Sync Variant Types calls below.
# ============================================================

# ============================================================
# NAVIGATE TO SET SELECTOR
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000

# ============================================================
# LEVEL 1 — Baseball
# Auto-sync fires when Sports column renders empty. Wait for "Baseball".
# ============================================================

- runFlow:
    when:
      notVisible: "Baseball"
    commands:
      - extendedWaitUntil:
          visible: "Baseball"
          timeout: 60000

- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

# ============================================================
# LEVEL 2 — Year 2024
# Auto-sync fires when Years column renders empty.
#
# COMPLETION PATTERN — same as Manufacturers/Sets below:
#   1. Wait for the YearForm header "Syncing Year Options" to disappear.
#      It mounts on auto-sync and unmounts on success (mode → idle), or stays
#      and shows a Close button on no-results / error.
#   2. If the form ended on a "Close" button (no new results), dismiss it.
#   3. Then wait for "2024" — by now items should be populated.
#
# Bumped to 180s ceiling. The previous 90s wait-for-2024 was tight on cold
# preview deployments where BSC + SL aggregated year fetches can each take
# 30–60s, plus Convex action cold start.
# ============================================================

- extendedWaitUntil:
    visible: "Years"
    timeout: 45000

# Wait for the Years sync to settle. Mirror the Manufacturers/Sets pattern below:
# guard on the "Search years..." input being absent (form is mounted) and wait
# for it to appear (mode=idle = sync done and items populated). This avoids
# false-negative waits on the year text itself, which lives inside the column's
# internal scroll container and may not be reachable by visible:.
- runFlow:
    when:
      notVisible: ".*Search years.*"
    commands:
      - extendedWaitUntil:
          visible: ".*Search years.*"
          timeout: 10000

# Use the search input to filter to "2024", then tap the matching result.
# Years column lists newest first (2026, 2025, 2024…), so 2024 may be off-fold
# in the column's own overflow:auto container — search avoids the scroll problem.
- scrollUntilVisible:
    element:
      text: ".*Search years.*"
    timeout: 10000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"

- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

# ============================================================
# LEVEL 3 — Topps
# Auto-sync fires when Manufacturers column renders empty.
# Wait for the search input (only visible when mode=idle, i.e. sync done).
# ============================================================

- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 10000

- runFlow:
    when:
      notVisible: ".*Search manufacturers.*"
    commands:
      - extendedWaitUntil:
          visible: ".*Search manufacturers.*"
          timeout: 90000

- scrollUntilVisible:
    element:
      text: ".*Search manufacturers.*"
    timeout: 10000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"

- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

# ============================================================
# LEVEL 4 — Topps Chrome
# Auto-sync fires when Sets column renders empty.
# ============================================================

- extendedWaitUntil:
    visible: "Sets"
    timeout: 20000

- runFlow:
    when:
      notVisible: ".*Search sets.*"
    commands:
      - extendedWaitUntil:
          visible: ".*Search sets.*"
          timeout: 120000

- scrollUntilVisible:
    element:
      text: ".*Search sets.*"
    timeout: 10000
- tapOn:
    text: ".*Search sets.*"
- inputText: "Topps Chrome"

- extendedWaitUntil:
    visible:
      text: "Topps Chrome"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps Chrome"
    index: 1

# ============================================================
# LEVEL 5 — Sync Variant Types
# Guard on "Base" absence — only sync when list is actually empty.
# SetVariantForm shows "Close" on re-sync with no-new-results.
# ============================================================

- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 20000

- runFlow:
    when:
      notVisible: "Base"
    commands:
      - scrollUntilVisible:
          element:
            text: "Sync Variant Types"
          timeout: 10000
      - tapOn: "Sync Variant Types"
      - extendedWaitUntil:
          notVisible: "Syncing Variant Types"
          timeout: 60000
      - runFlow:
          when:
            visible: "Close"
          commands:
            - tapOn: "Close"
            - extendedWaitUntil:
                visible: "Sync Variant Types"
                timeout: 10000

# Confirm the three expected variant types are present.
- scrollUntilVisible:
    element:
      text: "Base"
    timeout: 10000
- assertVisible: "Base"
- assertVisible: "Insert"
- assertVisible: "Parallel"

# ============================================================
# PRE-SYNC VARIANT TYPES FOR THE 3 SETS USED BY THE NEO-12-prone TESTS
# (parallel-grouping-cancel-discards → Topps Update,
#  parallel-grouping-keyboard      → Topps Pro Debut,
#  variant-metadata-editor-insert  → Topps Wonderland).
#
# Reuse util-drill-to-2024-topps-chrome with SET overrides — that util
# already does a fresh /set-selector navigation, drills Sport → Year →
# Manuf → Set, and auto-syncs variant types when the column is empty
# (waits up to 60s for "Base" to appear). Exercises the real BSC + SL
# adapter calls during setup so the downstream tests start with cached
# variant types and don't race the 60s wait on cold Cloud Run instances.
# Net cost: ~30s/set on cold start, near zero once minScale=1 warms
# the browser-service Cloud Run instance.
# ============================================================

- runFlow:
    file: ../util-drill-to-2024-topps-chrome.yaml
    env:
      SET: "Topps Update"

- runFlow:
    file: ../util-drill-to-2024-topps-chrome.yaml
    env:
      SET: "Topps Pro Debut"

- runFlow:
    file: ../util-drill-to-2024-topps-chrome.yaml
    env:
      SET: "Topps Wonderland"
