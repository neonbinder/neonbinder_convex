appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Cascade — fetch card checklist for a parallel-of-insert variant, verify saved cards"
tags:
  - set-selector
  - cascade
  - regression
  - requires:parallels-of-inserts-moved
  - provides:cards-loaded
---
# Cascade node: depends on parallels-of-inserts-moved (more granular state
# produced by sets-move-parallels-of-inserts.yaml), contributes to cards-loaded.
#
# WHAT THIS TESTS:
#   After sets-move-parallels-of-inserts.yaml ran, "Stars Gold" was grouped
#   under "Stars" as a parallel-of-insert. This flow drills to Topps Chrome →
#   Insert → Stars → Stars Gold (the parallel-of-insert), then fetches the
#   card checklist for that nested parallel.
#
# NAVIGATING TO A PARALLEL-OF-INSERT:
#   At Level 6 (Variants column for Insert variant type), "Stars" is the only
#   visible top-level insert after grouping. Stars Gold is NESTED under Stars —
#   it does not appear in the Variants column directly. Tapping "Stars" opens a
#   new "Parallels" column where "Stars Gold" is then directly visible and tappable.
#
# EXPECTED RESULT:
#   "Stars Gold" is a custom entry with no marketplace set mapping.
#   BSC and SL return 0 cards. "Saved 0 cards." is the success signal.
#   The fetch pipeline handles parallel-of-insert checklist IDs correctly.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# FAST DRILL — Baseball → 2024 → Topps → Topps Chrome → Insert
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000

- extendedWaitUntil:
    visible: "Baseball"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

- extendedWaitUntil:
    visible: "Years"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search years.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search years.*"
    timeout: 10000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"
- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search manufacturers.*"
    timeout: 10000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"
- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

- extendedWaitUntil:
    visible: "Sets"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search sets.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search sets.*"
    timeout: 10000
- tapOn:
    text: ".*Search sets.*"
- inputText: "Topps Chrome"
- extendedWaitUntil:
    visible:
      text: "Topps Chrome"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps Chrome"
    index: 1

- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 20000
- extendedWaitUntil:
    visible: "Insert"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Insert"
    timeout: 10000
- tapOn: "Insert"

# Variants column appears. If auto-sync fires, cancel the ReconciliationModal.
- extendedWaitUntil:
    visible: "Variants"
    timeout: 10000

- runFlow:
    when:
      notVisible: "Group Parallels"
    commands:
      # 10s — surface real backend hangs instead of masking with 240s.
      - extendedWaitUntil:
          visible:
            text: ".*Reconcile Variants.*|.*Group Parallels.*"
          timeout: 10000
      - runFlow:
          when:
            visible: "Reconcile Variants"
          commands:
            - tapOn: "Cancel"
            - extendedWaitUntil:
                notVisible: "Reconcile Variants"
                timeout: 10000

# ============================================================
# NAVIGATE TO "Stars Gold" (parallel-of-insert)
# After sets-move-parallels-of-inserts.yaml ran, Stars Gold and Stars Red are
# nested under Stars as parallels-of-inserts. Only "Stars" is visible at the
# top level of the Variants column — tapping it opens a new "Parallels" column
# where Stars Gold is directly visible.
# ============================================================

- extendedWaitUntil:
    visible: "Stars"
    timeout: 15000
- scrollUntilVisible:
    element:
      text: "Stars"
    timeout: 10000
- tapOn: "Stars"

# Tapping the parent insert opens a new "Parallels" column.
- extendedWaitUntil:
    visible: "Parallels"
    timeout: 15000
- extendedWaitUntil:
    visible: "Stars Gold"
    timeout: 15000
- scrollUntilVisible:
    element:
      text: "Stars Gold"
    timeout: 10000
- tapOn: "Stars Gold"

# ============================================================
# WAIT FOR CARDCHECKLIST PANEL
# Selecting a non-Base variant at Level 6 opens the CardChecklist panel.
# "Stars Gold" is a custom parallel-of-insert — the panel uses its variant ID.
# ============================================================

- scrollUntilVisible:
    element:
      text: ".*Fetch from Marketplaces.*|Refresh"
    timeout: 30000
- assertVisible:
    text: ".*Fetch from Marketplaces.*|Refresh"
- assertVisible: "No cards in this checklist yet."

# ============================================================
# FETCH THE CARD CHECKLIST
# Custom parallel-of-insert — both platforms return 0 cards.
# "Saved 0 cards." is the expected success signal.
# ============================================================

- tapOn: "Fetch from Marketplaces"

# Wait for fetch to start or complete. The cascade reset wipes the global
# players/teams tables, so the first fetch always finds unknown entities and
# opens the "Confirm New Players & Teams" dialog before saving cards.
# Bump to 90s — BSC can be slow on a fresh DB.
- extendedWaitUntil:
    visible:
      text: ".*Confirm New Players.*|.*Saved [0-9]+.*"
    timeout: 90000

# If the dialog opened (fresh players/teams tables), confirm all entities.
- runFlow:
    when:
      visible: "Confirm New Players & Teams"
    commands:
      - extendedWaitUntil:
          visible:
            text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
          timeout: 10000
      - tapOn:
          text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
      - extendedWaitUntil:
          notVisible: "Confirm New Players & Teams"
          timeout: 30000

# Either path ends with the save confirmation.
- extendedWaitUntil:
    visible:
      text: ".*Saved [0-9]+ cards.*"
    timeout: 30000

- assertVisible:
    text: ".*Saved [0-9]+ cards.*"
