appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Cascade — fetch checklist for parallel-of-insert (Chrome Legend Autographs Black Refractor, 38 cards)"
tags:
  - set-selector
  - cascade
  - regression
  - requires:inserts-saved
  - provides:cards-loaded
---
# Cascade node: depends on sets-loaded, contributes to cards-loaded.
#
# DEPENDENCY CHANGE (Part 3 of the parallel-playground refactor):
#   Previously this required:parallels-of-inserts-moved (provided by
#   cascade/sets-move-parallels-of-inserts.yaml, which added custom Stars data).
#   That flow has been moved out of cascade. This flow now requires:sets-loaded
#   only, and uses real BSC+SL data (Chrome Legend Autographs) instead of
#   custom entries.
#
# WHAT THIS TESTS:
#   1. Select Insert → auto-sync reopens ReconciliationModal (Inserts column
#      is empty after sets-inserts.yaml cancelled; but cards-insert.yaml ran
#      and saved All-Etch and other matched rows, so the column is populated).
#      If Inserts is already populated (cards-insert.yaml ran), skip the modal.
#   2. Find "Chrome Legend Autographs" in the Inserts column.
#   3. Open Group Parallels modal for Chrome Legend Autographs, accept the
#      suggestion for "Chrome Legend Autographs Black Refractor" only, save.
#   4. Tap Chrome Legend Autographs → Parallels column opens → tap
#      "Chrome Legend Autographs Black Refractor".
#   5. Fetch from Marketplaces. Assert "Saved 38 cards."
#
# WHY CHROME LEGEND AUTOGRAPHS?
#   It is a 2024 Topps Chrome insert with known parallel data on both
#   BSC and SL. The Black Refractor parallel has 38 cards. These numbers
#   are stable — if they change, update this comment and the assertion.
#
# GROUP PARALLELS — SINGLE PARALLEL ACCEPTANCE:
#   Chrome Legend Autographs has ~8 auto-suggested parallels in the Group
#   Parallels modal. We accept ONLY "Chrome Legend Autographs Black Refractor"
#   and reject the other suggestions using the ✕ (remove) button so we do
#   not add unwanted parallel rows to the DB. The ✕ button's aria-label is
#   "Remove <value> from parallels" (maps to resource-id in Maestro web).
#   After accepting Black Refractor and rejecting the others, we save.
#
# NOTE ON ORDERING:
#   This flow runs after cards-insert.yaml (which saved All-Etch and others
#   in the Inserts column). So "Insert" is already selected from that flow's
#   run, but in a new browser session the Variant Types column starts fresh —
#   we must re-select Insert and handle any Reconcile modal that appears.
#
# UNCERTAINTY (documented): The exact number of auto-suggestions for Chrome
#   Legend Autographs may vary as marketplace data changes. The flow accepts
#   "Chrome Legend Autographs Black Refractor" explicitly by aria-label, and
#   cancels any remaining Suggested rows by tapping the Accept All + then
#   removing non-Black-Refractor rows. If the suggestion count changes,
#   the reject loop may need updating. See the REJECT SECTION below for details.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 10000

# ============================================================
# FAST DRILL — Baseball → 2024 → Topps → Topps Chrome
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000

- extendedWaitUntil:
    visible: "Baseball"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

- extendedWaitUntil:
    visible: "Years"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search years.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: ".*Search years.*"
    timeout: 10000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"
- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: ".*Search manufacturers.*"
    timeout: 10000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"
- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

- extendedWaitUntil:
    visible: "Sets"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search sets.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: ".*Search sets.*"
    timeout: 10000
- tapOn:
    text: ".*Search sets.*"
- inputText: "Topps Chrome"
- extendedWaitUntil:
    visible:
      text: "Topps Chrome"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps Chrome"
    index: 1

- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 20000
- extendedWaitUntil:
    visible: "Insert"
    timeout: 10000

# ============================================================
# SELECT INSERT
# cards-insert.yaml (which provides:cards-loaded ahead of us) already saved
# All-Etch and other matched rows — the Inserts column IS populated.
# Tapping Insert should show the populated column; no new modal should open.
# If for some reason the column is empty (unexpected state), guard handles it.
# ============================================================

- scrollUntilVisible:
    element:
      text: "Insert"
    timeout: 10000
- tapOn: "Insert"

- extendedWaitUntil:
    visible: "Inserts"
    timeout: 10000

# Handle the edge case where the Inserts column is unexpectedly empty
# and auto-sync fires the ReconciliationModal.
- runFlow:
    when:
      visible: "Reconcile Inserts"
    commands:
      # Save All matched rows so Chrome Legend Autographs appears in the column.
      - scrollUntilVisible:
          element:
            text: ".*Save [0-9]+ matched.*"
          timeout: 30000
      - tapOn:
          text: ".*Save [0-9]+ matched.*"
      - extendedWaitUntil:
          notVisible: "Reconcile Inserts"
          timeout: 30000

# ============================================================
# FIND "Chrome Legend Autographs" IN THE INSERTS COLUMN
# Use the search input to locate it in the internal scroll.
# ============================================================

- scrollUntilVisible:
    element:
      text: ".*Search inserts.*"
    timeout: 10000
- tapOn:
    text: ".*Search inserts.*"
- inputText: "Chrome Legend Autographs"
- extendedWaitUntil:
    visible:
      text: "Chrome Legend Autographs"
      index: 1
    timeout: 10000

# ============================================================
# OPEN GROUP PARALLELS MODAL FOR CHROME LEGEND AUTOGRAPHS
# ============================================================

- scrollUntilVisible:
    element:
      text: "Group Parallels"
    timeout: 10000
- tapOn: "Group Parallels"
- extendedWaitUntil:
    visible:
      text: ".*Drag inserts under a parent.*"
    timeout: 10000
- extendedWaitUntil:
    visible: "Top-level inserts"
    timeout: 15000

# Accept all suggestions first — this places ALL suggested parallels under
# Chrome Legend Autographs. We then reject every parallel EXCEPT
# "Chrome Legend Autographs Black Refractor" using the ✕ button.
- extendedWaitUntil:
    visible:
      text: ".*Accept all suggestions.*"
    timeout: 10000
- tapOn:
    text: ".*Accept all suggestions.*"

# ============================================================
# REJECT ALL PARALLELS EXCEPT "Chrome Legend Autographs Black Refractor"
#
# After Accept All, multiple parallels sit in the "Parallels of Chrome
# Legend Autographs" zone. We want ONLY Black Refractor. We scroll through
# the parallels zone and tap the ✕ button for each NON-Black-Refractor row.
#
# UNCERTAINTY: The exact suggested parallel names change with marketplace
# data. The aria-label "Remove <value> from parallels" is per-row and
# includes the full parallel name. We target known non-target parallels
# by their aria-labels. If the list changes, update this section.
#
# Parallels observed in prior runs (besides Black Refractor):
#   "Chrome Legend Autographs Aqua Refractor"
#   "Chrome Legend Autographs Orange Refractor"
#   "Chrome Legend Autographs Prism Refractor"
#   "Chrome Legend Autographs Red Refractor"
#   "Chrome Legend Autographs Gold Refractor"
#   "Chrome Legend Autographs SuperFractor"
#   "Chrome Legend Autographs Atomic Refractor"
#
# Rather than listing every possible name (fragile), we use a different
# approach: tap the ✕ button for each row that is NOT Black Refractor
# by scrolling the parallels zone and dismissing "Suggested" badges until
# only Black Refractor remains. The modal footer count goes to 1 promotion
# when only Black Refractor is present.
#
# Simpler approach (used here): accept all, then cancel all non-target
# rows one at a time. Each ✕ tap fires PLACE { kind: "ungrouped" }.
# We stop when the footer shows "1 promotion" — meaning only one parallel
# (Black Refractor) remains grouped.
# ============================================================

# Wait for footer to show N promotions after Accept All.
- extendedWaitUntil:
    visible:
      text: ".*[0-9]+ promotion.*"
    timeout: 5000

# Reject all except Black Refractor by tapping ✕ for each other parallel.
# The ✕ aria-label is "Remove <name> from parallels". We target each
# known non-target parallel by its aria-label resource-id.
# If a parallel is not present (marketplace data changed), the tapOn
# simply does nothing — Maestro will not fail on a missing id element
# when wrapped in a runFlow when:visible guard.

# Real 8 suggested parallels (from user's screenshot 2026-05-21):
#   Black Refractor  <-- keep
#   Orange Refractor
#   Printing Plates Black
#   Printing Plates Cyan
#   Printing Plates Magenta
#   Printing Plates Yellow
#   Red Refractor
#   SuperFractor

- runFlow:
    when:
      visible: "Chrome Legend Autographs Orange Refractor"
    commands:
      - tapOn:
          id: "Remove Chrome Legend Autographs Orange Refractor from parallels"

- runFlow:
    when:
      visible: "Chrome Legend Autographs Printing Plates Black"
    commands:
      - tapOn:
          id: "Remove Chrome Legend Autographs Printing Plates Black from parallels"

- runFlow:
    when:
      visible: "Chrome Legend Autographs Printing Plates Cyan"
    commands:
      - tapOn:
          id: "Remove Chrome Legend Autographs Printing Plates Cyan from parallels"

- runFlow:
    when:
      visible: "Chrome Legend Autographs Printing Plates Magenta"
    commands:
      - tapOn:
          id: "Remove Chrome Legend Autographs Printing Plates Magenta from parallels"

- runFlow:
    when:
      visible: "Chrome Legend Autographs Printing Plates Yellow"
    commands:
      - tapOn:
          id: "Remove Chrome Legend Autographs Printing Plates Yellow from parallels"

- runFlow:
    when:
      visible: "Chrome Legend Autographs Red Refractor"
    commands:
      - tapOn:
          id: "Remove Chrome Legend Autographs Red Refractor from parallels"

- runFlow:
    when:
      visible: "Chrome Legend Autographs SuperFractor"
    commands:
      - tapOn:
          id: "Remove Chrome Legend Autographs SuperFractor from parallels"

# Verify only Black Refractor remains in the parallels zone.
- assertVisible: "Chrome Legend Autographs Black Refractor"

# ============================================================
# SAVE — only Black Refractor is grouped
# ============================================================

- scrollUntilVisible:
    element:
      text: ".*Save [0-9]+ change.*"
    timeout: 10000
- tapOn:
    text: ".*Save [0-9]+ change.*"

- extendedWaitUntil:
    notVisible:
      text: ".*Drag inserts under a parent.*"
    timeout: 30000

# ============================================================
# NAVIGATE TO Black Refractor via Chrome Legend Autographs
# ============================================================

# The search box may still have "Chrome Legend Autographs" typed in it.
# Clear it so we can tap the entry.
- scrollUntilVisible:
    element:
      text: ".*Search inserts.*"
    timeout: 10000
- tapOn:
    text: ".*Search inserts.*"
- eraseText: 30
- inputText: "Chrome Legend Autographs"
- extendedWaitUntil:
    visible:
      text: "Chrome Legend Autographs"
      index: 1
    timeout: 10000

- scrollUntilVisible:
    element:
      text: "Chrome Legend Autographs"
      index: 1
    visibilityPercentage: 50
    timeout: 15000
- tapOn:
    text: "Chrome Legend Autographs"
    index: 1

# Tapping the parent insert opens the Parallels column.
- extendedWaitUntil:
    visible: "Parallels"
    timeout: 15000
- scrollUntilVisible:
    element:
      text: "Chrome Legend Autographs Black Refractor"
    visibilityPercentage: 50
    timeout: 15000
- tapOn: "Chrome Legend Autographs Black Refractor"

# ============================================================
# CARD CHECKLIST PANEL APPEARS
# ============================================================

- scrollUntilVisible:
    element:
      text: ".*Fetch from Marketplaces.*|Refresh"
    timeout: 15000
- assertVisible:
    text: ".*Fetch from Marketplaces.*|Refresh"

# ============================================================
# FETCH FROM MARKETPLACES
# ============================================================

- tapOn: "Fetch from Marketplaces"

# Players/teams may already be populated from cards-insert.yaml or
# cards-parallel.yaml running first. Handle both paths.
- extendedWaitUntil:
    visible:
      text: ".*Confirm New Players.*|.*Saved [0-9]+.*"
    timeout: 90000

- runFlow:
    when:
      visible: "Confirm New Players & Teams"
    commands:
      - extendedWaitUntil:
          visible:
            text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
          timeout: 10000
      - tapOn:
          text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
      - extendedWaitUntil:
          notVisible: "Confirm New Players & Teams"
          timeout: 30000

- extendedWaitUntil:
    visible:
      text: ".*Saved [0-9]+ cards.*"
    timeout: 30000

- assertVisible:
    text: ".*Saved 38 cards.*"
