appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Cascade — fetch card checklist for a Parallel variant, verify saved cards"
tags:
  - set-selector
  - cascade
  - regression
  - requires:sets-loaded
  - provides:cards-loaded
---
# Cascade node: depends on sets-loaded, contributes to cards-loaded.
#
# By the time this flow runs, sets-parallels.yaml has verified that
# the Parallel variant type can be synced and the ReconciliationModal renders.
# However, that flow cancelled without saving variants — the Parallel Variants
# column is empty after cascade level 1.
#
# WHAT THIS FLOW DOES:
#   Drills to Topps Chrome → Parallel, adds one custom variant named
#   "Prizm Gold" (a common Topps Chrome parallel name), then fetches the
#   card checklist for that variant and verifies "Saved N cards." appears.
#
# WHY A CUSTOM VARIANT:
#   The ReconciliationModal was cancelled by sets-parallels.yaml, so no
#   variants were written. We add a custom one to have a stable tap target.
#   "Prizm Gold" is a realistic parallel name — the BSC checklist fetch will
#   attempt to look it up. The SL adapter will return 0 cards (no set mapping)
#   and the BSC adapter will return 0 cards (no matching sellerId-based set).
#   The result is "Saved 0 cards." — still valid for verifying the fetch pipeline.
#
# NOTE ON EXPECTED RESULT:
#   "Saved N cards." where N may be 0 is the expected success signal.
#   The flow does not assert a specific count or require cards to exist.
#   It asserts the fetch completes without error and the checklist panel
#   remains in a usable state (the fetch button is available for retry).

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# FAST DRILL — Baseball → 2024 → Topps → Topps Chrome → Parallel
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000

- extendedWaitUntil:
    visible: "Baseball"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

- extendedWaitUntil:
    visible: "Years"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search years.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search years.*"
    timeout: 10000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"
- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search manufacturers.*"
    timeout: 10000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"
- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

- extendedWaitUntil:
    visible: "Sets"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search sets.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: ".*Search sets.*"
    timeout: 10000
- tapOn:
    text: ".*Search sets.*"
- inputText: "Topps Chrome"
- extendedWaitUntil:
    visible:
      text: "Topps Chrome"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps Chrome"
    index: 1

- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 20000
- extendedWaitUntil:
    visible: "Parallel"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Parallel"
    timeout: 10000
- tapOn: "Parallel"

# Variants column appears. If auto-sync fires (empty column), cancel the modal.
- extendedWaitUntil:
    visible: "Variants"
    timeout: 10000

- runFlow:
    when:
      notVisible: "Group Parallels"
    commands:
      # Empty column auto-syncs. Wait for ReconciliationModal and cancel.
      - extendedWaitUntil:
          visible:
            text: ".*Reconcile Variants.*|.*Group Parallels.*"
          timeout: 240000
      - runFlow:
          when:
            visible: "Reconcile Variants"
          commands:
            - tapOn: "Cancel"
            - extendedWaitUntil:
                notVisible: "Reconcile Variants"
                timeout: 10000

# ============================================================
# ADD A CUSTOM PARALLEL VARIANT
# The Variants column is empty after cancelling. Add a known custom entry.
# "Add custom Variants" aria-label maps to resource-id in Maestro web.
# ============================================================

- tapOn:
    id: "Add custom Variants"
- extendedWaitUntil:
    visible: "Add Custom Entry"
    timeout: 5000
- inputText: "Prizm Gold"
- scrollUntilVisible:
    element:
      text: "Add"
    timeout: 5000
- tapOn: "Add"
- extendedWaitUntil:
    notVisible: "Add Custom Entry"
    timeout: 10000

# The new entry appears — may need to search for it if list is long.
- extendedWaitUntil:
    visible: "Prizm Gold"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Prizm Gold"
    timeout: 10000
- tapOn: "Prizm Gold"

# ============================================================
# WAIT FOR CARDCHECKLIST PANEL
# Selecting a non-Base Variant at Level 6 opens the CardChecklist panel.
# ============================================================

- scrollUntilVisible:
    element:
      text: ".*Fetch from Marketplaces.*|Refresh"
    timeout: 30000
- assertVisible:
    text: ".*Fetch from Marketplaces.*|Refresh"
- assertVisible: "No cards in this checklist yet."

# ============================================================
# FETCH THE CARD CHECKLIST
# BSC and SL will return 0 cards for a custom parallel with no set mapping.
# "Saved 0 cards." is the expected success signal.
# ============================================================

- tapOn: "Fetch from Marketplaces"

# Wait for fetch to start or complete. The cascade reset wipes the global
# players/teams tables, so the first fetch always finds unknown entities and
# opens the "Confirm New Players & Teams" dialog before saving cards.
# Bump to 90s — BSC can be slow on a fresh DB.
- extendedWaitUntil:
    visible:
      text: ".*Confirm New Players.*|.*Saved [0-9]+.*"
    timeout: 90000

# If the dialog opened (fresh players/teams tables), confirm all entities.
- runFlow:
    when:
      visible: "Confirm New Players & Teams"
    commands:
      - extendedWaitUntil:
          visible:
            text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
          timeout: 10000
      - tapOn:
          text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
      - extendedWaitUntil:
          notVisible: "Confirm New Players & Teams"
          timeout: 30000

# Either path ends with the save confirmation.
- extendedWaitUntil:
    visible:
      text: ".*Saved [0-9]+ cards.*"
    timeout: 30000

# Confirm fetch completed without a crash. Checklist remains in empty state.
- assertVisible:
    text: ".*Saved [0-9]+ cards.*"
