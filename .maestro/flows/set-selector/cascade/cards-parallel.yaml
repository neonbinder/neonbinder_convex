appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/testing/seed-credentials?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Cascade — fetch card checklist for real Parallel variant (Gold Wave), assert 300 cards"
tags:
  - set-selector
  - cascade
  - regression
  - requires:sets-loaded
  - provides:cards-loaded
---
# Cascade node: depends on sets-loaded, contributes to cards-loaded.
#
# By the time this flow runs, sets-parallels.yaml has cancelled the
# ReconciliationModal, leaving the Parallels column EMPTY. Tapping "Parallel"
# again causes auto-sync to fire and re-open the ReconciliationModal.
# We save all matched rows, then navigate to "Gold Wave" and fetch its checklist.
#
# WHAT THIS VERIFIES:
#   - Auto-sync reopens ReconciliationModal when Parallels column is empty.
#   - "Gold Wave" row is present in the matched section.
#   - Saving produces a real card checklist with exactly 300 cards.
#   - The fetch pipeline handles known Parallel variants correctly.
#
# WHY GOLD WAVE?
#   2024 Topps Chrome Gold Wave is a high-print-run parallel with strong
#   BSC + SL coverage. 300 cards is the expected count. If this fails,
#   the marketplace data changed — update the number.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 10000

# ============================================================
# TOKEN WARMING
# Credentials were seeded server-side via /testing/seed-credentials in the
# sign-in URL chain. Warm the marketplace tokens before the fast drill so
# that the auto-sync ReconciliationModal and the "Fetch from Marketplaces"
# call for Gold Wave Refractors don't stall on a cold Puppeteer login.
# Cost: ~0.5s when tokens are already cached (no-op).
# ============================================================

- runFlow:
    file: ../util-login-to-bsc.yaml

- runFlow:
    file: ../util-login-to-sportlots.yaml

# ============================================================
# FAST DRILL — Baseball → 2024 → Topps → Topps Chrome
# ============================================================

- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000

- extendedWaitUntil:
    visible: "Baseball"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Baseball"
    timeout: 10000
- tapOn: "Baseball"

- extendedWaitUntil:
    visible: "Years"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search years.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: ".*Search years.*"
    timeout: 10000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"
- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

- extendedWaitUntil:
    visible: "Manufacturers"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: ".*Search manufacturers.*"
    timeout: 10000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"
- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

- extendedWaitUntil:
    visible: "Sets"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*Search sets.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: ".*Search sets.*"
    timeout: 10000
- tapOn:
    text: ".*Search sets.*"
- inputText: "Topps Chrome"
- extendedWaitUntil:
    visible:
      text: "Topps Chrome"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps Chrome"
    index: 1

- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 20000
- extendedWaitUntil:
    visible: "Parallel"
    timeout: 10000

# ============================================================
# SELECT PARALLEL — auto-sync fires because Parallels column is empty
# ============================================================

- scrollUntilVisible:
    element:
      text: "Parallel"
    timeout: 10000
- tapOn: "Parallel"

- extendedWaitUntil:
    visible: "Parallels"
    timeout: 10000

# Auto-sync fires on empty column. Wait for modal heading OR the column's
# Search input (re-run state where data is already populated).
- extendedWaitUntil:
    visible:
      text: ".*Reconcile Parallels.*|Search parallels.*"
    timeout: 240000

# ============================================================
# RECONCILIATION MODAL — save all matched rows
# Matched section is COLLAPSED by default — can't scroll to a specific row
# inside the modal. Just hit "Save N matched" and find the target row in
# the populated Parallels column via the Search input afterward.
# ============================================================

- runFlow:
    when:
      visible: "Reconcile Parallels"
    commands:
      - scrollUntilVisible:
          element:
            text: ".*Save [0-9]+ matched.*"
          timeout: 10000
      - tapOn:
          text: ".*Save [0-9]+ matched.*"
      - extendedWaitUntil:
          notVisible: "Reconcile Parallels"
          timeout: 30000

# ============================================================
# FIND "Gold Wave Refractors" IN THE PARALLELS COLUMN VIA SEARCH
# Real rendered name is "Gold Wave Refractors" (no "Chrome " prefix on
# parallels, but the "Refractors" suffix is on every Topps Chrome parallel).
# ============================================================

- extendedWaitUntil:
    visible: ".*Search parallels.*"
    timeout: 15000
- scrollUntilVisible:
    element:
      text: ".*Search parallels.*"
    timeout: 10000
- tapOn:
    text: ".*Search parallels.*"
- inputText: "Gold Wave Refractors"
# index: 1 — search input has the typed text at index 0, the row at index 1.
- extendedWaitUntil:
    visible:
      text: "^Gold Wave Refractors$"
      index: 1
    timeout: 10000
- tapOn:
    text: "^Gold Wave Refractors$"
    index: 1

# ============================================================
# CARD CHECKLIST PANEL APPEARS
# ============================================================

- scrollUntilVisible:
    element:
      text: ".*Fetch from Marketplaces.*|Refresh"
    timeout: 15000
- assertVisible:
    text: ".*Fetch from Marketplaces.*|Refresh"

# ============================================================
# FETCH FROM MARKETPLACES
# Button reads "Fetch from Marketplaces" on a fresh checklist, "Refresh"
# once cards exist. Either button triggers the same fetch + save pipeline.
# ============================================================

- tapOn:
    text: ".*Fetch from Marketplaces.*|^Refresh$"

# 90s — real BSC + SL network round-trip for Parallel data.
# If cards-insert.yaml ran first in this cascade, the players/teams tables
# are already populated, so the dialog may not appear. Guard handles both paths.
- extendedWaitUntil:
    visible:
      text: ".*Confirm New Players.*|.*Saved [0-9]+.*"
    timeout: 90000

- runFlow:
    when:
      visible: "Confirm New Players & Teams"
    commands:
      - extendedWaitUntil:
          visible:
            text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
          timeout: 10000
      - tapOn:
          text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
      - extendedWaitUntil:
          notVisible: "Confirm New Players & Teams"
          timeout: 30000

- extendedWaitUntil:
    visible:
      text: ".*Saved [0-9]+ cards.*"
    timeout: 30000

- assertVisible:
    text: ".*Saved 300 cards.*"
