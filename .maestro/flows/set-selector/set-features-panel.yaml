appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Regression — SetAttributesPanel renders and accepts a feature value"
tags:
  - regression
  - set-selector
  - requires:cards-loaded
---
# Regression test for the NEO-38 SetAttributesPanel component.
# (Previously tested SetFeaturesPanel; updated for NEO-38 redesign.)
#
# SetAttributesPanel renders below the MultiSourcePanel whenever a setName-level
# row is active (i.e. the user has selected a set in the Sets column).
# It is COLLAPSIBLE: when a card checklist is on screen (terminal level selected)
# it defaults collapsed showing a summary bar + "Edit attributes" toggle.
# At the setName level (no cards visible) it defaults EXPANDED.
#
# This regression test covers the single critical path:
#   Drill to Topps Chrome → scroll down to SetAttributesPanel →
#   confirm the panel heading "Set attributes" is visible →
#   expand the panel if collapsed (idempotent "Edit attributes" toggle) →
#   type a value in the League input → save on Enter →
#   confirm the toast "Updated N cards" appears.
#
# IMPORTANT — TCDB state:
#   On a fresh CI DB, TCDB enrichment has NOT run yet. The setMetadata section
#   shows "No set metadata yet — pending sync." That's the expected empty state.
#   We assert either that text OR a metadata chip, to handle both fresh and
#   pre-enriched states.
#
# FEATURE VALUE:
#   We write "MLB" to the "League" feature key. This is a Baseball set, so League
#   applies. The propagation engine fans this value to descendant cards that
#   don't already have an override. We don't assert card counts precisely since
#   they depend on how many cards are in the checklist at the time of the test.

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# Drill to Baseball / 2024 / Topps / Topps Chrome. Stop at the Sets level
# (don't select a Variant Type) — the SetFeaturesPanel renders right after
# the set row is selected.
- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000
- extendedWaitUntil:
    visible: "Baseball"
    timeout: 30000
- tapOn: "Baseball"

- extendedWaitUntil:
    visible: ".*Search years.*"
    timeout: 60000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"
- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
    timeout: 30000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"
- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

- extendedWaitUntil:
    visible: ".*Search sets.*"
    timeout: 30000
- tapOn:
    text: ".*Search sets.*"
- inputText: "Topps Chrome"
- extendedWaitUntil:
    visible:
      text: "Topps Chrome"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps Chrome"
    index: 1

# After selecting Topps Chrome, the SetAttributesPanel renders below the
# MultiSourcePanel. Scroll down until the panel heading area is visible.
# At the setName level with no card checklist on screen the panel defaults
# EXPANDED — the "Set attributes" heading is directly visible.
- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 20000

# Scroll to the "Edit attributes" toggle button — it is the collapsed-state
# sentinel, small enough to be reliably centerable, and always rendered
# (both when collapsed and as the idempotent expand entry point).
- scrollUntilVisible:
    element:
      id: "Edit attributes"
    centerElement: true
    timeout: 15000

# IDEMPOTENT EXPAND: At the setName level the panel defaults expanded,
# but a prior test run may have left it collapsed. Tap only if still showing
# "Edit attributes" (i.e. collapsed).
- runFlow:
    when:
      visible:
        id: "Edit attributes"
    commands:
      - tapOn:
          id: "Edit attributes"
      - extendedWaitUntil:
          visible:
            id: "Hide attributes"
          timeout: 5000

# "Hide attributes" is the reliable expanded-state signal. The bare string
# "Set attributes" matches the panel container's aria-label even when collapsed.
- assertVisible:
    id: "Hide attributes"

# The setMetadata area shows either "No set metadata yet" (fresh DB) or chips.
- assertVisible:
    text: ".*No set metadata yet.*|.*Released.*|.*Cards.*|.*TCDB.*"

# The "Will propagate to N cards" preview counter is visible.
- assertVisible:
    text: ".*Will propagate to.*"

# Find the League input (aria-label "Value for League").
# Write a sentinel first to guarantee a state change, then write "MLB".
# This makes the test idempotent even if League was already "MLB".
- scrollUntilVisible:
    element:
      id: "Value for League"
    centerElement: true
    timeout: 10000

# First write: a sentinel value we never intend to keep.
- tapOn:
    id: "Value for League"
- eraseText: 20
- inputText: "Smoke-sentinel"
- pressKey: Enter
# 15 s timeout: propagation patches all descendant cards synchronously in one
# Convex mutation call — with 122+ selectorOption rows + card rows in the set
# the mutation can take several seconds on a cold or loaded Convex preview.
- extendedWaitUntil:
    visible:
      text: ".*Updated [0-9]+ cards.*"
    timeout: 15000

# Second write: the canonical "MLB" value.
- tapOn:
    id: "Value for League"
- eraseText: 20
- inputText: "MLB"
- pressKey: Enter

# The save toast appears: "Updated N cards" (N can be 0 if no cards yet in the set).
# 15 s timeout for the same reason as the sentinel toast above.
# The bare assertVisible after extendedWaitUntil is removed: the toast auto-
# dismisses after 6 s; assertVisible at this point races the auto-dismiss.
- extendedWaitUntil:
    visible:
      text: ".*Updated [0-9]+ cards.*"
    timeout: 15000
