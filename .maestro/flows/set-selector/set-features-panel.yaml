appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Regression — SetFeaturesPanel renders and accepts a feature value"
tags:
  - regression
  - set-selector
  - requires:cards-loaded
---
# Regression test for the NEO-24 SetFeaturesPanel component.
# (Originally named set-features-panel-smoke.yaml; moved to regression because
# it requires the full cascade / cards-loaded prerequisite — too heavy for smoke.)
#
# SetFeaturesPanel renders below the MultiSourcePanel whenever a setName-level
# row is active (i.e. the user has selected a set in the Sets column).
# It shows read-only setMetadata chips (or "No set metadata yet") and editable
# feature rows for each EXPECTED_FEATURES key.
#
# This smoke test covers the single critical path:
#   Drill to Topps Chrome → scroll down to SetFeaturesPanel →
#   confirm the panel heading "Set features" is visible →
#   type a value in the League input → blur to save →
#   confirm the toast "Updated N cards" appears.
#
# IMPORTANT — TCDB state:
#   On a fresh CI DB, TCDB enrichment has NOT run yet. The setMetadata section
#   shows "No set metadata yet — pending sync." That's the expected empty state.
#   We assert either that text OR a metadata chip, to handle both fresh and
#   pre-enriched states.
#
# FEATURE VALUE:
#   We write "MLB" to the "League" feature key. This is a Baseball set, so League
#   applies. The propagation engine fans this value to descendant cards that
#   don't already have an override. We don't assert card counts precisely since
#   they depend on how many cards are in the checklist at the time of the test.

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# Drill to Baseball / 2024 / Topps / Topps Chrome. Stop at the Sets level
# (don't select a Variant Type) — the SetFeaturesPanel renders right after
# the set row is selected.
- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000
- extendedWaitUntil:
    visible: "Baseball"
    timeout: 30000
- tapOn: "Baseball"

- extendedWaitUntil:
    visible: ".*Search years.*"
    timeout: 60000
- tapOn:
    text: ".*Search years.*"
- inputText: "2024"
- extendedWaitUntil:
    visible:
      text: "2024"
      index: 1
    timeout: 10000
- tapOn:
    text: "2024"
    index: 1

- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
    timeout: 30000
- tapOn:
    text: ".*Search manufacturers.*"
- inputText: "Topps"
- extendedWaitUntil:
    visible:
      text: "Topps"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps"
    index: 1

- extendedWaitUntil:
    visible: ".*Search sets.*"
    timeout: 30000
- tapOn:
    text: ".*Search sets.*"
- inputText: "Topps Chrome"
- extendedWaitUntil:
    visible:
      text: "Topps Chrome"
      index: 1
    timeout: 10000
- tapOn:
    text: "Topps Chrome"
    index: 1

# After selecting Topps Chrome, the SetFeaturesPanel renders below the
# MultiSourcePanel. Scroll down until the panel heading is visible.
- extendedWaitUntil:
    visible: "Variant Types"
    timeout: 20000

- scrollUntilVisible:
    element:
      text: "Set features"
    centerElement: true
    timeout: 15000
- assertVisible: "Set features"

# The setMetadata area shows either "No set metadata yet" (fresh DB) or chips.
- assertVisible:
    text: ".*No set metadata yet.*|.*Released.*|.*Cards.*|.*TCDB.*"

# The "Will propagate to N cards" preview counter is visible.
- assertVisible:
    text: ".*Will propagate to.*"

# Find the League input (aria-label "Value for League").
# Write a sentinel first to guarantee a state change, then write "MLB".
# This makes the smoke test idempotent even if League was already "MLB".
- scrollUntilVisible:
    element:
      id: "Value for League"
    centerElement: true
    timeout: 10000

# First write: a sentinel value we never intend to keep.
- tapOn:
    id: "Value for League"
- eraseText: 20
- inputText: "Smoke-sentinel"
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: ".*Updated [0-9]+ cards.*"
    timeout: 10000

# Second write: the canonical "MLB" value.
- tapOn:
    id: "Value for League"
- eraseText: 20
- inputText: "MLB"
- pressKey: Enter

# The save toast appears: "Updated N cards" (N can be 0 if no cards yet in the set).
- extendedWaitUntil:
    visible:
      text: ".*Updated [0-9]+ cards.*"
    timeout: 10000
- assertVisible:
    text: ".*Updated [0-9]+ cards.*"
