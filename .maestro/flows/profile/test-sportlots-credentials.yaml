url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/profile
name: Test SportLots Credentials
tags:
  - credentials
  - profile
---
- launchApp
- extendedWaitUntil:
    visible: "Neon Binder"
    timeout: 45000

# Set up credentials using the reusable flow
- runFlow:
    file: setup-sportlots-credentials.yaml
    env:
      SPORTLOTS_USERNAME: ${SPORTLOTS_USERNAME}
      SPORTLOTS_PASSWORD: ${SPORTLOTS_PASSWORD}

# --- Test the credentials ---
- scrollUntilVisible:
    element:
      text: "Test Credentials"
    timeout: 10000
- tapOn: "Test Credentials"
- extendedWaitUntil:
    visible: ".*SportLots account authenticated successfully.*"
    timeout: 30000

# --- Clean up: clear credentials ---
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    timeout: 10000
- tapOn: "Clear Credentials"
- extendedWaitUntil:
    visible: ".*Yes, Clear.*"
    timeout: 5000
- tapOn: "Yes, Clear"
- extendedWaitUntil:
    visible: ".*Credentials cleared.*"
    timeout: 15000
