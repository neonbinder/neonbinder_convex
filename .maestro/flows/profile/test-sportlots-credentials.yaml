url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/profile&worker=${WORKER_INDEX || "0"}
name: Test SportLots Credentials
tags:
  - credentials
  - profile
  - serial-marketplace
---
- launchApp
- extendedWaitUntil:
    visible: "Neon Binder"
    timeout: 45000

# Use the destructive helper so this flow always tests the full save+auth cycle,
# even if a prior flow left credentials saved in the test account.
- runFlow:
    file: clear-then-setup-sportlots-credentials.yaml
    env:
      SPORTLOTS_USERNAME: ${SPORTLOTS_USERNAME}
      SPORTLOTS_PASSWORD: ${SPORTLOTS_PASSWORD}

# --- Test the credentials ---
- scrollUntilVisible:
    element:
      text: "Test Credentials"
    timeout: 10000
- tapOn: "Test Credentials"
# SportLots authentication via the browser service takes ~50s on local runs.
# Use 90s to match the credential-save timeout.
- extendedWaitUntil:
    visible: ".*SportLots account authenticated successfully.*"
    timeout: 90000

# --- Clean up: clear credentials ---
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    timeout: 10000
- tapOn: "Clear Credentials"
- scrollUntilVisible:
    element:
      text: "Yes, Clear"
    timeout: 15000
- tapOn: "Yes, Clear"
# Wait for confirmation that credentials were cleared from storage.
# The Convex mutation typically completes within a few seconds.
- extendedWaitUntil:
    visible: ".*Credentials cleared.*"
    timeout: 30000
