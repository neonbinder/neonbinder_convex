url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/testing/seed-credentials?redirect=/profile&worker=${WORKER_INDEX || "0"}
name: Test SportLots Credentials
tags:
  - credentials
  - profile
  - serial-marketplace
---
- launchApp
- extendedWaitUntil:
    visible: "Neon Binder"
    timeout: 45000

# The sign-in URL routes through /testing/seed-credentials, which calls the
# auth-scoped seedMyTestCredentials action server-side. The action reads the
# dev BSC/SportLots credentials from Convex server env vars and stores them
# under the signed-in user. No secret passes through Maestro -e env.
# After seeding, /testing/seed-credentials forwards to /profile.
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 30000

# --- Test the credentials ---
# Switch to SportLots tab and tap "Test Credentials".
# The seeded creds are real, so the test should succeed.
- scrollUntilVisible:
    element:
      text: "BuySportsCards Credentials"
    timeout: 30000
- tapOn: "Sportlots"
- scrollUntilVisible:
    element:
      text: ".*Sportlots Credentials.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Test Credentials"
    timeout: 10000
- tapOn: "Test Credentials"
# SportLots authentication via the browser service takes ~50s on local runs.
# Use 90s to match the credential-save timeout.
- extendedWaitUntil:
    visible:
      text: ".*Sportlots account authenticated successfully.*|.*Credentials saved successfully.*"
    timeout: 90000
- assertVisible:
    text: ".*Sportlots account authenticated successfully.*|.*Credentials saved successfully.*"

# --- Verify the Clear Credentials button works ---
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    timeout: 10000
- tapOn: "Clear Credentials"
- scrollUntilVisible:
    element:
      text: "Yes, Clear"
    timeout: 15000
- tapOn: "Yes, Clear"
# Wait for confirmation that credentials were cleared from storage.
- extendedWaitUntil:
    visible: ".*Credentials cleared.*"
    timeout: 30000

# --- Restore credentials via seed-credentials so downstream SL-dependent
# flows on the same worker still have a working session. The seeded creds
# are real and come from server env vars — no secret via Maestro -e.
- openLink: ${APP_URL || "http://localhost:3000"}/testing/seed-credentials?redirect=/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 30000
