appId: com.neonbinder.web
url: ${APP_URL || "https://localhost:3000"}/profile?worker=${WORKER_INDEX || "0"}
name: "Util — Per-worker marketplace credential setup (BSC + SL, idempotent)"
tags:
  - util
---
# Reusable flow for non-cascade tests that need BSC + SportLots credentials
# saved on the calling worker before drilling into the set selector. The
# cascade's `setup.yaml` only runs once and only saves creds on the worker
# it happened to land on (per-worker Clerk users), so any other worker that
# wants to fetch from BSC needs to save creds itself.
#
# Both leaf utils are idempotent: they short-circuit when "Clear Credentials"
# is visible. Cost on a worker that's already been here: ~5s for the two
# /profile loads + idempotency checks. Cost on a fresh worker: one real
# save per platform (~90-120s total on cold Cloud Run).
#
# CALLER CONTRACT:
#   - launchApp already done; signed in.
#   - Env: BSC_USERNAME, BSC_PASSWORD, SPORTLOTS_USERNAME, SPORTLOTS_PASSWORD.
#
# LEAVES BROWSER ON: /profile. Callers that want /set-selector or similar
# should follow up with their own `openLink`.

- openLink: ${APP_URL || "http://localhost:3000"}/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 20000

- runFlow:
    file: setup-bsc-credentials.yaml
    env:
      BSC_USERNAME: ${BSC_USERNAME}
      BSC_PASSWORD: ${BSC_PASSWORD}

# Reload /profile so the page resets to top before SportLots setup.
- openLink: ${APP_URL || "http://localhost:3000"}/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 20000

- runFlow:
    file: setup-sportlots-credentials.yaml
    env:
      SPORTLOTS_USERNAME: ${SPORTLOTS_USERNAME}
      SPORTLOTS_PASSWORD: ${SPORTLOTS_PASSWORD}
