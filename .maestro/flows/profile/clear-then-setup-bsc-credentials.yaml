url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/profile&worker=${WORKER_INDEX || "0"}
name: Clear Then Setup BSC Credentials (destructive)
tags:
  - util
---
# Reusable setup flow for tests that need a guaranteed fresh save+auth.
# ALWAYS clears existing credentials before saving, regardless of current state.
# Use this in cred-test flows (save-bsc-credentials.yaml, test-bsc-credentials.yaml)
# where the test itself is verifying the save UI and must start from a clean slate.
#
# For flows that just need creds to be present (set-selector flows), prefer
# setup-bsc-credentials.yaml which is idempotent and avoids extra marketplace logins.
#
# Assumes caller has already navigated to the profile page and it's loaded.

# Scroll to the credential section heading.
# "BuySportsCards Credentials" is the <h2> rendered when BSC is selected — it
# is always in the DOM and scrolls reliably even on long profile pages.
# 30s — on loaded systems the /profile page may be slow to render.
- scrollUntilVisible:
    element:
      text: "BuySportsCards Credentials"
    timeout: 30000

# Scroll to find Clear Credentials (only rendered when credentials exist).
# Use optional:true so the scroll silently gives up if there are none.
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    timeout: 5000
    optional: true

# If credentials already exist, clear them unconditionally — this flow always
# starts from a clean slate so the full save+auth cycle runs fresh.
- runFlow:
    when:
      visible: "Clear Credentials"
    commands:
      - tapOn: "Clear Credentials"
      # tapOn retries for up to 5-6s before landing; scroll to bring the
      # confirmation panel into view (a prior "Credentials saved" status block
      # can push it below the viewport, and extendedWaitUntil does not scroll).
      - scrollUntilVisible:
          element:
            text: "Yes, Clear"
          timeout: 15000
      - tapOn: "Yes, Clear"
      - extendedWaitUntil:
          visible: ".*Credentials cleared.*"
          timeout: 30000

# Reload /profile so the page resets to the top before scrolling — after the
# Clear Credentials confirmation flow, the page may be scrolled past the
# BSC credential section, and scrollUntilVisible (DOWN) cannot reveal an
# input above the current scroll position.
- openLink: ${APP_URL || "http://localhost:3000"}/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 20000
- scrollUntilVisible:
    element:
      text: "BuySportsCards Credentials"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "username"
    timeout: 10000

# Enter credentials. Scroll to Save Credentials first so the whole form is
# in view — Maestro's scrollUntilVisible stops as soon as the target chip is
# 100% visible, which can leave the password field below the fold when the
# Public Profile section above is populated.
- scrollUntilVisible:
    element:
      text: "Save Credentials"
    timeout: 10000
- tapOn:
    id: "username"
- inputText: "e2e-fake-user"

- tapOn:
    id: "password"
- inputText: "e2e-fake-pass"

# Save
- scrollUntilVisible:
    element:
      text: "Save Credentials"
- tapOn: "Save Credentials"

# Wait for save confirmation. Fake credentials cannot authenticate with the
# real BSC marketplace, so the page shows the "saved but auth failed" banner.
# hasCredentials is set to true before auth is attempted, so the
# "Clear Credentials" button and Clear lifecycle are available regardless.
# 120s — BSC marketplace login round-trip can exceed 30s on Cloud Run cold
# start + 503 retries.
- extendedWaitUntil:
    visible: ".*Credentials were saved.*authentication failed.*"
    timeout: 120000
