url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/testing/reset?redirect=/testing/seed-credentials?redirect=/profile&worker=${WORKER_INDEX || "0"}
name: "Worker bootstrap (light) — sign in as TEST_EMAIL_${WORKER_INDEX}, reset state, seed creds (NO marketplace warm)"
tags:
  - util
---
# Per-worker bootstrap for shards 1+. Runs in Phase 0 of run-e2e-smoke.sh for
# every shard EXCEPT shard 0. Identical to worker-bootstrap.yaml up to the
# credential seed step — signs the worker's Clerk user in, resets their Convex
# state via /testing/reset, then seeds real BSC + SL credentials server-side
# via /testing/seed-credentials.
#
# WHY NO MARKETPLACE WARM HERE: warming BSC/SL Puppeteer sessions (the two
# runFlow steps in worker-bootstrap.yaml) logs in to the shared dev marketplace
# accounts. Under the matrix, shard 0 + shards 1+ would trigger concurrent
# logins to the same BSC/SportLots dev account → 503 errors, exactly the
# failure class the serial-marketplace lane was introduced to prevent. Shard 0
# runs the full worker-bootstrap.yaml (marketplace warm included); all other
# shards run this file instead, which leaves marketplace sessions cold. Flows
# on shards 1+ are auth/dashboard/home/profile — they never need a warm
# Puppeteer session.
#
# run-e2e-smoke.sh selects this file when SHARD_INDEX != 0 (and SHARD_TOTAL > 1).

- launchApp
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 45000
