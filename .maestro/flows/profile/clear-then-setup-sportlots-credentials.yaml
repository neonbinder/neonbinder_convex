url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/profile&worker=${WORKER_INDEX || "0"}
name: Clear Then Setup SportLots Credentials (destructive)
tags:
  - util
---
# Reusable setup flow for tests that need a guaranteed fresh save+auth.
# ALWAYS clears existing credentials before saving, regardless of current state.
# Use this in cred-test flows (save-sportlots-credentials.yaml, test-sportlots-credentials.yaml)
# where the test itself is verifying the save UI and must start from a clean slate.
#
# For flows that just need creds to be present (set-selector flows), prefer
# setup-sportlots-credentials.yaml which is idempotent and avoids extra marketplace logins.
#
# Assumes caller has already navigated to the profile page and it's loaded.

# Scroll to the credential section heading.
# Target "BuySportsCards Credentials" (always-visible <h2>) so the platform
# selector and the select element are both in view before switching to Sportlots.
- scrollUntilVisible:
    element:
      text: "BuySportsCards Credentials"
    timeout: 20000

# Select Sportlots from the platform tablist (rendered as role="tab" buttons —
# see comment in setup-sportlots-credentials.yaml). BuySportsCards is the
# default-selected tab; tap "Sportlots" to switch.
- tapOn: "Sportlots"

# Scroll down to see the credentials form/status
- scrollUntilVisible:
    element:
      text: ".*Sportlots Credentials.*"
    timeout: 10000

# Scroll to find Clear Credentials (only rendered when credentials exist).
# optional:true so the scroll silently gives up if there are none.
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    timeout: 5000
    optional: true

# If credentials already exist, clear them unconditionally — this flow always
# starts from a clean slate so the full save+auth cycle runs fresh.
- runFlow:
    when:
      visible: "Clear Credentials"
    commands:
      - tapOn: "Clear Credentials"
      # tapOn retries for up to 5-6s before landing; allow 15s total for the
      # confirmation dialog to appear after the tap.
      - extendedWaitUntil:
          visible: ".*Yes, Clear.*"
          timeout: 15000
      - tapOn: "Yes, Clear"
      - extendedWaitUntil:
          visible: ".*Credentials cleared.*"
          timeout: 30000

# Reload /profile so the page resets to top, then re-select Sportlots from the
# platform dropdown (defaults to BSC after reload). After Clear Credentials the
# page may be scrolled past the Sportlots credential section, and
# scrollUntilVisible (DOWN) cannot reveal an input above the current position.
- openLink: ${APP_URL || "http://localhost:3000"}/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 20000
- scrollUntilVisible:
    element:
      text: "BuySportsCards Credentials"
    timeout: 20000
# Tap the Sportlots tab in the platform tablist (was a native <select> —
# now role="tab" buttons). Same selector pattern as the "before clear"
# block above and as setup-sportlots-credentials.yaml.
- tapOn: "Sportlots"
- scrollUntilVisible:
    element:
      text: ".*Sportlots Credentials.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      id: "username"
    timeout: 10000

# Enter credentials. Scroll to Save Credentials first so the whole form is
# in view (see note in clear-then-setup-bsc-credentials.yaml for rationale).
- scrollUntilVisible:
    element:
      text: "Save Credentials"
    timeout: 10000
- tapOn:
    id: "username"
- inputText: ${SPORTLOTS_USERNAME}

- tapOn:
    id: "password"
- inputText: ${SPORTLOTS_PASSWORD}

# Save
- scrollUntilVisible:
    element:
      text: "Save Credentials"
- tapOn: "Save Credentials"

# Wait for save confirmation. The profile page auto-authenticates after
# storing credentials, so the success message only appears once SportLots
# cookie-based login completes. Sportlots auth typically takes ~50s; use 90s.
- extendedWaitUntil:
    visible: ".*Credentials saved successfully.*"
    timeout: 90000
