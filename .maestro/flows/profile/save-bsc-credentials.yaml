url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/profile
name: Save and Clear BSC Credentials
tags:
  - credentials
  - profile
  - smoke
---
- launchApp
- extendedWaitUntil:
    visible: "Neon Binder"
    timeout: 45000

# Set up BSC credentials using the reusable flow
- runFlow:
    file: setup-bsc-credentials.yaml
    env:
      BSC_USERNAME: ${BSC_USERNAME}
      BSC_PASSWORD: ${BSC_PASSWORD}

# --- Validation assertions ---

# Verify UI transitioned to "saved" state
- scrollUntilVisible:
    element:
      text: ".*Credentials saved.*"
    timeout: 10000
- assertVisible: ".*Credentials saved.*"

# --- Clear credentials (clean up test state) ---
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    timeout: 10000
- tapOn: "Clear Credentials"
- extendedWaitUntil:
    visible: ".*Yes, Clear.*"
    timeout: 5000
- tapOn: "Yes, Clear"
- extendedWaitUntil:
    visible: ".*Credentials cleared.*"
    timeout: 15000

# Verify UI returned to input state
- scrollUntilVisible:
    element:
      text: ".*Username.*"
    timeout: 10000
