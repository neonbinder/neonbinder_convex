url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/profile&account=new-profile&worker=${WORKER_INDEX || "0"}
name: Save and Clear BSC Credentials
tags:
  - credentials
  - profile
  - serial-marketplace
---
- launchApp
- extendedWaitUntil:
    visible: "Neon Binder"
    timeout: 45000

# Use the destructive helper so this flow always tests the full save cycle,
# even if a prior flow left credentials saved in the test account.
# Fake credentials are used — no real secrets in Maestro env.
# The form-typing + Clear-lifecycle coverage is the purpose of this flow.
- runFlow:
    file: clear-then-setup-bsc-credentials.yaml

# --- Validation assertions ---

# With fake credentials the page shows the auth-failed banner, which confirms
# hasCredentials is true and the "Clear Credentials" UI state is rendered.
# The "Credentials were saved" prefix is always present; the "authentication
# failed" suffix confirms the marketplace login was attempted (not skipped).
# 120s — BSC marketplace login round-trip can exceed 30s on Cloud Run cold
# start + 503 retries. The Convex side no longer warms sessions eagerly, so
# the first real BSC auth attempt after seed happens here.
- scrollUntilVisible:
    element:
      text: ".*Credentials were saved.*"
    timeout: 120000
- assertVisible: ".*Credentials were saved.*"

# --- Clear credentials (clean up test state) ---
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    timeout: 10000
- tapOn: "Clear Credentials"
- extendedWaitUntil:
    visible: ".*Yes, Clear.*"
    timeout: 5000
- tapOn: "Yes, Clear"
- extendedWaitUntil:
    visible: ".*Credentials cleared.*"
    timeout: 15000

# Verify UI returned to input state
- scrollUntilVisible:
    element:
      text: ".*Username.*"
    timeout: 10000
