url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/profile
name: Setup SportLots Credentials (idempotent)
tags:
  - util
---
# Reusable setup flow — called via runFlow from other flows.
# Assumes caller has already navigated to the profile page and it's loaded.
# No validation assertions — only waits for save confirmation.
#
# IDEMPOTENT: If SportLots credentials are already saved ("Clear Credentials"
# button is visible), the flow skips the save entirely. This prevents repeated
# fresh marketplace logins in CI, which would trigger SportLots rate-limiting.
# Use clear-then-setup-sportlots-credentials.yaml when you need a guaranteed
# fresh save (e.g., the cred-test flows).

# Scroll to the credential section
- scrollUntilVisible:
    element:
      text: ".*Select Platform.*"
    timeout: 20000

# Select Sportlots from platform dropdown (BuySportsCards is default)
- tapOn:
    id: "site-select"
- tapOn: "Sportlots"

# Scroll down to see the credentials form/status
- scrollUntilVisible:
    element:
      text: ".*Sportlots Credentials.*"
    timeout: 10000

# Scroll to find Clear Credentials (only rendered when credentials exist).
# optional:true so the scroll silently gives up if there are none —
# `when: visible:` alone only inspects the current viewport, which only
# shows the platform selector at this point in the flow.
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    timeout: 5000
    optional: true

# If SportLots credentials are already saved, no-op — existing creds are good.
- runFlow:
    when:
      visible: "Clear Credentials"
    commands:
      - assertVisible: ".*Sportlots.*"

# If credentials are NOT present, do the full save + auto-auth.
- runFlow:
    when:
      notVisible: "Clear Credentials"
    commands:
      # Wait for username/password form to be visible
      - scrollUntilVisible:
          element:
            text: ".*Sportlots Username.*"
          timeout: 10000
      # Enter credentials. Scroll to Save Credentials first so the whole form
      # is in view (see note in setup-bsc-credentials.yaml for rationale).
      - scrollUntilVisible:
          element:
            text: "Save Credentials"
          timeout: 10000
      - tapOn:
          id: "username"
      - inputText: ${SPORTLOTS_USERNAME}
      - tapOn:
          id: "password"
      - inputText: ${SPORTLOTS_PASSWORD}
      # Save
      - scrollUntilVisible:
          element:
            text: "Save Credentials"
      - tapOn: "Save Credentials"
      # Wait for save confirmation. The profile page auto-authenticates after
      # storing credentials, so the success message only appears once SportLots
      # cookie-based login completes.
      - extendedWaitUntil:
          visible: ".*Credentials saved successfully.*"
          timeout: 60000
