url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/profile&worker=${WORKER_INDEX || "0"}
name: Setup SportLots Credentials (idempotent)
tags:
  - util
---
# Reusable setup flow — called via runFlow from other flows.
# Assumes caller has already navigated to the profile page and it's loaded.
# No validation assertions — only waits for save confirmation.
#
# IDEMPOTENT: If SportLots credentials are already saved ("Clear Credentials"
# button is visible), the flow skips the save entirely. This prevents repeated
# fresh marketplace logins in CI, which would trigger SportLots rate-limiting.
# Use clear-then-setup-sportlots-credentials.yaml when you need a guaranteed
# fresh save (e.g., the cred-test flows).

# Scroll to the credential section heading.
# Target "BuySportsCards Credentials" (always-visible <h2>). Once it's in
# view, the platform selector and its "Select Platform" label are also in
# the viewport, so the next tapOn finds the label reliably.
- scrollUntilVisible:
    element:
      text: "BuySportsCards Credentials"
    timeout: 20000

# Select Sportlots from platform dropdown (BuySportsCards is default).
# Target the <select> by its aria-label "Select Platform" — that's the
# accessible name a screen reader announces, kept in sync with the
# adjacent visible <label> text. Maestro web's `id:` selector resolves to
# either resource-id or aria-label; we use the aria-label here so the
# test references the user-perceived name, not the raw HTML id.
# Tapping the <select> directly (rather than the <label>) is required —
# Maestro's tap on a label does not transfer focus to the associated
# input the way a real browser click does, so the keyboard-pick that
# follows would not see the select as focused.
# Then keyboard-pick the option: Maestro web cannot tap inside a native
# <option> list, but typing the first letter while the <select> is focused
# selects the matching option.
- tapOn:
    id: "Select Platform"
- inputText: "S"

# Scroll down to see the credentials form/status
- scrollUntilVisible:
    element:
      text: ".*Sportlots Credentials.*"
    timeout: 10000

# Scroll to find Clear Credentials (only rendered when credentials exist).
# optional:true so the scroll silently gives up if there are none —
# `when: visible:` alone only inspects the current viewport, which only
# shows the platform selector at this point in the flow.
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    timeout: 5000
    optional: true

# If SportLots credentials are already saved, no-op — existing creds are good.
- runFlow:
    when:
      visible: "Clear Credentials"
    commands:
      - assertVisible: ".*Sportlots.*"

# If credentials are NOT present, do the full save + auto-auth.
- runFlow:
    when:
      notVisible: "Clear Credentials"
    commands:
      # Wait for username/password form to be visible. Scroll UP — the prior
      # optional scroll to "Clear Credentials" leaves the viewport past the
      # form when no creds are saved.
      - scrollUntilVisible:
          element:
            id: "username"
          direction: UP
          timeout: 10000
      # Enter credentials. Scroll to Save Credentials first so the whole form
      # is in view (see note in setup-bsc-credentials.yaml for rationale).
      - scrollUntilVisible:
          element:
            text: "Save Credentials"
          timeout: 10000
      - tapOn:
          id: "username"
      - inputText: ${SPORTLOTS_USERNAME}
      - tapOn:
          id: "password"
      - inputText: ${SPORTLOTS_PASSWORD}
      # Save
      - scrollUntilVisible:
          element:
            text: "Save Credentials"
      - tapOn: "Save Credentials"
      # Wait for save confirmation. The profile page auto-authenticates after
      # storing credentials, so the success message only appears once SportLots
      # cookie-based login completes. Sportlots auth typically takes ~50s; use 90s.
      - extendedWaitUntil:
          visible: ".*Credentials saved successfully.*"
          timeout: 90000
