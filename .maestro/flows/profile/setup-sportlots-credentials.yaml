url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/profile
name: Setup SportLots Credentials
tags:
  - util
---
# Reusable setup flow — called via runFlow from other flows.
# Assumes caller has already navigated to the profile page and it's loaded.
# No validation assertions — only waits for save confirmation.

# Scroll to the credential section
- scrollUntilVisible:
    element:
      text: ".*Select Platform.*"
    timeout: 20000

# Select Sportlots from platform dropdown (BuySportsCards is default)
- tapOn:
    id: "site-select"
- tapOn: "Sportlots"

# Scroll down to see the credentials form/status
- scrollUntilVisible:
    element:
      text: ".*Sportlots Credentials.*"
    timeout: 10000

# Scroll to find Clear Credentials (only rendered when credentials exist).
# optional:true so the scroll silently gives up if there are none —
# `when: visible:` alone only inspects the current viewport, which only
# shows the platform selector at this point in the flow.
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    timeout: 5000
    optional: true

# If credentials already exist from a prior run, clear them first
- runFlow:
    when:
      visible: "Clear Credentials"
    commands:
      - tapOn: "Clear Credentials"
      - extendedWaitUntil:
          visible: ".*Yes, Clear.*"
          timeout: 5000
      - tapOn: "Yes, Clear"
      - extendedWaitUntil:
          visible: ".*Credentials cleared.*"
          timeout: 15000

# Wait for username/password form to be visible
- scrollUntilVisible:
    element:
      text: ".*Sportlots Username.*"
    timeout: 10000

# Enter credentials
- tapOn:
    id: "username"
- inputText: ${SPORTLOTS_USERNAME}

- tapOn:
    id: "password"
- inputText: ${SPORTLOTS_PASSWORD}

# Save
- scrollUntilVisible:
    element:
      text: "Save Credentials"
- tapOn: "Save Credentials"

# Wait for save confirmation
- extendedWaitUntil:
    visible: ".*Credentials saved successfully.*"
    timeout: 30000

# Authenticate to extract session cookies (required for SportLots API calls)
- scrollUntilVisible:
    element:
      text: "Test Credentials"
    timeout: 10000
- tapOn: "Test Credentials"
- extendedWaitUntil:
    visible: ".*SportLots account authenticated successfully.*"
    timeout: 30000
