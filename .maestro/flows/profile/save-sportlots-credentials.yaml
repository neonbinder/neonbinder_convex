url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/profile
name: Save and Clear SportLots Credentials
tags:
  - credentials
  - profile
---
- launchApp
- extendedWaitUntil:
    visible: "Neon Binder"
    timeout: 45000

# Use the destructive helper so this flow always tests the full save+auth cycle,
# even if a prior flow left credentials saved in the test account.
- runFlow:
    file: clear-then-setup-sportlots-credentials.yaml
    env:
      SPORTLOTS_USERNAME: ${SPORTLOTS_USERNAME}
      SPORTLOTS_PASSWORD: ${SPORTLOTS_PASSWORD}

# --- Validation assertions ---

# Verify UI transitioned to "saved" state
- scrollUntilVisible:
    element:
      text: ".*Credentials saved for Sportlots.*"
    timeout: 10000
- assertVisible: ".*Credentials saved for Sportlots.*"

# --- Clear credentials (clean up test state) ---
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    timeout: 10000
- tapOn: "Clear Credentials"
- extendedWaitUntil:
    visible: ".*Yes, Clear.*"
    timeout: 5000
- tapOn: "Yes, Clear"
- extendedWaitUntil:
    visible: ".*Credentials cleared.*"
    timeout: 15000

# Verify UI returned to input state
- scrollUntilVisible:
    element:
      text: ".*Sportlots Username.*"
    timeout: 10000
