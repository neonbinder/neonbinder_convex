url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/profile&account=new-profile&worker=${WORKER_INDEX || "0"}
name: Credentials lifecycle — save, auth-fail, recover, clear (BSC + SportLots)
tags:
  - credentials
  - profile
---
# Full lifecycle test for marketplace credential management on the profile page.
# Uses the isolated "new-profile" Clerk account so its credential state never
# collides with the main worker or other flows.
#
# Covers PER PLATFORM (BSC first, then SportLots):
#   a. Save REAL creds (via seed-credentials) → Test → assert auth SUCCESS
#   b. Clear → enter FAKE creds → Save → assert "saved but auth failed"
#   c. Restore REAL creds (via seed-credentials) → Test → assert auth SUCCESS
#      (proves token re-mint after credential swap — token-invalidation behavior)
#   d. Clear → assert "Credentials cleared" + input form returns
#
# Cross-platform seed coupling: /testing/seed-credentials seeds BOTH BSC and
# SL in one call (the page does not forward a sites= param). The flow accounts
# for this by visiting seed-credentials once before each platform's real-cred
# steps — the second seed call is a no-op for the platform already seeded (the
# action returns skipped=true for existing credentials). After each platform's
# lifecycle we clear its credentials before moving on.
#
# Auth-failed timing: saving fake credentials triggers a full Puppeteer BSC
# login attempt (no cached token — storeSiteCredentials clears it). BSC bot
# challenges and retries can exceed 30s, so we allow 120s. The auth-failed banner is React
# state (transient) — it disappears on navigate, so we must wait for it
# in-place with extendedWaitUntil (no scroll). The "Save Credentials" button
# is positioned WITHOUT centerElement so the form header + status area are
# within the viewport after the form collapses on save.

- launchApp

# The new-profile user is signed in via the URL's redirect chain. Wait for
# /profile to load — "Profile Settings" is the h1 that appears once Clerk auth
# and Convex data are ready.
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 30000

# =========================================================================
# BSC LIFECYCLE
# =========================================================================

# -----------------------------------------------------------------------
# a. Save REAL BSC credentials (via seed-credentials) + verify Test success
# -----------------------------------------------------------------------

# Seed real credentials for the new-profile user. Seeds both BSC + SL;
# only BSC matters for this step. The page auto-redirects to /profile when done.
- openLink: ${APP_URL || "http://localhost:3000"}/testing/seed-credentials?redirect=/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 30000

# BSC is the default tab. Scroll to the credential section heading.
# 30s: the profile page has a long public-profile section above the credential
# area; scrolling from the top can take 15–20s on a loaded page.
- scrollUntilVisible:
    element:
      text: "BuySportsCards Credentials"
    centerElement: true
    timeout: 30000
    waitToSettleTimeoutMs: 1000

# Scroll the Test Credentials button into view and center before tapping.
- scrollUntilVisible:
    element:
      text: "Test Credentials"
    centerElement: true
    waitToSettleTimeoutMs: 1000

- tapOn: "Test Credentials"

# 30s sanctioned exception: cold Puppeteer/SSO BSC login on new-profile.
# Wait for the auth-success banner specifically — Clear is disabled until this
# banner appears (serialized-ops product fix). Dropping the stale
# "Credentials saved successfully" alternative that was accepted before login
# completed (the prior race condition this flow now closes).
- scrollUntilVisible:
    element:
      text: ".*BSC account authenticated successfully.*"
    timeout: 30000
    waitToSettleTimeoutMs: 1000

# -----------------------------------------------------------------------
# b. Change BSC to fake credentials → Save → assert auth-failed banner
# -----------------------------------------------------------------------

# Clear the existing real credentials to expose the input form.
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    centerElement: true
    waitToSettleTimeoutMs: 1000

- tapOn: "Clear Credentials"

- scrollUntilVisible:
    element:
      text: "Yes, Clear"
    centerElement: true
    timeout: 15000
    waitToSettleTimeoutMs: 1000
# Wait for the confirmation button to finish rendering before tapping.
# Maestro can find the element via scroll while it is still animating into
# view (null y-bounds), causing tapOn to throw an NPE. The explicit wait
# ensures the button has fully painted before the tap fires.
# Confirm-clear: plain tapOn (NO index — our rule). The scrollUntilVisible
# above already centered + waited for the button (the proven admin-missing-*
# pattern); no extra wait or index disambiguation needed.
- tapOn: "Yes, Clear"

- extendedWaitUntil:
    visible: ".*Credentials cleared.*"
    timeout: 30000

# After "Credentials cleared" fires, the Convex mutation has completed and
# the credential form is now visible (input form replaced the Edit/Test/Clear
# buttons). The page is already scrolled to the credential section — no reload
# needed. Skipping the /profile reload avoids the CDP mid-render storm that
# occurs when navigating + handling the reactive subscription updates from the
# recent auth-success + clear mutations. Scroll directly to "Save Credentials".
#
# Scroll to the Save Credentials button WITHOUT centerElement. This puts Save
# Credentials near the BOTTOM of the viewport (y≈500), leaving the credential
# section header and the soon-to-appear auth-result banner visible ABOVE it
# (y≈100–250). After form collapse on save, the auth-failed banner will be in
# the viewport — allowing extendedWaitUntil to detect it without scrolling.
- scrollUntilVisible:
    element:
      text: "Save Credentials"
    waitToSettleTimeoutMs: 1000

- tapOn:
    id: "username"
- inputText: "e2e-fake-bsc-user"

- tapOn:
    id: "password"
- inputText: "e2e-fake-bsc-pass"

# Re-scroll to Save Credentials (still without centerElement) to restore the
# above-fold header/status area layout before tapping.
- scrollUntilVisible:
    element:
      text: "Save Credentials"
    waitToSettleTimeoutMs: 1000

- tapOn: "Save Credentials"

# 120s exception: saving fake BSC credentials triggers a full Puppeteer/SSO
# login attempt (no cached token — storeSiteCredentials clears it). BSC bot
# challenges + 503 retries can take 60–90s on a cold Cloud Run instance.
# Use extendedWaitUntil (no scroll) so the viewport stays on the credential
# section where the auth-failed banner renders as React state. Navigating away
# would clear this transient state and make it undetectable.
- extendedWaitUntil:
    visible: ".*Credentials were saved.*authentication failed.*"
    timeout: 120000

# -----------------------------------------------------------------------
# c. Restore REAL BSC credentials → Test → assert auth SUCCESS (recovery)
# -----------------------------------------------------------------------

# Re-seed real credentials. This overwrites the fake creds in the DB AND
# invalidates the cached marketplace token (proving token-invalidation behavior —
# the next Test Credentials call must re-authenticate from scratch).
- openLink: ${APP_URL || "http://localhost:3000"}/testing/seed-credentials?redirect=/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 30000

# 30s: profile page is long; scrolling from top takes 15–20s.
- scrollUntilVisible:
    element:
      text: "BuySportsCards Credentials"
    centerElement: true
    timeout: 30000
    waitToSettleTimeoutMs: 1000

- scrollUntilVisible:
    element:
      text: "Test Credentials"
    centerElement: true
    waitToSettleTimeoutMs: 1000

- tapOn: "Test Credentials"

# 30s sanctioned exception: token was invalidated by the re-seed, so this
# login is cold again (~22s Puppeteer round-trip). Wait for the auth-success
# banner specifically — serialized-ops: Clear is disabled until login completes.
- scrollUntilVisible:
    element:
      text: ".*BSC account authenticated successfully.*"
    timeout: 30000
    waitToSettleTimeoutMs: 1000

# -----------------------------------------------------------------------
# d. Clear BSC credentials → assert cleared + input form returns
# -----------------------------------------------------------------------

# Reload /profile before the Clear step. After a cold Test Credentials login
# (~22s), multiple Convex reactive subscription events flush through the
# React tree for several seconds — during this window, React reconciliation
# leaves some buttons (including "Yes, Clear" in the confirmation dialog)
# with null CDP bounds, causing Maestro's tapOn to throw an NPE. Reloading
# gives the page a fresh, stable render to start from.
- openLink: ${APP_URL || "http://localhost:3000"}/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 30000

- scrollUntilVisible:
    element:
      text: "BuySportsCards Credentials"
    centerElement: true
    timeout: 30000
    waitToSettleTimeoutMs: 1000

- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    centerElement: true
    waitToSettleTimeoutMs: 1000

- tapOn: "Clear Credentials"

- scrollUntilVisible:
    element:
      text: "Yes, Clear"
    centerElement: true
    timeout: 15000
    waitToSettleTimeoutMs: 1000
# Wait for the confirmation button to finish rendering before tapping.
# Maestro can find the element via scroll while it is still animating into
# view (null y-bounds), causing tapOn to throw an NPE. The explicit wait
# ensures the button has fully painted before the tap fires.
# Confirm-clear: plain tapOn (NO index — our rule). The scrollUntilVisible
# above already centered + waited for the button (the proven admin-missing-*
# pattern); no extra wait or index disambiguation needed.
- tapOn: "Yes, Clear"

- extendedWaitUntil:
    visible: ".*Credentials cleared.*"
    timeout: 30000

# The input form re-appears once credentials are cleared. Scroll to the
# username input label to confirm UI returned to the credential-entry state.
- scrollUntilVisible:
    element:
      text: ".*Username.*"
    waitToSettleTimeoutMs: 1000

# =========================================================================
# SPORTLOTS LIFECYCLE
# =========================================================================

# Reload /profile to reset scroll position before switching to the SL tab.
- openLink: ${APP_URL || "http://localhost:3000"}/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 30000

# -----------------------------------------------------------------------
# a. Save REAL SportLots credentials (via seed-credentials) + verify Test success
# -----------------------------------------------------------------------

# Re-seed. Both BSC and SL are seeded — BSC is already clear from step (d)
# above, so BSC gets seeded again (harmless). SL gets its real creds seeded.
- openLink: ${APP_URL || "http://localhost:3000"}/testing/seed-credentials?redirect=/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 30000

# Switch to the SportLots tab. Center the tab button to avoid the CDP
# empty-response flake at the 629px viewport fold edge.
- scrollUntilVisible:
    element:
      text: "Sportlots"
    centerElement: true
    waitToSettleTimeoutMs: 1000

- tapOn: "Sportlots"

- scrollUntilVisible:
    element:
      text: ".*Sportlots Credentials.*"
    timeout: 20000
    waitToSettleTimeoutMs: 1000

- scrollUntilVisible:
    element:
      text: "Test Credentials"
    centerElement: true
    waitToSettleTimeoutMs: 1000

- tapOn: "Test Credentials"

# 30s sanctioned exception: cold Puppeteer/SSO SportLots login on new-profile.
# Wait for the auth-success banner specifically — serialized-ops: Clear is
# disabled until login completes (drops stale "Credentials saved" alternative).
# Using extendedWaitUntil (non-scrolling) to keep the viewport stable after the
# centered "Test Credentials" tap. scrollUntilVisible for the banner repositions
# the viewport, pushing credential buttons to y≈36 (sticky-header zone) and
# making the "Yes, Clear" confirmation dialog inaccessible at y≈19.
- extendedWaitUntil:
    visible: ".*Sportlots account authenticated successfully.*"
    timeout: 30000

# -----------------------------------------------------------------------
# b. Change SportLots to fake credentials → Save → assert auth-failed banner
# -----------------------------------------------------------------------

- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    centerElement: true
    waitToSettleTimeoutMs: 1000

- tapOn: "Clear Credentials"

- scrollUntilVisible:
    element:
      text: "Yes, Clear"
    centerElement: true
    timeout: 15000
    waitToSettleTimeoutMs: 1000
# Wait for the confirmation button to finish rendering before tapping.
# Maestro can find the element via scroll while it is still animating into
# view (null y-bounds), causing tapOn to throw an NPE. The explicit wait
# ensures the button has fully painted before the tap fires.
# Confirm-clear: plain tapOn (NO index — our rule). The scrollUntilVisible
# above already centered + waited for the button (the proven admin-missing-*
# pattern); no extra wait or index disambiguation needed.
- tapOn: "Yes, Clear"

- extendedWaitUntil:
    visible: ".*Credentials cleared.*"
    timeout: 30000

# Reload /profile to reset scroll position and re-select the SL tab
# from a clean viewport state after the Clear confirmation block.
- openLink: ${APP_URL || "http://localhost:3000"}/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 30000

- scrollUntilVisible:
    element:
      text: "Sportlots"
    centerElement: true
    waitToSettleTimeoutMs: 1000

- tapOn: "Sportlots"

- scrollUntilVisible:
    element:
      text: ".*Sportlots Credentials.*"
    timeout: 20000
    waitToSettleTimeoutMs: 1000

# Save Credentials WITHOUT centerElement — keeps the form header + status
# area visible above it in the viewport so the auth-failed banner is in-view.
- scrollUntilVisible:
    element:
      text: "Save Credentials"
    waitToSettleTimeoutMs: 1000

- tapOn:
    id: "username"
- inputText: "e2e-fake-sl-user"

- tapOn:
    id: "password"
- inputText: "e2e-fake-sl-pass"

- scrollUntilVisible:
    element:
      text: "Save Credentials"
    waitToSettleTimeoutMs: 1000

- tapOn: "Save Credentials"

# 120s exception: SportLots auth failure still goes through the browser
# service's session check. Allow 120s for parity with BSC and Cloud Run
# cold-start scenarios. extendedWaitUntil keeps the viewport on the
# credential section where the auth-failed banner renders.
- extendedWaitUntil:
    visible: ".*Credentials were saved.*authentication failed.*"
    timeout: 120000

# -----------------------------------------------------------------------
# c. Restore REAL SportLots credentials → Test → assert auth SUCCESS (recovery)
# -----------------------------------------------------------------------

- openLink: ${APP_URL || "http://localhost:3000"}/testing/seed-credentials?redirect=/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 30000

- scrollUntilVisible:
    element:
      text: "Sportlots"
    centerElement: true
    waitToSettleTimeoutMs: 1000

- tapOn: "Sportlots"

- scrollUntilVisible:
    element:
      text: ".*Sportlots Credentials.*"
    timeout: 20000
    waitToSettleTimeoutMs: 1000

- scrollUntilVisible:
    element:
      text: "Test Credentials"
    centerElement: true
    waitToSettleTimeoutMs: 1000

- tapOn: "Test Credentials"

# 30s sanctioned exception: token invalidated by re-seed — cold login (~22s).
# Wait for the auth-success banner specifically — serialized-ops: Clear is
# disabled until login completes (drops stale "Credentials saved" alternative).
# Using extendedWaitUntil (non-scrolling) for consistency with SL step (a).
- extendedWaitUntil:
    visible: ".*Sportlots account authenticated successfully.*"
    timeout: 30000

# -----------------------------------------------------------------------
# d. Clear SportLots credentials → assert cleared + input form returns
# -----------------------------------------------------------------------

# Reload /profile before the Clear step — same reactive-storm fix as BSC
# step (d): a cold SL Test Credentials floods Convex reactive subscriptions,
# leaving "Yes, Clear" with null CDP bounds during React reconciliation.
- openLink: ${APP_URL || "http://localhost:3000"}/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 30000

# Re-select the SportLots tab after the reload (default tab is BSC).
- scrollUntilVisible:
    element:
      text: "Sportlots"
    centerElement: true
    waitToSettleTimeoutMs: 1000

- tapOn: "Sportlots"

- scrollUntilVisible:
    element:
      text: ".*Sportlots Credentials.*"
    timeout: 20000
    waitToSettleTimeoutMs: 1000

- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    centerElement: true
    waitToSettleTimeoutMs: 1000

- tapOn: "Clear Credentials"

- scrollUntilVisible:
    element:
      text: "Yes, Clear"
    centerElement: true
    timeout: 15000
    waitToSettleTimeoutMs: 1000
# Wait for the confirmation button to finish rendering before tapping.
# Maestro can find the element via scroll while it is still animating into
# view (null y-bounds), causing tapOn to throw an NPE. The explicit wait
# ensures the button has fully painted before the tap fires.
# Confirm-clear: plain tapOn (NO index — our rule). The scrollUntilVisible
# above already centered + waited for the button (the proven admin-missing-*
# pattern); no extra wait or index disambiguation needed.
- tapOn: "Yes, Clear"

- extendedWaitUntil:
    visible: ".*Credentials cleared.*"
    timeout: 30000

# Verify UI returned to input state — the SportLots username label appears
# once credentials are cleared.
- scrollUntilVisible:
    element:
      text: ".*Sportlots Username.*"
    waitToSettleTimeoutMs: 1000
