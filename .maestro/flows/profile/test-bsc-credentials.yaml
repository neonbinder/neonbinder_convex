url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/profile&worker=${WORKER_INDEX || "0"}
name: Test BSC Credentials
tags:
  - credentials
  - profile
  - serial-marketplace
---
- launchApp
- extendedWaitUntil:
    visible: "Neon Binder"
    timeout: 45000

# Use the destructive helper so this flow always tests the full save+auth cycle,
# even if a prior flow left credentials saved in the test account.
- runFlow:
    file: clear-then-setup-bsc-credentials.yaml
    env:
      BSC_USERNAME: ${BSC_USERNAME}
      BSC_PASSWORD: ${BSC_PASSWORD}

# --- Test the credentials ---
- scrollUntilVisible:
    element:
      text: "Test Credentials"
    timeout: 10000
- tapOn: "Test Credentials"
# BSC authentication via the browser service takes ~65s on local runs.
# Use 120s to match the credential-save timeout.
- extendedWaitUntil:
    visible: ".*BSC account authenticated successfully.*"
    timeout: 120000

# --- Verify the Clear Credentials button works ---
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    timeout: 10000
- tapOn: "Clear Credentials"
- scrollUntilVisible:
    element:
      text: "Yes, Clear"
    timeout: 15000
- tapOn: "Yes, Clear"
- extendedWaitUntil:
    visible: ".*Credentials cleared.*"
    timeout: 30000

# --- Restore credentials so downstream BSC-dependent flows on the same
# worker still have a working token. Without this, any flow that depends
# on BSC after this one (e.g. checklist-renders-rich-fields) fails because
# getBscToken returns null — the user's token slot is empty until the next
# worker-bootstrap. We've already exercised the full save + test + clear
# cycle above; this restoration just leaves the worker in a usable state.
#
# Navigate back to /profile first — the prior clear-confirmation leaves
# the viewport scrolled DOWN past the "BuySportsCards Credentials" anchor
# that setup-bsc-credentials scrolls DOWN to find. Same pattern documented
# in worker-bootstrap.yaml.
- openLink: ${APP_URL || "http://localhost:3000"}/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 20000
- runFlow:
    file: setup-bsc-credentials.yaml
    env:
      BSC_USERNAME: ${BSC_USERNAME}
      BSC_PASSWORD: ${BSC_PASSWORD}
