url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/profile&worker=${WORKER_INDEX || "0"}
name: Test BSC Credentials
tags:
  - credentials
  - profile
---
- launchApp
- extendedWaitUntil:
    visible: "Neon Binder"
    timeout: 45000

# Credentials are seeded ONCE per worker by the Phase-0 bootstrap
# (worker-bootstrap.yaml). This flow reuses those seeded credentials —
# it does not re-seed on launch. Re-seeding would overwrite the cached
# marketplace session token, causing the Test Credentials step to stall
# on a cold Puppeteer login.
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 30000

# --- Test the credentials ---
# Scroll to the BSC credential section and tap "Test Credentials".
# The seeded creds are real, so the test should succeed.
- scrollUntilVisible:
    element:
      text: "BuySportsCards Credentials"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Test Credentials"
    timeout: 10000
- tapOn: "Test Credentials"
# 30s exception: a COLD marketplace login is a real ~22s Puppeteer/SSO round-trip (cached is <1s).
# This is the ONE sanctioned >10s wait (the standing rule is 10s) — do NOT copy this ceiling elsewhere.
# scrollUntilVisible both waits for the element AND scrolls it into the viewport (the success
# banner renders below the button, just off the visible fold), so the assertVisible that follows
# is guaranteed to see it without a separate extendedWaitUntil.
- scrollUntilVisible:
    element:
      text: ".*BSC account authenticated successfully.*|.*Credentials saved successfully.*"
    timeout: 30000
- assertVisible:
    text: ".*BSC account authenticated successfully.*|.*Credentials saved successfully.*"

# --- Verify the Clear Credentials button works ---
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    timeout: 10000
- tapOn: "Clear Credentials"
- scrollUntilVisible:
    element:
      text: "Yes, Clear"
    timeout: 15000
- tapOn: "Yes, Clear"
- extendedWaitUntil:
    visible: ".*Credentials cleared.*"
    timeout: 30000

# --- Restore credentials via seed-credentials so downstream BSC-dependent
# flows on the same worker still have a working token. The seeded creds
# are real and come from server env vars — no secret via Maestro -e.
- openLink: ${APP_URL || "http://localhost:3000"}/testing/seed-credentials?redirect=/profile
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 30000
