url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/profile&worker=${WORKER_INDEX || "0"}
name: Setup BSC Credentials (idempotent)
tags:
  - util
---
# Reusable setup flow — called via runFlow from other flows.
# Assumes caller has already navigated to the profile page and it's loaded.
# No validation assertions — only waits for save confirmation.
#
# IDEMPOTENT: If BSC credentials are already saved ("Clear Credentials" button
# is visible), the flow skips the save entirely. This prevents repeated fresh
# marketplace logins when multiple flows run in the same CI suite, which would
# trigger BSC rate-limiting. Use clear-then-setup-bsc-credentials.yaml when
# you need a guaranteed fresh save (e.g., the cred-test flows).

# Scroll to the credential section heading.
# "BuySportsCards Credentials" is the <h2> rendered when BSC is selected — it
# is always in the DOM and scrolls reliably even on long profile pages.
# The "Select Platform" <label> sits inside a <label> element that Maestro's
# web hierarchy sometimes misses on tall pages, causing 30-second timeouts.
# 30s — on loaded systems after large DB writes the /profile page may be slow
# to render; give extra time for the section heading to scroll into view.
- scrollUntilVisible:
    element:
      text: "BuySportsCards Credentials"
    timeout: 30000

# Scroll to find Clear Credentials (only rendered when credentials exist).
# Use optional:true so the scroll silently gives up if there are none —
# using `when: visible:` alone only inspects the current viewport, which
# only shows the platform selector at this point in the flow.
- scrollUntilVisible:
    element:
      text: "Clear Credentials"
    timeout: 5000
    optional: true

# If credentials are NOT present, do the full save + auto-auth.
- runFlow:
    when:
      notVisible: "Clear Credentials"
    commands:
      # Wait for username/password form to be visible. The prior optional
      # scroll to "Clear Credentials" leaves the viewport scrolled DOWN past
      # the form when no creds are saved (the credential section is short).
      # Scroll UP to find the username input.
      - scrollUntilVisible:
          element:
            id: "username"
          direction: UP
          timeout: 10000
      # Enter credentials. Scroll to Save Credentials first so the whole form
      # is in view — Maestro's scrollUntilVisible stops as soon as the target
      # chip is 100% visible, which can leave the password field below the fold
      # when the Public Profile section above is populated.
      - scrollUntilVisible:
          element:
            text: "Save Credentials"
          timeout: 10000
      - tapOn:
          id: "username"
      - inputText: ${BSC_USERNAME}
      - tapOn:
          id: "password"
      - inputText: ${BSC_PASSWORD}
      # Save
      - scrollUntilVisible:
          element:
            text: "Save Credentials"
      - tapOn: "Save Credentials"
      # Wait for save confirmation. The profile page auto-authenticates after
      # storing credentials, so the success message only appears once the BSC
      # Puppeteer login completes — Cloud Run cold-starts can take 20-30s.
      # Local runs have recorded BSC auth taking ~65s; use 120s for safety.
      - extendedWaitUntil:
          visible: ".*Credentials saved successfully.*"
          timeout: 120000
