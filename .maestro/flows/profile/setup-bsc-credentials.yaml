url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/profile
name: Setup BSC Credentials
tags:
  - util
---
# Reusable setup flow — called via runFlow from other flows.
# Assumes caller has already navigated to the profile page and it's loaded.
# No validation assertions — only waits for save confirmation.

# Scroll to the credential section
- scrollUntilVisible:
    element:
      text: ".*Select Platform.*"
    timeout: 20000

# BuySportsCards is the default platform — verify it's selected
- assertVisible: ".*BuySportsCards.*"

# If BSC credentials already exist from a prior run, clear them first
- runFlow:
    when:
      visible: ".*Credentials saved.*"
    commands:
      - scrollUntilVisible:
          element:
            text: "Clear Credentials"
          timeout: 10000
      - tapOn: "Clear Credentials"
      - extendedWaitUntil:
          visible: ".*Yes, Clear.*"
          timeout: 5000
      - tapOn: "Yes, Clear"
      - extendedWaitUntil:
          visible: ".*Credentials cleared.*"
          timeout: 15000

# Wait for username/password form to be visible
- scrollUntilVisible:
    element:
      text: ".*BuySportsCards Username.*"
    timeout: 10000

# Enter credentials
- tapOn:
    id: "username"
- inputText: ${BSC_USERNAME}

- tapOn:
    id: "password"
- inputText: ${BSC_PASSWORD}

# Save
- scrollUntilVisible:
    element:
      text: "Save Credentials"
- tapOn: "Save Credentials"

# Wait for save confirmation (no further assertions)
- extendedWaitUntil:
    visible: ".*Credentials saved successfully.*"
    timeout: 30000
