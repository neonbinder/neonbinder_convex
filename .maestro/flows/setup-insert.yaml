appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Setup (2/3) — pre-sync Insert variants + Future Stars cards (2024 Topps Chrome)"
tags:
  - setup
  - regression
---
# ════════════════════════════════════════════════════════════════════════════
# GLOBAL SETUP TRACK — flow 2 of 3. Runs AFTER setup.yaml, as worker 0.
#
# Pre-syncs the Insert variant data so the Insert feature tests read warm data:
#   - selects "Insert" → the Inserts column auto-syncs → cross-platform
#     ReconciliationModal opens → SAVE all matched rows (writes Future Stars +
#     siblings into the Inserts column)
#   - fetches the "Future Stars" checklist (~20 cards) so the card test is warm
#
# WHY A SEPARATE FLOW (not appended to setup.yaml): switching variant types in
# place after a card fetch is unreliable, and a 2nd in-session openLink restores
# the SPA's prior deep selection. A fresh flow = fresh browser context = clean
# slate, so the fast-drill is reliable (the proven cascade pattern). This flow's
# launchApp re-runs sign-in only (no global reset), and the hierarchy + variant
# types were already synced by setup.yaml, so the drill is fast.
#
# TIMEOUT POLICY: like setup.yaml, this is a warm-track flow — the 240s sync wait
# absorbs the first Insert BSC+SL fetch. Do NOT copy that ceiling into feature
# flows; they read this warm data and must respond in <7s.
# ════════════════════════════════════════════════════════════════════════════

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 30000

# Warm worker 0's marketplace sessions so the Insert auto-sync uses a live
# session instead of stalling on a cold login mid-drill.
- runFlow:
    file: util/util-login-to-bsc.yaml
- runFlow:
    file: util/util-login-to-sportlots.yaml

# Fast-drill to Topps Chrome variant types (data already in DB from setup.yaml).
- runFlow:
    file: set-selector/util-drill-to-2024-topps-chrome.yaml

# ── SELECT INSERT — auto-sync fires on the empty Inserts column ──────────────
- extendedWaitUntil:
    visible: "Insert"
- scrollUntilVisible:
    element:
      text: "Insert"
    centerElement: true
    timeout: 10000
- tapOn: "Insert"
- extendedWaitUntil:
    visible: "Inserts"
    timeout: 20000

# Auto-sync → cross-platform ReconciliationModal OR already-populated.
# 240s = warm cost (first Insert BSC+SL fetch), sanctioned in setup-track only.
- extendedWaitUntil:
    visible:
      text: ".*Reconcile Inserts.*|.*Search inserts.*"
    timeout: 240000
- runFlow:
    when:
      visible: "Reconcile Inserts"
    commands:
      # ReconciliationModal STRUCTURE coverage — folded in from the retired
      # insert-variant-flow / cascade/sets-inserts (which couldn't survive a
      # pre-saved column). Verify the modal before saving the matched rows.
      - assertVisible:
          text: ".*[0-9]+ matched.*"
      - assertVisible:
          text: ".*BSC-only.*"
      - assertVisible:
          text: ".*SL-only.*"
      - scrollUntilVisible:
          element:
            text: ".*Unmatched.*"
      - assertVisible:
          text: ".*BSC.*"
      - assertVisible:
          text: ".*SportLots.*"
      - scrollUntilVisible:
          element:
            text: ".*Save [0-9]+ matched.*"
      - tapOn:
          text: ".*Save [0-9]+ matched.*"
      - extendedWaitUntil:
          notVisible: "Reconcile Inserts"
          timeout: 30000

# ── PICK "Future Stars" (below:{id} targets the result row, not the input) ───
- extendedWaitUntil:
    visible: ".*Search inserts.*"
    timeout: 15000
- scrollUntilVisible:
    element:
      text: ".*Search inserts.*"
    timeout: 10000
- tapOn:
    text: ".*Search inserts.*"
- inputText: "Future Stars"
- extendedWaitUntil:
    visible:
      text: "^Future Stars$"
      below:
        id: "Search inserts"
    timeout: 10000
- tapOn:
    text: "^Future Stars$"
    below:
      id: "Search inserts"

# ── FETCH THE CHECKLIST ─────────────────────────────────────────────────────
- scrollUntilVisible:
    element:
      text: ".*Fetch from Marketplaces.*|Refresh"
    visibilityPercentage: 50
    timeout: 15000
- tapOn:
    text: ".*Fetch from Marketplaces.*|^Refresh$"
- extendedWaitUntil:
    visible:
      text: ".*Confirm New Players.*|.*Saved [0-9]+.*"
    timeout: 90000
- runFlow:
    when:
      visible: "Confirm New Players & Teams"
    commands:
      - extendedWaitUntil:
          visible:
            text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
          timeout: 10000
      - tapOn:
          text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
      - extendedWaitUntil:
          notVisible: "Confirm New Players & Teams"
          timeout: 30000
# Strict count — a card checklist is immutable once produced, so "Saved 20 cards"
# is a fixed fact. If this number is ever wrong it's a real fetch/save regression,
# not "marketplace drift" — do NOT loosen it to hide a bug.
- extendedWaitUntil:
    visible:
      text: ".*Saved 20 cards.*"
    timeout: 30000
