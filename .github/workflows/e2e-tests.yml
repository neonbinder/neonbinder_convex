name: E2E Tests

on:
  pull_request:
  workflow_dispatch:

# Cancel any in-flight run on this PR/branch when a newer commit arrives.
# Two concurrent runs share the same Convex dev deployment, browser service,
# and test users — concurrent /login/bsc calls for the same BSC account
# reliably trigger a 503 on the slower request. One active run per branch.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# action-junit-report needs checks:write to publish the per-flow PR check,
# and pull-requests:write to add its summary comment. Repo default is read-only.
permissions:
  contents: read
  checks: write
  pull-requests: write

# ─── Sharded matrix (NEO-46) ──────────────────────────────────────────────────
# We deploy main to prod on every merge, so the FULL smoke+regression suite is
# the merge-blocking gate. Running it on one free 4-core runner starves the CPU
# (3 browsers/4 vCPUs) — the p=2 stopgap is safe but slow (~50 min). Instead we
# shard the suite across multiple FREE ubuntu-latest runners (public repos get
# ~20 concurrent free jobs), each running MAESTRO_PARALLELISM=2 = no starvation,
# $0 compute.
#
#   setup  → resolve the PR's Vercel preview URL once (shared by all shards)
#   e2e    → strategy.matrix.shard: each runner runs run-e2e-smoke.sh with its
#            SHARD_INDEX / SHARD_TOTAL. Shard 0 owns the serial backbone
#            (isolated + marketplace + dep-graph cascade); other shards run a
#            disjoint slice of the parallel-safe independent flows. The legs'
#            own exit codes are the gate (a shard with any FAIL exits 1 → red).
#   report → merge every shard's JUnit into ONE "Maestro E2E" check and ONE
#            sticky comment (if: always, so it runs even when a shard fails).
#
# To widen (e.g. 2×2 → 4×2): extend matrix.shard to [0,1,2,3], bump SHARD_TOTAL
# to "4", and provision TEST_EMAIL_4..7 / NEW_PROFILE_TEST_EMAIL_4..7. That's it.
jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      url: ${{ steps.vercel-preview.outputs.url }}
    steps:
      - name: Resolve Vercel preview URL
        id: vercel-preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        # Poll the GitHub Deployments API for the Vercel-created preview URL.
        # Skips the HTTP 200-poll that patrickedqvist/wait-for-vercel-preview
        # performs (~5 min of 401s every run under Vercel Deployment
        # Protection, since the Actions runner has no SSO cookie and the
        # action can't inject x-vercel-protection-bypass). Readiness is
        # handled by the next step using the bypass header.
        run: |
          for attempt in $(seq 1 60); do
            deployment_id=$(gh api "repos/$GITHUB_REPOSITORY/deployments?sha=$SHA&per_page=100" \
              --jq '[.[] | select(.creator.login == "vercel[bot]")] | sort_by(.created_at) | reverse | .[0].id // empty')
            if [ -n "$deployment_id" ]; then
              url=$(gh api "repos/$GITHUB_REPOSITORY/deployments/$deployment_id/statuses" \
                --jq '[.[] | select(.state == "success")] | .[0] | (.environment_url // .target_url // empty)')
              if [ -n "$url" ]; then
                echo "Vercel preview URL: $url"
                echo "url=$url" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              failed=$(gh api "repos/$GITHUB_REPOSITORY/deployments/$deployment_id/statuses" \
                --jq '[.[] | select(.state == "failure" or .state == "error")] | length')
              if [ "${failed:-0}" -gt 0 ]; then
                echo "Vercel deployment ${deployment_id} reported failure/error state — aborting."
                exit 1
              fi
            fi
            echo "attempt $attempt/60: Vercel deployment not yet ready for $SHA — retrying in 5s"
            sleep 5
          done
          echo "Timed out (5 min) waiting for a successful Vercel deployment on $SHA."
          exit 1

      - name: Wait for preview to respond (with bypass)
        env:
          PREVIEW_URL: ${{ steps.vercel-preview.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          if [ -z "$PREVIEW_URL" ]; then
            echo "No preview URL discovered."
            exit 1
          fi
          echo "Polling $PREVIEW_URL with bypass header..."
          for attempt in $(seq 1 60); do
            status=$(curl -sS -o /dev/null -w "%{http_code}" -H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" "$PREVIEW_URL/" || echo 000)
            if [ "$status" = "200" ]; then
              echo "Preview ready after $attempt attempt(s)."
              exit 0
            fi
            echo "attempt $attempt: HTTP $status — retrying in 5s"
            sleep 5
          done
          echo "Preview never returned 200."
          exit 1

  e2e:
    needs: setup
    runs-on: ubuntu-latest
    # Shard 0 still runs the full serial backbone in Phase A (it only offloads a
    # handful of trivial independent flows), so its wall-clock stays ~50 min —
    # keep the 60-min ceiling. Phase B (fixture-seeding) shrinks the backbone and
    # this can drop. Shards 1+ finish in a few minutes.
    timeout-minutes: 60
    strategy:
      # One shard failing must NOT cancel the others — we want every shard's
      # results in the merged report.
      fail-fast: false
      matrix:
        shard: [0, 1]
    env:
      # SHARD_TOTAL must equal the length of matrix.shard above. Change both
      # together when widening the matrix.
      SHARD_TOTAL: "2"
    steps:
      - uses: actions/checkout@v4

      - name: Start bypass-injecting proxy
        env:
          PREVIEW_URL: ${{ needs.setup.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          # Tiny Node proxy: forwards localhost:3000 → Vercel preview with the
          # x-vercel-protection-bypass header injected on every request. Lets
          # Maestro flows use APP_URL=http://localhost:3000 without any flow
          # rewrites (which would hurt PO readability). Each shard runs on its
          # own runner, so each needs its own localhost:3000 proxy.
          if [ -z "$PREVIEW_URL" ]; then
            echo "No preview URL from setup job."
            exit 1
          fi
          cat > /tmp/vercel-proxy.js <<'EOF'
          const http = require('http');
          const https = require('https');
          const { URL } = require('url');

          const upstream = new URL(process.env.PREVIEW_URL);
          const bypass = process.env.VERCEL_AUTOMATION_BYPASS_SECRET;
          const PORT = 3000;

          const server = http.createServer((req, res) => {
            const opts = {
              hostname: upstream.hostname,
              port: 443,
              path: req.url,
              method: req.method,
              headers: {
                ...req.headers,
                host: upstream.hostname,
                'x-vercel-protection-bypass': bypass,
              },
            };
            const upstreamReq = https.request(opts, upstreamRes => {
              res.writeHead(upstreamRes.statusCode || 500, upstreamRes.headers);
              upstreamRes.pipe(res);
            });
            upstreamReq.on('error', err => {
              console.error('proxy error:', err.message);
              res.statusCode = 502;
              res.end('proxy error');
            });
            req.pipe(upstreamReq);
          });

          server.listen(PORT, () => {
            console.log(`Bypass proxy listening on http://localhost:${PORT} -> ${upstream.origin}`);
          });
          EOF
          node /tmp/vercel-proxy.js &
          echo "PROXY_PID=$!" >> $GITHUB_ENV
          # Wait for proxy to be reachable
          for i in $(seq 1 20); do
            if curl -sS -o /dev/null "http://localhost:3000/" ; then
              echo "Proxy ready."
              break
            fi
            sleep 0.5
          done

      - name: Read pinned versions
        id: pins
        run: |
          # Single source of truth for Maestro + Java versions. Local devs
          # read the same files via setup-maestro.sh.
          maestro_version="$(tr -d '[:space:]' < .maestro/version)"
          java_version="$(tr -d '[:space:]' < .java-version)"
          echo "maestro=${maestro_version}" >> "$GITHUB_OUTPUT"
          echo "java=${java_version}" >> "$GITHUB_OUTPUT"
          echo "Pinned Maestro: ${maestro_version}"
          echo "Pinned Java:    ${java_version}"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.pins.outputs.java }}

      - uses: browser-actions/setup-chrome@v1

      - name: Start Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1280x1024x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Install Maestro CLI
        env:
          MAESTRO_VERSION: ${{ steps.pins.outputs.maestro }}
          # Suppress the first-run analytics opt-in banner so `maestro --version`
          # returns just the version string. Without this, the version-match
          # check below sees multi-line output and fails even when the version
          # is correct. Also propagate to downstream steps via GITHUB_ENV.
          MAESTRO_CLI_NO_ANALYTICS: "1"
        run: |
          # Pin Maestro to .maestro/version. The installer reads MAESTRO_VERSION
          # to grab a specific tag instead of latest — without this, CI drifts
          # away from local boxes as upstream releases land.
          # pipefail so a curl failure (e.g. 504 from the Maestro CDN) surfaces
          # as a non-zero exit — the install script prints the error but exits 0.
          set -o pipefail
          curl -fLsS --retry 5 --retry-all-errors --retry-delay 10 \
            "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          echo "MAESTRO_CLI_NO_ANALYTICS=1" >> $GITHUB_ENV
          # Verify the binary is actually installed AND matches the pin before
          # we spend 30 min in downstream steps discovering it doesn't. Extract
          # just the semver line with grep — defensive against any leftover
          # banner output if MAESTRO_CLI_NO_ANALYTICS isn't honored.
          installed="$("$HOME/.maestro/bin/maestro" --version | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+$' | tail -1)"
          if [ "$installed" != "$MAESTRO_VERSION" ]; then
            echo "::error::Maestro installer returned '${installed}' but pin is '${MAESTRO_VERSION}'"
            exit 1
          fi
          echo "Maestro ${installed} ready (pinned)"

      - name: Run Maestro E2E suite — shard ${{ matrix.shard }}/${{ env.SHARD_TOTAL }}
        env:
          APP_URL: http://localhost:3000
          # NO secrets are passed to Maestro (NEO-29). Maestro serializes the
          # full -e env map into its uploaded debug artifacts, so any secret
          # there leaks into the public CI artifact. Marketplace creds + per-user
          # reset are handled browser-side: flows route their sign-in through
          # /testing/reset (resetMyTestState) and /testing/seed-credentials
          # (seedMyTestCredentials), both auth-scoped Convex functions that read
          # the dev creds from Convex server env vars — never via -e.
          #
          # Sharding (NEO-46): this shard runs run-e2e-smoke.sh with its index.
          # Shard 0 owns the isolated + marketplace + dep-graph backbone; other
          # shards run a disjoint slice of independent flows at GLOBAL worker
          # indices SHARD_INDEX*PARALLELISM .. +PARALLELISM-1 (distinct
          # TEST_EMAIL_${N} per shard, no cross-runner collision).
          SHARD_INDEX: ${{ matrix.shard }}
          # PARALLELISM=2 → 2 headless Chrome on a 4-vCPU runner = no CPU
          # starvation (the failure mode p=3 hit on PR #50).
          MAESTRO_PARALLELISM: "2"
          REPORT_DIR: maestro-report
        # The legs' own exit codes are the gate: npm run test:e2e exits 1 if any
        # flow fails, turning this matrix leg red.
        run: npm run test:e2e

      - name: Upload Maestro report — shard ${{ matrix.shard }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report-shard-${{ matrix.shard }}
          # Keep junit + failure screenshots + summary, but exclude the files
          # that serialize Maestro's `-e` env map (NEO-29 defense-in-depth) and
          # the verbose per-worker home dirs.
          path: |
            maestro-report/
            !maestro-report/**/commands-*.json
            !maestro-report/maestro-home/**
          if-no-files-found: ignore
          retention-days: 14

  report:
    needs: [e2e]
    # Run even when a shard fails so the merged report always publishes.
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download all shard reports
        uses: actions/download-artifact@v4
        with:
          pattern: maestro-report-shard-*
          path: all-shards

      - name: Publish Maestro JUnit report (merged)
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          # Every shard's per-flow JUnit, merged into ONE "Maestro E2E" check.
          report_paths: all-shards/**/junit/*.xml
          check_name: Maestro E2E
          detailed_summary: true
          include_passed: true
          # The matrix legs are the gate; this check is informational so it
          # publishes results without double-failing the run.
          fail_on_failure: false

      - name: Build combined summary
        if: always()
        run: |
          combined=combined-summary.md
          {
            echo "## Maestro E2E results (sharded)"
            echo ""
          } > "$combined"
          found=0
          for shard_dir in all-shards/*/; do
            [ -d "$shard_dir" ] || continue
            name=$(basename "$shard_dir")
            sfile=$(find "$shard_dir" -name summary.md | head -1)
            [ -n "$sfile" ] || continue
            found=1
            {
              echo "<details open><summary><strong>$name</strong></summary>"
              echo ""
              cat "$sfile"
              echo ""
              echo "</details>"
              echo ""
            } >> "$combined"
          done
          if [ "$found" -eq 0 ]; then
            echo "_No shard summaries found (all shards may have failed before producing a report)._" >> "$combined"
          fi
          cat "$combined" >> "$GITHUB_STEP_SUMMARY"

      - name: Post Maestro summary as sticky PR comment
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: maestro-results
          path: combined-summary.md
