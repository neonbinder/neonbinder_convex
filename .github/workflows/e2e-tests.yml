name: E2E Tests

on:
  pull_request:
  workflow_dispatch:
    inputs:
      browser_preview_url:
        description: >-
          Browser-service preview URL to point this run's Convex preview at
          (cross-repo browser-PR gate, NEO-69). Empty = canonical dev default
          (the post-merge convex-dev-gate dispatches with no input, unchanged).
        required: false
        default: ""

# Cancel any in-flight run on this PR/branch when a newer commit arrives.
# Two concurrent runs share the same Convex dev deployment, browser service,
# and test users — concurrent /login/bsc calls for the same BSC account
# reliably trigger a 503 on the slower request. One active run per branch.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# action-junit-report needs checks:write to publish the per-flow PR check,
# and pull-requests:write to add its summary comment. Repo default is read-only.
permissions:
  contents: read
  checks: write
  pull-requests: write
  # NEO-35: keyless WIF auth to read Cloud Run for browser-preview discovery.
  id-token: write

# ─── Dynamic work-queue (NEO-49) ──────────────────────────────────────────────
# main deploys to prod on every merge, so the FULL suite is the merge-blocking
# gate. We run it across many FREE ubuntu-latest runners (public repos get ~20
# concurrent free jobs), each one isolated (PARALLELISM=1 = one Chrome/VM — web
# can't parallelize within a VM, the NEO-46 contention). Instead of pre-assigning
# a static slice per runner, a homogeneous runner pool DRAINS A SHARED QUEUE
# (work-stealing) so the legs balance themselves and the suite scales by changing
# only the matrix length — no flow-count re-tuning.
#
#   setup  → resolve the PR's Vercel preview URL AND the preview Convex .convex.site
#            URL (where the queue's HTTP endpoints live).
#   seed   → seed the shared per-PR Convex preview's global baseline ONCE (setup
#            track, worker 0), THEN enqueue the runnable flow list into the queue.
#   runner → strategy.matrix.runner: identical runners, each bootstraps its account
#            (runner N → TEST_EMAIL_N) then loops claim→run→report until the queue
#            drains. A flow failure is recorded in the queue, not the job exit code.
#   e2e    → the single ruleset-required gate: reads QUEUE status; green iff every
#            queued flow passed and the queue fully drained.
#   report → merge every runner's JUnit into ONE "Maestro E2E" check + sticky comment.
#
# Runner prep (bypass proxy + pinned Java/Chrome/Xvfb/Maestro) is the local
# composite action .github/actions/maestro-runner.
#
# To scale: extend matrix.runner (e.g. add 8..11) and provision TEST_EMAIL_8.. —
# the queue auto-distributes; nothing else changes. Requires the E2E_QUEUE_SECRET
# GitHub secret + the same value set on the Convex preview env.
jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      url: ${{ steps.vercel-preview.outputs.url }}
      convex_site: ${{ steps.convex.outputs.convex_site }}
    steps:
      - name: Resolve Vercel preview URL
        id: vercel-preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        # Poll the GitHub Deployments API for the Vercel-created preview URL.
        # Skips the HTTP 200-poll that patrickedqvist/wait-for-vercel-preview
        # performs (~5 min of 401s every run under Vercel Deployment
        # Protection, since the Actions runner has no SSO cookie and the
        # action can't inject x-vercel-protection-bypass). Readiness is
        # handled by the next step using the bypass header.
        run: |
          for attempt in $(seq 1 60); do
            deployment_id=$(gh api "repos/$GITHUB_REPOSITORY/deployments?sha=$SHA&per_page=100" \
              --jq '[.[] | select(.creator.login == "vercel[bot]")] | sort_by(.created_at) | reverse | .[0].id // empty')
            if [ -n "$deployment_id" ]; then
              url=$(gh api "repos/$GITHUB_REPOSITORY/deployments/$deployment_id/statuses" \
                --jq '[.[] | select(.state == "success")] | .[0] | (.environment_url // .target_url // empty)')
              if [ -n "$url" ]; then
                echo "Vercel preview URL: $url"
                echo "url=$url" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              failed=$(gh api "repos/$GITHUB_REPOSITORY/deployments/$deployment_id/statuses" \
                --jq '[.[] | select(.state == "failure" or .state == "error")] | length')
              if [ "${failed:-0}" -gt 0 ]; then
                echo "Vercel deployment ${deployment_id} reported failure/error state — aborting."
                exit 1
              fi
            fi
            echo "attempt $attempt/60: Vercel deployment not yet ready for $SHA — retrying in 5s"
            sleep 5
          done
          echo "Timed out (5 min) waiting for a successful Vercel deployment on $SHA."
          exit 1

      - name: Wait for preview to respond (with bypass)
        env:
          PREVIEW_URL: ${{ steps.vercel-preview.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          if [ -z "$PREVIEW_URL" ]; then
            echo "No preview URL discovered."
            exit 1
          fi
          echo "Polling $PREVIEW_URL with bypass header..."
          for attempt in $(seq 1 60); do
            status=$(curl -sS -o /dev/null -w "%{http_code}" -H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" "$PREVIEW_URL/" || echo 000)
            if [ "$status" = "200" ]; then
              echo "Preview ready after $attempt attempt(s)."
              exit 0
            fi
            echo "attempt $attempt: HTTP $status — retrying in 5s"
            sleep 5
          done
          echo "Preview never returned 200."
          exit 1

      - name: Resolve preview Convex URL (.convex.site)
        id: convex
        env:
          PREVIEW_URL: ${{ steps.vercel-preview.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          # The preview's index.html carries
          #   <meta name="x-convex-url" content="https://<deployment>.convex.cloud">
          # (Vite substitutes VITE_CONVEX_URL at build). Extract it and swap the
          # .convex.cloud API host for the .convex.site HTTP-actions host, where
          # the E2E work-queue endpoints live. The queue runners hit this directly.
          html=$(curl -sS -H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" "$PREVIEW_URL/")
          cloud=$(printf '%s' "$html" | grep -oE 'name="x-convex-url" content="[^"]*"' | grep -oE 'https://[a-z0-9-]+\.convex\.cloud' | head -1)
          if [ -z "$cloud" ]; then
            echo "::error::Could not resolve Convex URL from preview index.html (x-convex-url meta missing)"
            exit 1
          fi
          site="${cloud/.convex.cloud/.convex.site}"
          echo "Convex site URL: $site"
          echo "convex_site=$site" >> "$GITHUB_OUTPUT"

  browser-override:
    # Point THIS run's Convex preview at an in-flight browser preview so E2E
    # exercises the browser code under test instead of the shared dev service.
    #  • pull_request (same-repo, NEO-35): auto-discover the NEWEST live pr-*
    #    tagged revision on the dev browser service; preview name = head_ref.
    #  • workflow_dispatch with `browser_preview_url` (NEO-69 cross-repo
    #    browser-PR gate): use that URL directly (no GCP discovery); preview
    #    name = ref_name (the dispatched ref, e.g. integration-test).
    # A dispatch with NO input (the post-merge convex-dev-gate) skips this job and
    # `seed` falls back to the canonical dev default — that path is unchanged.
    # Fail-safe: every non-happy path leaves the canonical dev default in place,
    # so this can NEVER block the E2E gate. Runs before `seed`, which seeds
    # marketplace creds through the browser service and so reads this value.
    needs: setup
    # Fork guard: the discovery path mints a GCP WIF token + uses a Convex deploy
    # key, so it must never run for fork-originated PRs (the GCP
    # attribute_condition can't distinguish fork-head from base PRs — this
    # workflow-level guard is the required second layer, mirrors
    # browser-deploy.yml). The dispatch path is gated on the input being present,
    # which only our own browser CI passes.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository ||
      (github.event_name == 'workflow_dispatch' && inputs.browser_preview_url != '')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - id: gcp-auth
        name: Authenticate to GCP (read-only Cloud Run reader)
        # Discovery path only — a workflow_dispatch passes the URL explicitly.
        if: github.event_name == 'pull_request'
        uses: google-github-actions/auth@v2
        continue-on-error: true
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SA_CONVEX_E2E }}

      - if: github.event_name == 'pull_request' && steps.gcp-auth.outcome == 'success'
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve browser preview URL + point this Convex preview at it
        if: >-
          (github.event_name == 'pull_request' && steps.gcp-auth.outcome == 'success') ||
          (github.event_name == 'workflow_dispatch' && inputs.browser_preview_url != '')
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_URL: ${{ inputs.browser_preview_url }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_E2E_PREVIEW_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CONVEX_DEPLOY_KEY:-}" ]; then
            echo "::notice::CONVEX_E2E_PREVIEW_KEY not set — skipping browser-preview override."; exit 0
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # NEO-69: the cross-repo browser-PR gate passes the preview URL directly.
            browser_url="$INPUT_URL"
            preview_name="$REF_NAME"
            echo "Dispatch override: Convex preview '$preview_name' → $browser_url"
          else
            # pull_request: discover the NEWEST live pr-* tagged revision on dev.
            # roles/run.viewer is read-only (no invoke).
            preview_name="$HEAD_REF"
            if [ -z "${preview_name:-}" ]; then
              echo "::notice::No head_ref — skipping browser-preview override."; exit 0
            fi
            svc=$(gcloud run services describe neonbinder-browser \
              --region=us-central1 --project=neonbinder-dev --format=json)
            mapfile -t rows < <(printf '%s' "$svc" \
              | jq -r '.status.traffic[] | select((.tag // "") | startswith("pr-")) | "\(.revisionName)\t\(.url)"')
            if [ "${#rows[@]}" -eq 0 ]; then
              echo "::notice::No live pr-* browser preview — E2E uses the canonical dev default."; exit 0
            fi
            browser_url=""; newest_ts=""
            for row in "${rows[@]}"; do
              rev="${row%%$'\t'*}"; url="${row#*$'\t'}"
              ts=$(gcloud run revisions describe "$rev" --region=us-central1 --project=neonbinder-dev \
                --format='value(metadata.creationTimestamp)' 2>/dev/null || echo "")
              if [ -z "$newest_ts" ] || [[ "$ts" > "$newest_ts" ]]; then newest_ts="$ts"; browser_url="$url"; fi
            done
            echo "Active browser preview: ${browser_url:-<none>}"
          fi

          if [ -z "${browser_url:-}" ]; then
            echo "::notice::No browser preview URL resolved — using the canonical dev default."; exit 0
          fi

          # Set it on this run's Convex preview (named after the branch; Convex
          # sanitizes the ref identically to the Vercel build, so they match).
          # Run convex from a scratch project (this job has no convex dep);
          # --ignore-scripts blocks any postinstall from exfiltrating the key.
          work="$(mktemp -d)"; cd "$work"
          printf '%s' '{"name":"x","private":true,"dependencies":{"convex":"1.39.1"}}' > package.json
          npm install --ignore-scripts --no-audit --no-fund --silent
          if npx convex env set --preview-name "$preview_name" NEONBINDER_BROWSER_URL "$browser_url"; then
            echo "✅ Pointed Convex preview '$preview_name' at $browser_url"
          else
            echo "::warning::Failed to set the browser-preview override; E2E will use the canonical dev default."
          fi

  seed:
    # Seed the shared per-PR Convex preview's global baseline ONCE, before the
    # matrix fans out. Runs the setup track (setup → insert → parallel) as worker
    # 0 at parallelism 1; `run-e2e-smoke.sh setup` is the only entry point that
    # runs setup-tagged flows. Because resetMyTestState (the per-shard Phase-0
    # bootstrap) is auth-scoped per user, it never wipes this global baseline.
    # Also waits on browser-override so NEONBINDER_BROWSER_URL is set on the
    # preview before this seeds marketplace creds through the browser service.
    # browser-override SKIPS on fork PRs (fork guard); `always() && setup ok`
    # lets seed still run then (falling back to the canonical dev default).
    # A non-skipped browser-override FAILURE is itself fail-safe (it exits 0 on
    # every path), so seed never needs to gate on its result.
    needs: [setup, browser-override]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/maestro-runner
        with:
          preview-url: ${{ needs.setup.outputs.url }}
          bypass-secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Seed global baseline (setup track, worker 0)
        env:
          APP_URL: http://localhost:3000
          # Single ordered writer: the setup flow does the global reset + Base +
          # Insert + Parallel in one in-place pass (NEO-62). Forced serial in the
          # scheduler too (SELECT_MODE setup); pinned here for clarity. No SHARD_*
          # → single-shard, worker 0.
          MAESTRO_PARALLELISM: "1"
          # Skip Phase-0 worker-bootstrap (NEO-62): the setup flow's own url chain
          # (/testing/sign-in?redirect=/testing/reset?redirect=/testing/seed-credentials)
          # already signs in + per-user resets + seeds creds + warms BSC/SL for
          # worker 0, so a separate bootstrap is pure duplication (~66s). Runner
          # jobs still bootstrap (they don't set this).
          MAESTRO_SKIP_BOOTSTRAP: "1"
          REPORT_DIR: maestro-report
        run: npm run test:e2e -- setup

      - name: Enqueue flows into the work-queue
        # After the baseline exists, populate the shared queue with the runnable
        # flow list (non-util/wip/setup). Idempotent per runId. The homogeneous
        # runner pool then drains it. Just curl + find + python3 — no Maestro/Chrome.
        env:
          CONVEX_SITE_URL: ${{ needs.setup.outputs.convex_site }}
          E2E_QUEUE_SECRET: ${{ secrets.E2E_QUEUE_SECRET }}
          E2E_RUN_ID: ${{ github.run_id }}
        run: ./run-e2e-queue.sh enqueue

      - name: Upload seed report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report-seed
          path: |
            maestro-report/
            !maestro-report/**/commands-*.json
            !maestro-report/maestro-home/**
          if-no-files-found: ignore
          retention-days: 14

  runner:
    # Homogeneous runner pool (NEO-49 dynamic queue). Every runner is identical —
    # it drains the SHARED Convex work-queue (work-stealing) instead of a static
    # shard slice, so the legs balance themselves (no slow-shard tail) and the
    # suite scales by changing the matrix length alone — no SHARD_TOTAL re-tuning.
    # Each runner is its own VM = ONE maestro/Chrome (web can't parallelize within
    # a VM — that was the NEO-46 p=2 Chrome contention). runner N → global worker
    # N → TEST_EMAIL_N (0..7 provisioned). Needs the preview URL (setup), the
    # seeded baseline AND the enqueued queue (seed).
    needs: [setup, seed]
    # Mirror seed's own guard. On workflow_dispatch (the deploy-gate / cross-repo
    # trigger) the PR-only `browser-override` job is skipped; without this `if`
    # that skip cascades through `seed` to `runner`, so the matrix never expands
    # and the queue is never drained — the `e2e` gate then fails on pending>0
    # having run zero flows (NEO-68). `seed` already succeeded via its own
    # `if: always()`, so gate on seed's result and run regardless of the skip.
    if: always() && needs.seed.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      # One runner failing must NOT cancel the others — the queue + gate decide
      # the verdict, and we want every runner's report.
      fail-fast: false
      matrix:
        runner: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/maestro-runner
        with:
          preview-url: ${{ needs.setup.outputs.url }}
          bypass-secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Drain the work-queue (runner ${{ matrix.runner }})
        env:
          APP_URL: http://localhost:3000
          # NO secrets to Maestro -e (NEO-29). The queue secret is sent ONLY as an
          # HTTP header inside run-e2e-queue.sh and never reaches Maestro / its
          # uploaded debug artifacts.
          RUNNER_INDEX: ${{ matrix.runner }}
          CONVEX_SITE_URL: ${{ needs.setup.outputs.convex_site }}
          E2E_QUEUE_SECRET: ${{ secrets.E2E_QUEUE_SECRET }}
          E2E_RUN_ID: ${{ github.run_id }}
          REPORT_DIR: maestro-report
        # Exits 0 once the queue is drained — a FLOW failure is recorded in the
        # queue (not a job failure), so the single `e2e` gate reads queue status
        # for the real verdict. A HARD error (bootstrap fail / crash) still fails
        # this job, which the gate also checks.
        run: ./run-e2e-queue.sh

      - name: Upload Maestro report — runner ${{ matrix.runner }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report-runner-${{ matrix.runner }}
          # Keep junit + failure screenshots + summary, but exclude the files
          # that serialize Maestro's `-e` env map (NEO-29 defense-in-depth) and
          # the verbose per-worker home dirs.
          path: |
            maestro-report/
            !maestro-report/**/commands-*.json
            !maestro-report/maestro-home/**
          if-no-files-found: ignore
          retention-days: 14

  # Single stable gate required by the `production` ruleset. The runner matrix
  # emits "runner (N)" checks whose names change with the matrix length, so they
  # can't be the required check. This ONE "e2e" check is the real verdict: it
  # reads the QUEUE status (a flow failure is recorded there, not in a runner's
  # exit code) and is green iff setup + seed succeeded AND every queued flow
  # passed (failed==0) AND the queue fully drained (pending==0, running==0 — a
  # nonzero running means a runner died holding a claimed flow). Stable name
  # regardless of how many runners.
  e2e:
    needs: [setup, seed, runner]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Gate — queue fully drained with zero failures
        env:
          CONVEX_SITE_URL: ${{ needs.setup.outputs.convex_site }}
          E2E_QUEUE_SECRET: ${{ secrets.E2E_QUEUE_SECRET }}
          E2E_RUN_ID: ${{ github.run_id }}
        run: |
          echo "jobs: setup=${{ needs.setup.result }} seed=${{ needs.seed.result }} runner=${{ needs.runner.result }}"
          if [ "${{ needs.setup.result }}" != "success" ] || [ "${{ needs.seed.result }}" != "success" ]; then
            echo "::error::setup or seed did not succeed"; exit 1
          fi
          status=$(curl -fsS -X POST "$CONVEX_SITE_URL/e2e/status" \
            -H "x-e2e-queue-secret: $E2E_QUEUE_SECRET" -H "Content-Type: application/json" \
            -d "{\"runId\":\"$E2E_RUN_ID\"}")
          echo "queue status: $status"
          echo "$status" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('passed=%s failed=%s pending=%s running=%s total=%s' % (
              d.get('passed'), d.get('failed'), d.get('pending'), d.get('running'), d.get('total')))
          if d.get('total', 0) == 0:
              print('::error::work-queue is empty — enqueue step failed?'); sys.exit(1)
          if d.get('failed', 0) > 0 or d.get('pending', 0) > 0 or d.get('running', 0) > 0:
              print('::error::E2E gate failed — flow failures or undrained queue'); sys.exit(1)
          print('All queued flows passed.')
          "
          # Also fail if a runner job itself hard-failed (bootstrap/crash) even
          # when the queue otherwise looks clean.
          if [ "${{ needs.runner.result }}" != "success" ]; then
            echo "::error::a runner job hard-failed (bootstrap or crash)"; exit 1
          fi

  report:
    needs: [runner]
    # Run even when a runner fails so the merged report always publishes.
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download all runner reports
        uses: actions/download-artifact@v4
        with:
          pattern: maestro-report-runner-*
          path: all-shards

      - name: Regenerate flow-timings.tsv (LPT seed table)
        if: always()
        # Rebuild .maestro/flow-timings.tsv from this run's per-flow JUnit times so a
        # later run can seed the queue longest-first (NEO-61). Flows not measured this
        # run keep their committed value. Uploaded as an artifact (NOT committed here);
        # the weekly refresh-flow-timings.yml downloads it and opens a chore PR when
        # it drifts.
        run: bash gen-flow-timings.sh all-shards .maestro/flow-timings.tsv > flow-timings.tsv

      - name: Upload flow-timings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flow-timings
          path: flow-timings.tsv
          if-no-files-found: ignore
          retention-days: 14

      - name: ⏱️ Flow timing summary (slowest first)
        if: always()
        run: |
          {
            echo "## ⏱️ Flow timings (slowest first)"
            echo "| flow | seconds |"
            echo "|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"
          # Pull "time<TAB>name" from every flow's JUnit <testsuite>, sort slowest-first,
          # flag anything over 3 min. (maestro writes one testsuite per flow with time=.)
          find all-shards -path '*/junit/*.xml' -print0 2>/dev/null \
            | xargs -0 grep -hoE '<testsuite [^>]*>' 2>/dev/null \
            | sed -E 's/.*name="([^"]+)"[^>]*time="([0-9.]+)".*/\2\t\1/' \
            | sort -rn \
            | awk -F'\t' '
                { secs=$1+0; name=$2; total+=secs; if (secs>180) slow++;
                  flag=(secs>180)?" :warning:":"";
                  printf "| %s%s | %.0f |\n", name, flag, secs }
                END { printf "\n**Total flow-seconds:** %.0f &middot; **flows > 3 min:** %d\n", total, slow }
              ' >> "$GITHUB_STEP_SUMMARY"

      - name: Publish Maestro JUnit report (merged)
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          # Every shard's per-flow JUnit, merged into ONE "Maestro E2E" check.
          report_paths: all-shards/**/junit/*.xml
          check_name: Maestro E2E
          detailed_summary: true
          include_passed: true
          # The matrix legs are the gate; this check is informational so it
          # publishes results without double-failing the run.
          fail_on_failure: false

      - name: Build combined summary
        if: always()
        # Render a per-test pass/fail + duration table from the merged JUnit
        # (all-shards/**/junit/*.xml) — the same files the "Maestro E2E" check
        # reads. Replaces the old summary.md-based builder, which always fell
        # through to "No shard summaries found" once the runners stopped
        # emitting summary.md (NEO-64). Failures are surfaced first, then
        # passing flows slowest-first.
        run: |
          combined=combined-summary.md
          rows="$(mktemp)"

          # One <testsuite> per flow → TSV: <rank>\t<seconds>\t<name>\t<status>
          # rank 0 = failed/errored (listed first), 1 = passed/skipped.
          # Attributes parsed by name, space-anchored so "classname" can't
          # shadow "name".
          find all-shards -path '*/junit/*.xml' -print0 2>/dev/null \
            | xargs -0 grep -hoE '<testsuite [^>]*>' 2>/dev/null \
            | awk '
                function attr(s, k,   re, m) {
                  re = "[[:space:]]" k "=\"[^\"]*\""
                  if (match(s, re)) {
                    m = substr(s, RSTART, RLENGTH)
                    sub("^[[:space:]]" k "=\"", "", m); sub(/"$/, "", m)
                    return m
                  }
                  return ""
                }
                {
                  name = attr($0, "name"); if (name == "") next
                  tests = attr($0, "tests") + 0
                  fails = attr($0, "failures") + 0
                  errs  = attr($0, "errors") + 0
                  skips = attr($0, "skipped") + 0
                  secs  = attr($0, "time") + 0
                  if (fails > 0 || errs > 0)             { rank = 0; status = "failed" }
                  else if (tests == 0 || skips >= tests) { rank = 1; status = "skipped" }
                  else                                   { rank = 1; status = "passed" }
                  printf "%d\t%.3f\t%s\t%s\n", rank, secs, name, status
                }
              ' > "$rows"

          shards=$(find all-shards -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l | tr -d ' ')
          passed=$(awk -F'\t' '$4=="passed"'  "$rows" | wc -l | tr -d ' ')
          failed=$(awk -F'\t' '$4=="failed"'  "$rows" | wc -l | tr -d ' ')
          skipped=$(awk -F'\t' '$4=="skipped"' "$rows" | wc -l | tr -d ' ')
          total_secs=$(awk -F'\t' '{t+=$2} END{printf "%.0f", t+0}' "$rows")
          n_rows=$(wc -l < "$rows" | tr -d ' ')

          {
            echo "## Maestro E2E results (sharded)"
            echo ""
            if [ "$n_rows" -eq 0 ]; then
              echo "⚠️ _No JUnit results were produced by any shard. All shards may have failed before reporting — check the \`runner\` job logs._"
            else
              if [ "$failed" -eq 0 ]; then icon="✅"; else icon="❌"; fi
              line="$icon **${passed} passed"
              [ "$failed"  -gt 0 ] && line="$line · ${failed} failed"
              [ "$skipped" -gt 0 ] && line="$line · ${skipped} skipped"
              line="$line** · ${total_secs}s total · ${shards} shards"
              echo "$line"
              echo ""
              echo "| Test | Status | Duration |"
              echo "|---|---|---|"
              sort -t$'\t' -k1,1n -k2,2nr "$rows" \
                | awk -F'\t' '
                    { secs=$2; name=$3; status=$4
                      sym = (status=="failed") ? "❌ fail" : (status=="skipped") ? "⏭️ skip" : "✅ pass"
                      printf "| %s | %s | %.0fs |\n", name, sym, secs }
                  '
            fi
          } > "$combined"

          rm -f "$rows"
          cat "$combined" >> "$GITHUB_STEP_SUMMARY"

      - name: Post Maestro summary as sticky PR comment
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: maestro-results
          path: combined-summary.md
