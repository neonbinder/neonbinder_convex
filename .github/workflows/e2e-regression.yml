name: E2E Regression (Nightly)

on:
  schedule:
    # 08:00 UTC = 01:00 PT / 04:00 ET — off-peak window
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve Vercel deployment URL for latest main commit
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        id: vercel-preview
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
        # Vercel SSO returns 401 to the action's 200-poll (it can't inject
        # x-vercel-protection-bypass). We only need the URL; continue on error
        # and re-verify with bypass ourselves below.
        continue-on-error: true

      - name: Wait for deployment to respond (with bypass)
        env:
          PREVIEW_URL: ${{ steps.vercel-preview.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          if [ -z "$PREVIEW_URL" ]; then
            echo "No Vercel deployment URL discovered for main."
            exit 1
          fi
          echo "Polling $PREVIEW_URL with bypass header..."
          for attempt in $(seq 1 60); do
            status=$(curl -sS -o /dev/null -w "%{http_code}" -H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" "$PREVIEW_URL/" || echo 000)
            if [ "$status" = "200" ]; then
              echo "Deployment ready after $attempt attempt(s)."
              exit 0
            fi
            echo "attempt $attempt: HTTP $status — retrying in 5s"
            sleep 5
          done
          echo "Deployment never returned 200."
          exit 1

      - name: Start bypass-injecting proxy
        env:
          PREVIEW_URL: ${{ steps.vercel-preview.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          cat > /tmp/vercel-proxy.js <<'EOF'
          const http = require('http');
          const https = require('https');
          const { URL } = require('url');

          const upstream = new URL(process.env.PREVIEW_URL);
          const bypass = process.env.VERCEL_AUTOMATION_BYPASS_SECRET;
          const PORT = 3000;

          const server = http.createServer((req, res) => {
            const opts = {
              hostname: upstream.hostname,
              port: 443,
              path: req.url,
              method: req.method,
              headers: {
                ...req.headers,
                host: upstream.hostname,
                'x-vercel-protection-bypass': bypass,
              },
            };
            const upstreamReq = https.request(opts, upstreamRes => {
              res.writeHead(upstreamRes.statusCode || 500, upstreamRes.headers);
              upstreamRes.pipe(res);
            });
            upstreamReq.on('error', err => {
              console.error('proxy error:', err.message);
              res.statusCode = 502;
              res.end('proxy error');
            });
            req.pipe(upstreamReq);
          });

          server.listen(PORT, () => {
            console.log(`Bypass proxy listening on http://localhost:${PORT} -> ${upstream.origin}`);
          });
          EOF
          node /tmp/vercel-proxy.js &
          echo "PROXY_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 20); do
            if curl -sS -o /dev/null "http://localhost:3000/" ; then
              echo "Proxy ready."
              break
            fi
            sleep 0.5
          done

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: browser-actions/setup-chrome@v1

      - name: Start Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1280x1024x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro regression suite
        id: maestro
        env:
          APP_URL: http://localhost:3000
          SPORTLOTS_USERNAME: ${{ secrets.MAESTRO_SPORTLOTS_USERNAME }}
          SPORTLOTS_PASSWORD: ${{ secrets.MAESTRO_SPORTLOTS_PASSWORD }}
          BSC_USERNAME: ${{ secrets.MAESTRO_BSC_USERNAME }}
          BSC_PASSWORD: ${{ secrets.MAESTRO_BSC_PASSWORD }}
        run: npm run test:e2e:regression

      - name: Upload Maestro artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-regression-debug-output
          path: |
            ~/.maestro/tests/
            /tmp/maestro-*
          if-no-files-found: ignore
          retention-days: 14

      - name: Report failure to Sentry
        if: failure()
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          PREVIEW_URL: ${{ steps.vercel-preview.outputs.url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SENTRY_DSN" ]; then
            echo "SENTRY_DSN not configured; skipping Sentry report."
            exit 0
          fi
          npx --yes @sentry/cli@latest send-event \
            --level error \
            --message "Nightly E2E regression failed on main ($GITHUB_SHA)" \
            --tag environment:ci \
            --tag suite:regression \
            --tag branch:main \
            --tag commit:$GITHUB_SHA \
            --extra "run_url:$RUN_URL" \
            --extra "deployment_url:$PREVIEW_URL"
